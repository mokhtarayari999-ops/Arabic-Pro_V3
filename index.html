<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Pro v14.0 | المحلل السيادي</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8a2e;
            --black: #0a0a0a;
            --card-bg: #151515;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(212, 175, 55, 0.1);
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--gold); font-size: 1.8rem; letter-spacing: 2px; margin: 0; }
        header p { color: var(--text-gray); font-size: 0.75rem; margin-top: 5px; }

        .input-section { margin-bottom: 20px; }
        label { display: block; color: var(--gold); font-size: 0.9rem; margin-bottom: 8px; font-weight: 600; }

        .odds-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        input, select {
            background: #202020;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--gold); }

        .analyze-btn {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: black;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .analyze-btn:active { transform: scale(0.97); }

        #result-box {
            margin-top: 25px;
            background: #0d0d0d;
            border-radius: 12px;
            padding: 20px;
            display: none;
            border-right: 4px solid var(--gold);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .result-item { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .result-label { color: var(--text-gray); font-size: 0.85rem; }
        .result-value { color: var(--gold); font-weight: bold; font-size: 1rem; }

        .logic-desc { font-size: 0.8rem; color: #888; line-height: 1.4; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>SOVEREIGN PRO</h1>
        <p>الذكاء الاصطناعي لتحليل الأنماط التكرارية v14.0</p>
    </header>

    <div class="input-section">
        <label>إدخال الـ Cotes العالمية (1 - X - 2):</label>
        <div class="odds-grid">
            <input type="number" id="h-cote" step="0.01" placeholder="1">
            <input type="number" id="d-cote" step="0.01" placeholder="X">
            <input type="number" id="a-cote" step="0.01" placeholder="2">
        </div>
    </div>

    <div class="input-section">
        <label>بيئة الدوري:</label>
        <select id="league">
            <option value="LaLiga">الدوري الإسباني (تكتيكي/منضبط)</option>
            <option value="Premier">الدوري الإنجليزي (هجومي/مفتوح)</option>
            <option value="CL">دوري الأبطال (حسم/خروج مغلوب)</option>
        </select>
    </div>

    <div class="input-section">
        <label>كفاءة حسم الضيف (Clinical Edge):</label>
        <select id="away-edge">
            <option value="high">قناص (حسم عالي - مثل صن داونز)</option>
            <option value="normal" selected>متوسط (أداء متذبذب)</option>
            <option value="low">عقم هجومي (إضاعة فرص)</option>
        </select>
    </div>

    <button class="analyze-btn" onclick="processSovereignAnalysis()">بدء الاستخراج السيادي</button>

    <div id="result-box">
        <div class="result-item">
            <span class="result-label">النمط التاريخي المستخرج:</span>
            <span class="result-value" id="res-score">--</span>
        </div>
        <div class="result-item">
            <span class="result-label">نسبة تكرار النتيجة:</span>
            <span class="result-value" id="res-freq">--</span>
        </div>
        <div class="result-item">
            <span class="result-label">التوجّه العام للمباراة:</span>
            <span class="result-value" id="res-trend">--</span>
        </div>
        <div class="logic-desc" id="res-note"></div>
    </div>
</div>

<script>
    // قاعدة البيانات المركزية للأنماط التكرارية (بناءً على الدوري الإسباني والدوريات الكبرى)
    const patternsDB = {
        "1.7-3.5-4.8": { score: "1-0", freq: "14.2%", trend: "فوز نظيف", note: "نمط يعكس سيطرة المضيف الدفاعية وتكتيك الهدف الواحد." },
        "2.2-3.2-3.4": { score: "1-1", freq: "12.8%", trend: "تعادل إيجابي", note: "هذا النمط يتكرر بشدة في المواجهات المتكافئة في منتصف الجدول." },
        "1.4-4.0-7.5": { score: "2-0", freq: "16.5%", trend: "هيمنة مريحة", note: "الفريق الكبير ينهي المباراة دون استقبال أهداف." },
        "3.1-3.3-2.3": { score: "0-1", freq: "13.4%", trend: "فخ الضيف", note: "النمط الذي أسقط الترجي؛ الضيف يسرق المباراة بهدف وحيد." },
        "1.8-3.4-4.5": { score: "2-1", freq: "11.2%", trend: "فوز صعب", note: "المضيف يفوز ولكن يستقبل هدفاً بسبب اندفاعه الهجومي." },
        "2.5-3.1-2.9": { score: "1-1", freq: "15.0%", trend: "توازن تكتيكي", note: "احتمالية عالية جداً لتقاسم النقاط." }
    };

    function processSovereignAnalysis() {
        // جلب القيم وتقريبها لتوحيد البحث (Signature)
        const h = parseFloat(document.getElementById('h-cote').value).toFixed(1);
        const d = parseFloat(document.getElementById('d-cote').value).toFixed(1);
        const a = parseFloat(document.getElementById('a-cote').value).toFixed(1);
        const awayEdge = document.getElementById('away-edge').value;
        
        const signature = `${h}-${d}-${a}`;
        const resultBox = document.getElementById('result-box');

        // محرك البحث عن الأنماط
        let data = patternsDB[signature];

        resultBox.style.display = 'block';

        if (data) {
            let finalScore = data.score;
            
            // تطبيق "وحدة الحسم" يدوياً
            if (awayEdge === "high" && finalScore.startsWith("1-0")) finalScore = "1-1";
            if (awayEdge === "high" && finalScore === "0-0") finalScore = "0-1";

            document.getElementById('res-score').innerText = finalScore;
            document.getElementById('res-freq').innerText = data.freq;
            document.getElementById('res-trend').innerText = data.trend;
            document.getElementById('res-note').innerText = data.note;
        } else {
            // منطق "المحاكاة" في حال غياب النمط
            document.getElementById('res-score').innerText = (h < a) ? "1-0 / 2-1" : "0-1 / 1-1";
            document.getElementById('res-freq').innerText = "تحليل ديناميكي";
            document.getElementById('res-trend').innerText = "غير مصنف تاريخياً";
            document.getElementById('res-note').innerText = "لا يوجد نمط تكرار مطابق تماماً لهذه الـ Cotes. الحسابات تعتمد على موازنة القوى الحالية.";
        }
    }
</script>

</body>
    </html>
