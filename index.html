<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | Master Engine v8.5</title>
    <style>
        /* الجزء 1: الهوية البصرية النيونية المتطورة */
        :root { 
            --n-gold: #ffcc00; 
            --n-blue: #00f2ff; 
            --n-red: #ff3e3e; 
            --glass: rgba(255,255,255,0.02); 
        }

        body { 
            background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .main-card { 
            background: #0a0a0a; border: 1px solid #222; border-top: 4px solid var(--n-gold); 
            border-radius: 25px; padding: 25px; width: 100%; max-width: 450px; 
            text-align: center; box-shadow: 0 20px 50px #000; margin-bottom: 20px; 
            position: relative; transition: 0.3s;
        }

        /* زر الرادار الأزرق (المنبه العصبي) */
        .radar-btn { 
            background: transparent; border: 1px solid var(--n-blue); color: var(--n-blue); 
            border-radius: 12px; padding: 10px; font-size: 11px; font-weight: bold; 
            cursor: pointer; margin-bottom: 20px; width: 100%; text-transform: uppercase; 
            letter-spacing: 1px; transition: 0.3s;
        }
        .radar-btn:hover { background: var(--n-blue); color: #000; box-shadow: 0 0 15px var(--n-blue); }

        /* شريط اختيار الأفرع التسعة المصحح */
        .league-selector {
            background: #111; color: #aaa; width: 100%; padding: 12px;
            border: 1px solid #222; border-radius: 10px; margin-bottom: 20px;
            font-size: 12px; font-weight: bold; outline: none; border-left: 3px solid var(--n-gold);
        }

        /* شبكة الإدخال الرقمي */
        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .field { 
            width: 100%; background: var(--glass); border: 1px solid #333; 
            border-radius: 12px; color: var(--n-gold); padding: 15px 0; 
            font-size: 16px; font-weight: bold; text-align: center; outline: none; 
            border-bottom: 2px solid #222; transition: 0.3s;
        }
        .field:focus { border-color: var(--n-gold); background: rgba(255,204,0,0.05); }

        .btn-engage { 
            background: var(--n-gold); color: #000; border: none; 
            border-radius: 15px; padding: 22px; width: 100%; 
            font-size: 16px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(255,204,0,0.1);
        }
        .btn-engage:active { transform: scale(0.97); }

        /* منطقة النتائج والأنماط البديلة */
        .display-node { 
            margin-top: 30px; padding: 25px; border-radius: 20px; 
            background: #0f0f0f; border: 1px solid #1a1a1a; display: none; 
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .score-ultra { font-size: 65px; font-weight: 900; color: #fff; margin: 5px 0; letter-spacing: 3px; }
        .alt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .alt-item { background: #151515; border-radius: 15px; padding: 15px; border: 1px solid #222; text-align: center; }

        /* رادار الافتراس العالمي v8.5 */
        .radar-box { 
            width: 100%; max-width: 450px; background: #fff; 
            border-radius: 25px; overflow: hidden; border: 3px solid var(--n-red); 
            margin-bottom: 50px; box-shadow: 0 15px 40px rgba(255,62,62,0.2);
        }
    </style>
</head>
<body>

<div class="main-card">
    <button class="radar-btn" onclick="enableNotifications()">🔔 ENABLE NEURAL RADAR ALERTS</button>

    <select id="league" class="league-selector">
        <option value="ita">🇮🇹 1. SERIE A (ITALY)</option>
        <option value="eng">🏴 2. PREMIER LEAGUE (UK)</option>
        <option value="ger">🇩🇪 3. BUNDESLIGA (GER)</option>
        <option value="esp">🇪🇸 4. LA LIGA (SPAIN)</option>
        <option value="fra">🇫🇷 5. LIGUE 1 (FRANCE)</option>
        <option value="ucl">🇪🇺 6. CHAMPIONS LEAGUE</option>
        <option value="uel">🏆 7. EUROPA LEAGUE</option>
        <option value="spl">🇸🇦 8. SAUDI PRO LEAGUE</option>
        <option value="intl">🌍 9. INTERNATIONAL SCANNER</option>
    </select>

    <div class="inputs-grid">
        <input type="number" id="h" placeholder="H" class="field">
        <input type="number" id="x" placeholder="X" class="field">
        <input type="number" id="a" placeholder="A" class="field">
        <input type="number" id="o" placeholder="OPEN" class="field">
    </div>

    <button class="btn-engage" onclick="masterAnalysis()">Run Master Engine v8.5</button>

    <div id="res-box" class="display-node">
        <div id="alert-tag" style="color:var(--n-red); font-size:10px; font-weight:bold; margin-bottom:10px; display:none; letter-spacing:1px;">⚠️ PREDATOR DROP DETECTED</div>
        <div class="score-ultra" id="main-s">--</div>
        <div id="main-p" style="color:var(--n-blue); font-size:12px; font-weight:bold;">MASTER PROBABILITY: 0%</div>
        <div id="alts" class="alt-grid"></div>
    </div>
</div>

<div class="radar-box">
    <div style="background:#000; color:#fff; font-size:10px; padding:12px; text-align:center; font-weight:bold;">📡 LIVE PREDATOR RADAR v8.5</div>
    <iframe src="https://betexplorer.com" width="100%" height="550px" style="border:none;"></iframe>
</div>

<script>
    // تفعيل الإشعارات العصبية
    function enableNotifications() {
        if (!("Notification" in window)) {
            alert("Browser does not support notifications.");
        } else {
            Notification.requestPermission().then(p => { 
                if(p === "granted") alert("Neural Radar Active! 🚀"); 
            });
        }
    }

    // إطلاق تنبيه الافتراس
    function triggerAlert(team, drop) {
        if (Notification.permission === "granted") {
            new Notification("⚡ SOVEREIGN ALERT", { 
                body: `Market Anomaly! ${drop.toFixed(1)}% Drop detected for ${team}.`,
                icon: 'https://flaticon.com'
            });
        }
    }

    function masterAnalysis() {
        const h = parseFloat(document.getElementById('h').value);
        const a = parseFloat(document.getElementById('a').value);
        const o = parseFloat(document.getElementById('o').value);
        
        if(!h || !a) {
            alert("Please enter Home and Away Odds!");
            return;
        }

        // حساب الفجوة المالية (Drop)
        const drop = o ? ((o - a) / o) * 100 : 0;
        let score = "", prob = 0, patterns = [];

        // محرك السيادة v8.5 (Master Logic Matrix)
        if (h <= 1.45) {
            // حالة الفريق العملاق (مان سيتي، بايرن، إنتر)
            if (drop > 20) { 
                score = "1 - 1"; prob = 42; 
                patterns = [{s:"1-2",p:28},{s:"2-1",p:35}]; 
                triggerAlert("Away Team", drop);
            } else { 
                score = "3 - 0"; prob = 78; 
                patterns = [{s:"2-0",p:65},{s:"4-0",p:42}]; 
            }
        } 
        else if (h <= 1.85) {
            // منطقة الفرق المفضلة (مثل لانس أو نيس)
            if (drop > 15) { 
                score = "1 - 1"; prob = 52; 
                patterns = [{s:"1-2",p:38},{s:"2-1",p:44}]; 
                triggerAlert("Away Team", drop);
            } else { 
                score = "2 - 1"; prob = 65; 
                patterns = [{s:"2-0",p:58},{s:"1-0",p:49}]; 
            }
        }
        else if (h > 1.85 && h <= 2.45) {
            // منطقة المباريات المتوازنة
            if (drop > 10) {
                score = "1 - 1"; prob = 55;
                patterns = [{s:"0-1",p:32},{s:"1-2",p:26}];
                triggerAlert("Away Team", drop);
            } else {
                score = "2 - 1"; prob = 48;
                patterns = [{s:"1-1",p:39},{s:"2-0",p:34}];
            }
        }
        else {
            // حالة الفريق غير المفضل أو التعادل
            score = (drop > 12) ? "0 - 1" : "1 - 1";
            prob = 38;
            patterns = [{s:"0-0",p:33},{s:"1-0",p:29}];
        }

        // عرض النتائج بنقاء برمجي (Fresh Execution)
        const resBox = document.getElementById('res-box');
        resBox.style.display = 'block';
        document.getElementById('main-s').innerText = score;
        document.getElementById('main-p').innerText = `MASTER PROBABILITY: ${prob}%`;
        
        const tag = document.getElementById('alert-tag');
        tag.style.display = (drop > 10) ? 'block' : 'none';

        let html = '';
        patterns.forEach(p => {
            html += `
            <div class="alt-item">
                <div style="font-size:9px; color:#555; margin-bottom:5px; text-transform:uppercase;">Pattern</div>
                <div style="color:var(--n-gold); font-size:20px; font-weight:900;">${p.s}</div>
                <div style="color:var(--n-blue); font-size:11px; font-weight:bold;">${p.p}%</div>
            </div>`;
        });
        document.getElementById('alts').innerHTML = html;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>
</body>
</html>
