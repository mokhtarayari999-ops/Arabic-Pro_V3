<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARABIC PRO V4.4 | TOTAL CLARITY</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background: #000; color: #D4AF37; font-family: 'Cairo', sans-serif; min-height: 100vh; }
        /* بطاقات الفريقين المتميزة */
        .team-card { background: rgba(15, 15, 15, 1); border-radius: 25px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .home-border { border-right: 6px solid #1e40af; } /* لون أزرق للمضيف */
        .away-border { border-right: 6px solid #991b1b; } /* لون أحمر للضيف */
        
        input { background: #000 !important; border: 1px solid #333 !important; color: #FFD700 !important; border-radius: 12px !important; text-align: center; font-size: 1.3rem !important; padding: 10px !important; font-weight: 900; width: 100%; }
        .modifier-btn { border: 1px solid #222; padding: 10px 5px; border-radius: 12px; font-size: 0.9rem; font-weight: 800; color: #555; transition: 0.3s; width: 100%; text-align: center; }
        .modifier-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(212, 175, 55, 0.1); shadow: 0 0 10px #D4AF37; }
        .btn-king { background: linear-gradient(90deg, #B8860B, #FFD700); color: #000; font-weight: 900; border-radius: 20px; width: 100%; padding: 20px; font-size: 1.5rem; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
        .label-tag { font-size: 1rem; color: #fff; font-weight: 800; margin-bottom: 5px; display: block; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <header class="text-center py-6">
            <h1 class="text-4xl font-black italic gold-glow">ARABIC PRO <span class="text-white">V4.4</span></h1>
            <p class="text-[10px] text-yellow-700 tracking-[0.4em] font-bold mt-1">THE SYSTEM IS NOW SEPARATED</p>
        </header>

        <!-- بطاقة الفريق المضيف -->
        <div class="team-card home-border shadow-lg">
            <input type="text" id="hName" placeholder="🏟️ اسم الفريق المضيف" class="mb-4">
            <div class="grid grid-cols-2 gap-4">
                <div><span class="label-tag">🚀 هجوم</span><input type="number" id="hAtk" value="85"></div>
                <div><span class="label-tag">🛡️ دفاع</span><input type="number" id="hDef" value="75"></div>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <div id="hInj" onclick="toggleM('hInj')" class="modifier-btn">🤕 إصابات</div>
                <div id="hMor" onclick="toggleM('hMor')" class="modifier-btn">🔥 روح قتالية</div>
                <div id="hFan" onclick="toggleM('hFan')" class="modifier-btn">📢 جمهور</div>
                <div id="hFat" onclick="toggleM('hFat')" class="modifier-btn">😫 إرهاق</div>
            </div>
        </div>

        <!-- بطاقة الفريق الضيف -->
        <div class="team-card away-border shadow-lg">
            <input type="text" id="aName" placeholder="🏁 اسم الفريق الضيف" class="mb-4">
            <div class="grid grid-cols-2 gap-4">
                <div><span class="label-tag">🚀 هجوم</span><input type="number" id="aAtk" value="70"></div>
                <div><span class="label-tag">🛡️ دفاع</span><input type="number" id="aDef" value="80"></div>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <div id="aInj" onclick="toggleM('aInj')" class="modifier-btn">🤕 إصابات</div>
                <div id="aMor" onclick="toggleM('aMor')" class="modifier-btn">🔥 روح عالية</div>
                <div id="aFan" onclick="toggleM('aFan')" class="modifier-btn">✈️ سفر شاق</div>
                <div id="aFat" onclick="toggleM('aFat')" class="modifier-btn">😫 إرهاق</div>
            </div>
        </div>

        <button onclick="runTacticalAI()" class="btn-king mt-6 active:scale-95 transition-all">توليد التوقعات السيادية 👑</button>

        <div id="dashboard" class="hidden space-y-6 mt-8">
            <div class="team-card text-center border-yellow-500 border-4 py-8">
                <p class="text-gray-400 text-sm font-bold mb-2">النتيجة النهائية المتوقعة</p>
                <div class="text-7xl font-black text-white" id="mainScore">0 - 0</div>
            </div>
            <div id="probList" class="team-card space-y-4"></div>
        </div>
    </div>

    <script>
        let m = { hInj:false, hMor:false, hFan:false, hFat:false, aInj:false, aMor:false, aFan:false, aFat:false };
        function toggleM(id) { m[id] = !m[id]; document.getElementById(id).classList.toggle('active'); }
        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
        function poisson(l, k) { return (Math.pow(l, k) * Math.exp(-l)) / factorial(k); }

        function runTacticalAI() {
            let hAtk = document.getElementById('hAtk').value / 100, hDef = document.getElementById('hDef').value / 100;
            let aAtk = document.getElementById('aAtk').value / 100, aDef = document.getElementById('aDef').value / 100;

            if(m.hInj) hAtk *= 0.8; if(m.hMor) hAtk *= 1.2; if(m.hFan) hAtk *= 1.15; if(m.hFat) hAtk *= 0.85;
            if(m.aInj) aAtk *= 0.8; if(m.aMor) aAtk *= 1.15; if(m.aFan) aAtk *= 0.85; if(m.aFat) aAtk *= 0.85;

            const xGH = (hAtk * (1-aDef)) * 4.6, xGA = (aAtk * (1-hDef)) * 3.6;
            let pW=0, pD=0, pL=0, mP=0, bH=0, bA=0;

            for(let h=0; h<=5; h++){
                for(let a=0; a<=5; a++){
                    let p = poisson(xGH, h) * poisson(xGA, a);
                    if(h>a) pW+=p; else if(a>h) pL+=p; else pD+=p;
                    if(p>mP){ mP=p; bH=h; bA=a; }
                }
            }
            const total = pW+pD+pL;
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('mainScore').innerText = `${bH} - ${bA}`;
            window.scrollTo({top: document.getElementById('dashboard').offsetTop, behavior: 'smooth'});
            
            const results = [
                {l: `فوز المضيف`, v: (pW/total)*100, c: 'bg-blue-600'},
                {l: 'تعادل', v: (pD/total)*100, c: 'bg-gray-600'},
                {l: `فوز الضيف`, v: (pL/total)*100, c: 'bg-red-600'}
            ];
            document.getElementById('probList').innerHTML = results.map(r => `
                <div>
                    <div class="flex justify-between text-sm font-bold mb-2"><span>${r.l}</span><span>${r.v.toFixed(1)}%</span></div>
                    <div class="w-full bg-black h-2 rounded-full overflow-hidden border border-gray-800">
                        <div class="h-full ${r.c}" style="width: ${r.v}%"></div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
