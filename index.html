<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | Sentinel v10.1</title>
    <style>
        /* الجزء 1: الهوية البصرية النيونية (Sentinel Theme) */
        :root { 
            --gold: #ffcc00; 
            --blue: #00f2ff; 
            --red: #ff3e3e; 
            --bg: #000; 
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .master-panel { 
            background: #0a0a0a; border: 2px solid var(--gold); border-radius: 40px; 
            padding: 30px; width: 100%; max-width: 480px; text-align: center; 
            box-shadow: 0 0 100px rgba(0,0,0,1); position: relative; margin-bottom: 25px;
            border-top-width: 5px;
        }

        h1 { font-size: 28px; letter-spacing: 5px; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin: 0; font-weight: 900; }
        .version-tag { font-size: 9px; color: #444; letter-spacing: 3px; margin-bottom: 25px; font-weight: bold; }

        /* شريط اختيار الأفرع التسعة */
        .league-selector {
            background: #111; color: #aaa; width: 100%; padding: 12px;
            border: 1px solid #222; border-radius: 12px; margin-bottom: 25px;
            font-size: 12px; font-weight: bold; outline: none; border-left: 3px solid var(--gold);
        }

        /* شبكة إدخال البيانات الكمية */
        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .field { 
            width: 100%; background: #111; border: 1px solid #222; border-bottom: 3px solid var(--gold);
            border-radius: 15px; color: var(--gold); padding: 15px 0; font-size: 18px; font-weight: bold;
            text-align: center; outline: none; transition: 0.3s;
        }
        .field:focus { border-color: var(--blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .btn-strike { 
            background: linear-gradient(180deg, var(--gold), #b8860b); border: none; border-radius: 20px;
            padding: 22px; width: 100%; color: #000; font-size: 20px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 40px rgba(255, 204, 0, 0.3);
        }

        /* مصفوفة النتائج العصبية */
        .res-node { 
            margin-top: 35px; padding: 25px; border-radius: 35px; background: #0f0f0f; 
            border: 1px solid #1a1a1a; display: none; animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .main-score { font-size: 75px; font-weight: 900; color: #fff; letter-spacing: 6px; margin: 10px 0; }
        .precision-tag { color: var(--blue); font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        /* نظام الرادار الحي المضمون (The Unstoppable Radar) */
        .radar-container {
            width: 100%; max-width: 480px; background: #fff; border: 4px solid var(--red);
            border-radius: 35px; overflow: hidden; box-shadow: 0 0 60px rgba(255, 62, 62, 0.2); 
            margin-bottom: 50px;
        }
        .radar-header {
            background: var(--red); color: #fff; font-size: 11px; font-weight: 900;
            text-align: center; padding: 12px; letter-spacing: 2px; text-transform: uppercase;
        }
        
        iframe { border: none; width: 100%; height: 700px; }
    </style>
</head>
<body>

<div class="master-panel">
    <div class="version-tag">SENTINEL v10.1 | UNSTOPPABLE EDITION</div>
    <h1>SOVEREIGN PRO</h1>

    <select id="league" class="league-selector">
        <option value="ita">🇮🇹 1. SERIE A (ITALY)</option>
        <option value="eng">🏴 2. PREMIER LEAGUE (UK)</option>
        <option value="ger">🇩🇪 3. BUNDESLIGA (GER)</option>
        <option value="esp">🇪🇸 4. LA LIGA (SPAIN)</option>
        <option value="fra">🇫🇷 5. LIGUE 1 (FRANCE)</option>
        <option value="ucl">🇪🇺 6. CHAMPIONS LEAGUE</option>
        <option value="uel">🏆 7. EUROPA LEAGUE</option>
        <option value="spl">🇸🇦 8. SAUDI PRO LEAGUE</option>
        <option value="intl">🌍 9. INTERNATIONAL SCANNER</option>
    </select>

    <div class="inputs-grid">
        <input type="number" id="h" placeholder="H" class="field">
        <input type="number" id="x" placeholder="X" class="field">
        <input type="number" id="a" placeholder="A" class="field">
        <input type="number" id="o" placeholder="OPEN" class="field">
    </div>

    <button class="btn-strike" onclick="executeStrike()">Execute Neural Strike</button>

    <div id="res-box" class="res-node">
        <div id="alert-tag" style="color:var(--red); font-size:10px; font-weight:bold; margin-bottom:15px; display:none; letter-spacing:1px;">⚠️ MARKET ANOMALY DETECTED</div>
        <div class="main-score" id="score">--</div>
        <div class="precision-tag" id="precision">PRECISION INDEX: 0%</div>
        <div id="alt-patterns" style="margin-top:25px; display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>
</div>

<!-- الرادار الحي المحدث (Unstoppable Radar) -->
<div class="radar-container">
    <div class="radar-header">📡 LIVE AUTO-SNIPER: REAL-TIME DROPPING ODDS</div>
    <!-- استخدام رابط مباشر يدعم الانهيارات بوضوح -->
    <iframe id="live-radar" src="https://betexplorer.com"></iframe>
</div>

<script>
    function executeStrike() {
        const h = parseFloat(document.getElementById('h').value);
        const a = parseFloat(document.getElementById('a').value);
        const o = parseFloat(document.getElementById('o').value);
        
        if(!h || !a) return alert("Neural Interface: Data Required.");

        const drop = o ? ((o - a) / o) * 100 : 0;
        let s = "1 - 1", p = 38, patterns = [];

        // محرك الحارس v10.1 (The Unstoppable Logic)
        if (h <= 1.45) {
            if (drop > 18) { 
                s = "1 - 1"; p = 52; 
                patterns = [{s:"1-2", p:34},{s:"2-1", p:29}];
            } else { 
                s = "3 - 0"; p = 85; 
                patterns = [{s:"2-0", p:74},{s:"4-0", p:48}];
            }
        } else if (h <= 1.85) {
            if (drop > 12) { 
                s = "1 - 1"; p = 58; 
                patterns = [{s:"1-2", p:38},{s:"0-1", p:31}];
            } else { 
                s = "2 - 1"; p = 72; 
                patterns = [{s:"2-0", p:61},{s:"1-0", p:54}];
            }
        } else {
            s = (drop > 10) ? "1 - 2" : "1 - 1";
            p = (drop > 10) ? 46 : 38;
            patterns = [{s:"0-1", p:34},{s:"2-2", p:26}];
        }

        document.getElementById('res-box').style.display = 'block';
        document.getElementById('score').innerText = s;
        document.getElementById('precision').innerText = `PRECISION INDEX: ${p}%`;
        document.getElementById('alert-tag').style.display = (drop > 10) ? 'block' : 'none';

        let phtml = '';
        patterns.forEach(item => {
            phtml += `
            <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; border:1px solid #222; text-align:center;">
                <div style="font-size:8px; color:#555; margin-bottom:5px; text-transform:uppercase;">Pattern</div>
                <div style="color:var(--gold); font-size:20px; font-weight:900;">${item.s}</div>
                <div style="color:var(--blue); font-size:11px; font-weight:bold;">${item.p}%</div>
            </div>`;
        });
        document.getElementById('alt-patterns').innerHTML = phtml;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // تحديث آلي للرادار لضمان تدفق البيانات
    setInterval(function() {
        const radar = document.getElementById('live-radar');
        radar.src = radar.src;
    }, 300000); 
</script>
</body>
</html>
