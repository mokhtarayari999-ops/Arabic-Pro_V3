<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HISTORICAL MIRROR - PERMANENT STORAGE</title>
    <style>
        :root {
            /* لوحة ألوان أزرق الكربون الملكي */
            --bg: #141e30; 
            --panel: #243b55;
            --accent: #ffcc00;
            --neon-blue: #00d9ff;
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            /* تدرج خلفية ملكي فخم */
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 420px; background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            padding: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .header h2 { margin: 0; font-size: 18px; color: var(--neon-blue); letter-spacing: 2px; text-transform: uppercase; }

        .odds-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
            margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px;
            border-radius: 15px; direction: ltr !important;
        }
        .odd-input {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-size: 18px; font-weight: bold; width: 100%;
            padding: 10px; border-radius: 10px; text-align: center; outline: none;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.03); padding: 18px; border-radius: 20px;
            margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .score-val { font-size: 32px; font-weight: 900; }
        .badge { font-size: 9px; background: rgba(0,0,0,0.3); color: var(--neon-blue); padding: 4px 8px; border-radius: 5px; border: 1px solid var(--neon-blue); }

        .anomaly-box { border: 1px solid var(--neon-red); background: rgba(255, 51, 102, 0.05); }

        .btn-group { display: grid; grid-template-columns: 1fr 1.3fr; gap: 12px; margin-top: 15px; }
        .btn { border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .btn-sync { background: var(--accent); color: #000; }
        .btn-save { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-clear { background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); padding: 5px 10px; border-radius: 6px; font-size: 9px; float: right; margin-top: -5px; }

        .log-box { width: 100%; max-width: 420px; margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; max-height: 250px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .log-entry { font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 0; direction: ltr; text-align: left; }
    </style>
</head>
<body onload="Mirror.init()">

<div class="app-container">
    <div class="header">
        <h2>Historical Truth Mirror</h2>
        <span style="font-size: 9px; color: #888;">PERMANENT ARCHIVE LOG ACTIVE</span>
    </div>

    <div class="odds-grid">
        <input type="number" id="o1" class="odd-input" placeholder="1" step="0.01" oninput="Mirror.scan()">
        <input type="number" id="oX" class="odd-input" placeholder="X" step="0.01" oninput="Mirror.scan()">
        <input type="number" id="o2" class="odd-input" placeholder="2" step="0.01" oninput="Mirror.scan()">
    </div>

    <div id="main-results"></div>
    <div id="anomaly-result"></div>

    <div class="btn-group">
        <button class="btn btn-save" onclick="Mirror.save()">Save Mirror</button>
        <button class="btn btn-sync" onclick="window.open('https://betexplorer.com')">Sync Archive</button>
    </div>
</div>

<div class="log-box">
    <button class="btn-clear" onclick="Mirror.clearLog()">Clear History</button>
    <span style="font-size:10px; color:var(--accent); text-transform: uppercase;">Permanent Tracking Log:</span>
    <div id="match-log" style="margin-top:10px;"></div>
</div>

<script>
    const Mirror = {
        // تشغيل النظام واسترجاع السجل القديم
        init: function() {
            this.loadLog();
            document.querySelectorAll('input').forEach(i => i.value = "");
        },

        scan: function() {
            const o1 = parseFloat(document.getElementById('o1').value);
            const oX = parseFloat(document.getElementById('oX').value);
            const o2 = parseFloat(document.getElementById('o2').value);
            if (!o1 || !oX || !o2) return;

            // الجوهر: بصمة DNA لكل 0.01
            const seed = Math.floor((o1 * 100) + (oX * 50) + (o2 * 10));
            let p = [], a = {};

            if (o1 < o2) {
                const res1 = (seed % 3 === 0) ? "2 - 0" : (seed % 2 === 0) ? "2 - 1" : "1 - 0";
                const res2 = (seed % 5 === 0) ? "3 - 1" : "3 - 0";
                p = [{s: res1, m: (1800 + (seed % 1200)), prob: (28 + (seed % 15)) + "%", c: "var(--neon-green)", id: "id1"},
                     {s: res2, m: (900 + (seed % 800)), prob: (15 + (seed % 10)) + "%", c: "var(--neon-blue)", id: "id2"}];
                a = {s: "0 - 1", m: (150 + (seed % 200)), prob: (4 + (seed % 5)) + "%", id: "idA"};
            } else {
                const res1 = (seed % 3 === 0) ? "0 - 2" : (seed % 2 === 0) ? "1 - 2" : "0 - 1";
                const res2 = (seed % 5 === 0) ? "1 - 3" : "0 - 3";
                p = [{s: res1, m: (1800 + (seed % 1200)), prob: (28 + (seed % 15)) + "%", c: "var(--neon-green)", id: "id1"},
                     {s: res2, m: (900 + (seed % 800)), prob: (15 + (seed % 10)) + "%", c: "var(--neon-blue)", id: "id2"}];
                a = {s: "1 - 0", m: (150 + (seed % 200)), prob: (4 + (seed % 5)) + "%", id: "idA"};
            }
            this.display(p, a);
        },

        display: function(p, a) {
            document.getElementById('main-results').innerHTML = p.map((item, i) => `
                <div class="result-card" style="border-right: 5px solid ${item.c}">
                    <div><span style="font-size:8px; color:#888;">RANK #${i+1}</span><div class="score-val" id="${item.id}">${item.s}</div></div>
                    <div style="text-align:right;"><span class="badge">${item.m} Matches</span><div style="color:${item.c}; font-weight:900; margin-top:5px;">${item.prob}</div></div>
                </div>`).join('');
            document.getElementById('anomaly-result').innerHTML = `
                <div class="result-card anomaly-box">
                    <div><span style="font-size:8px; color:var(--neon-red);">ANOMALY</span><div class="score-val" id="${a.id}" style="color:var(--neon-red)">${a.s}</div></div>
                    <div style="text-align:right;"><span class="badge" style="border-color:var(--neon-red); color:var(--neon-red)">Rare</span><div style="color:var(--neon-red); font-weight:900; margin-top:5px;">${a.prob}</div></div>
                </div>`;
        },

        save: function() {
            const o1 = document.getElementById('o1').value, oX = document.getElementById('oX').value, o2 = document.getElementById('o2').value;
            if (!document.getElementById('id1')) return;
            const r1 = document.getElementById('id1').innerText, r2 = document.getElementById('id2').innerText, ra = document.getElementById('idA').innerText;
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
            
            const logEntry = `<div class="log-entry"><span style="color:var(--accent)">[${time}] Odds: ${o1}/${oX}/${o2}</span><br>History: <b>${r1}</b> | <b>${r2}</b> | <b style="color:var(--neon-red)">${ra}</b></div>`;
            
            // إضافة للسجل في الصفحة وللذاكرة الدائمة
            const logDiv = document.getElementById('match-log');
            logDiv.insertAdjacentHTML('afterbegin', logEntry);
            localStorage.setItem('archiveLog', logDiv.innerHTML);
        },

        loadLog: function() {
            const saved = localStorage.getItem('archiveLog');
            if (saved) document.getElementById('match-log').innerHTML = saved;
        },

        clearLog: function() {
            localStorage.removeItem('archiveLog');
            document.getElementById('match-log').innerHTML = "";
        }
    };
</script>
</body>
</html>
