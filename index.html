<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Pro V5 | السيادي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; }
        
        /* البطاقات الكبيرة للهجوم والدفاع */
        .main-card { background: #111; border-radius: 30px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; text-align: center; }
        .label-top { display: flex; align-items: center; gap: 8px; font-size: 1.1rem; color: #ccc; margin-bottom: 10px; }
        .value-gold { color: #ffcc00; font-size: 2.5rem; font-weight: bold; }

        /* الأزرار الرمادية للمدخلات الفرعية */
        .sub-btn { background: #1a1a1a; border-radius: 20px; padding: 15px; margin-bottom: 10px; text-align: center; color: #888; font-size: 1rem; border: none; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .sub-btn:active { background: #222; }

        /* الزر الأصفر السيادي */
        .btn-predict { background: linear-gradient(to bottom, #ffcc00, #b8860b); color: #000; border: none; border-radius: 25px; padding: 20px; width: 100%; font-size: 1.3rem; font-weight: bold; margin-top: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2); }

        /* صندوق النتيجة النهائية */
        .result-box { background: #080808; border-radius: 25px; padding: 25px; margin-top: 20px; border: 1px solid #151515; text-align: center; }
        .result-title { color: #8a6d3b; font-size: 0.9rem; margin-bottom: 15px; }
        .final-score { font-size: 2rem; font-weight: bold; letter-spacing: 5px; }

        /* سجل النتائج (المطلوب) */
        .history-section { width: 100%; margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        .history-item { background: #111; border-radius: 15px; padding: 10px 20px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <!-- الهجوم -->
    <div class="main-card">
        <div class="label-top">هجوم 🚀</div>
        <div class="value-gold" contenteditable="true" id="atk">70</div>
    </div>

    <!-- الدفاع -->
    <div class="main-card">
        <div class="label-top">دفاع 🛡️</div>
        <div class="value-gold" contenteditable="true" id="def">80</div>
    </div>

    <!-- المدخلات الفرعية -->
    <button class="sub-btn">إصابات 🤕</button>
    <button class="sub-btn">روح عالية 🔥</button>
    <button class="sub-btn">سفر شاق ✈️</button>
    <button class="sub-btn">إرهاق 😫</button>

    <!-- الزر الرئيسي -->
    <button class="btn-predict" onclick="generate()">توليد التوقعات السيادية 👑</button>

    <!-- النتيجة المتوقعة -->
    <div class="result-box">
        <div class="result-title">النتيجة النهائية المتوقعة</div>
        <div class="final-score" id="mainResult">0 - 0</div>
    </div>

    <!-- سجل النتائج -->
    <div class="history-section">
        <div style="color: #555; margin-bottom: 10px; font-size: 0.8rem;">سجل النتائج السابقة</div>
        <div id="historyList">
            <!-- النتائج ستظهر هنا -->
        </div>
    </div>
</div>

<script>
    function generate() {
        let atk = parseInt(document.getElementById('atk').innerText);
        let def = parseInt(document.getElementById('def').innerText);
        
        // معادلة بسيطة للتوقع
        let home = Math.floor(atk / 30);
        let away = Math.floor(def / 40);
        let finalStr = `${home} - ${away}`;
        
        document.getElementById('mainResult').innerText = finalStr;

        // إضافة للسجل
        let history = document.getElementById('historyList');
        let item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<span>توقع جديد</span> <b>${finalStr}</b>`;
        history.prepend(item);
    }
</script>

</body>
</html>
