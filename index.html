<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic-Pro Predictor</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* البطاقات السوداء */
        .card {
            background-color: #111111;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid #1a1a1a;
        }

        /* بطاقة إصابات الضيف المميزة */
        .card-highlight {
            background-color: #111111;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            border: 2px solid #ffcc00; /* الإطار الذهبي */
        }

        /* عنوان القسم */
        .section-title {
            background-color: #1a1a1a;
            border-radius: 15px;
            padding: 12px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .label {
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: block;
            color: #eeeeee;
        }

        input {
            background: transparent;
            border: none;
            color: #ffcc00; /* لون الأرقام الذهبي */
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            outline: none;
        }

        /* زر توليد التوقعات الأصفر */
        .btn-predict {
            background: linear-gradient(to bottom, #ffcc00 0%, #b8860b 100%);
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 18px;
            width: 100%;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-predict:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- قيمة علوية (كما في الصورة) -->
        <div class="card" style="margin-top: -40px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;">
            <input type="number" value="75">
        </div>

        <div class="section-title">
            🏁 فريق الضيف
        </div>

        <!-- هجوم -->
        <div class="card">
            <span class="label">🚀 هجوم</span>
            <input type="number" id="attack" value="70">
        </div>

        <!-- دفاع -->
        <div class="card">
            <span class="label">🛡️ دفاع</span>
            <input type="number" id="defense" value="80">
        </div>

        <!-- إصابات الضيف (المطلوبة) -->
        <div class="card-highlight">
            <span class="label">🤕 إصابات الضيف</span>
            <input type="number" id="injuries" value="0">
        </div>

        <!-- زر توليد التوقعات -->
        <button class="btn-predict" onclick="startPrediction()">
            💎 توليد التوقعات
        </button>

    </div>

    <script>
        function startPrediction() {
            // كود التشغيل الخاص بمشروعنا
            alert("جاري تحليل البيانات لإنتاج التوقع النهائي...");
        }
    </script>

</body>
                </html>
