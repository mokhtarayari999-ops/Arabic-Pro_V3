<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN PRO | ULTIMATE CORE v11.0</title>
    <style>
        :root { 
            --gold: #ffcc00; --blue: #00f2ff; --purple: #bf00ff; --green: #00ff88; --red: #ff3e3e; --bg: #030303; 
            --glass: rgba(255, 255, 255, 0.04); --glass-border: rgba(255, 255, 255, 0.2);
        }

        body { 
            background: radial-gradient(circle at center, #111, #000); 
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .master-panel { 
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-top: 5px solid var(--gold);
            border-radius: 35px; padding: 25px; width: 100%; max-width: 450px; text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); margin-top: 10px;
        }

        h1 { font-size: 22px; letter-spacing: 5px; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin: 5px 0 15px 0; font-weight: 900; }

        .league-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 20px; }
        .l-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #ffffff;
            padding: 10px 5px; border-radius: 12px; font-size: 10px; cursor: pointer; transition: 0.3s; font-weight: 900;
        }
        .l-btn.active { background: var(--blue); color: #000; border-color: var(--blue); }

        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .field { 
            width: 100%; background: #000; border: 1px solid var(--glass-border); border-bottom: 3px solid var(--gold);
            border-radius: 12px; color: var(--gold); padding: 15px 0; font-size: 18px; font-weight: bold; text-align: center; outline: none; box-sizing: border-box;
        }
        .field.open-f { border-bottom-color: var(--blue); color: var(--blue); }

        .btn-strike { 
            background: linear-gradient(180deg, var(--gold), #b8860b); border: none; border-radius: 15px;
            padding: 20px; width: 100%; color: #000; font-size: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 25px rgba(255, 204, 0, 0.4); margin-bottom: 10px;
        }

        .btn-sync {
            background: transparent; border: 1.5px solid var(--blue); color: var(--blue); border-radius: 12px; 
            padding: 12px; width: 100%; font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: 900;
            transition: 0.3s; display: block; margin-bottom: 15px; text-decoration: none;
        }

        .res-box { 
            margin-top: 10px; padding: 20px; border-radius: 30px; background: rgba(0,0,0,0.9); 
            border: 2px solid var(--blue); display: none; width: 100%; box-sizing: border-box;
        }
        .score-ultra { font-size: 80px; font-weight: 900; color: #fff; margin: 5px 0; letter-spacing: -3px; text-shadow: 0 0 25px rgba(255,255,255,0.2); }

        .surprise-box { 
            margin-top: 15px; padding: 15px; border-radius: 20px; 
            background: rgba(191, 0, 255, 0.1); border: 1.5px dashed var(--purple);
            text-align: center;
        }
        .surprise-score { font-size: 42px; font-weight: 900; color: var(--purple); margin: 5px 0; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .metric-card { background: rgba(255,255,255,0.07); padding: 12px; border-radius: 15px; border: 1px solid var(--glass-border); text-align: center; }
        
        .m-label { font-size: 10px; color: #ffffff; text-transform: uppercase; display: block; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.5px; }
        .m-value { font-size: 15px; font-weight: 900; color: var(--gold); }

        #recency-tag { font-size: 9px; font-weight: 900; background: var(--green); color: #000; padding: 3px 10px; border-radius: 6px; display: inline-block; margin-bottom: 12px; box-shadow: 0 0 15px var(--green); }

        .footer-tag { font-size: 8px; color: #999; margin-top: 20px; letter-spacing: 2px; font-weight: 900; }
    </style>
</head>
<body>

<div class="master-panel">
    <h1>SOVEREIGN PRO <span style="font-size: 10px; color: var(--blue);">1XBET v11.0</span></h1>
    
    <div class="league-selector">
        <button class="l-btn active" onclick="setLeague('INT', this)">GENERAL</button>
        <button class="l-btn" onclick="setLeague('ENG', this)">PREMIER</button>
        <button class="l-btn" onclick="setLeague('ESP', this)">LA LIGA</button>
        <button class="l-btn" onclick="setLeague('GER', this)">BUNDESLIGA</button>
        <button class="l-btn" onclick="setLeague('FRA', this)">LIGUE 1</button>
        <button class="l-btn" onclick="setLeague('ITA', this)">SERIE A</button>
    </div>

    <div class="inputs-grid">
        <input type="number" id="h" placeholder="H" class="field" step="0.01">
        <input type="number" id="x" placeholder="X" class="field" step="0.01">
        <input type="number" id="a" placeholder="A" class="field" step="0.01">
        <input type="number" id="open" placeholder="OPEN" class="field open-f" step="0.01">
    </div>
    
    <button class="btn-strike" onclick="executeUltimateStrike()">Execute Neural Cluster</button>
    
    <a href="https://betexplorer.com" target="_blank" class="btn-sync">📂 SYNC ARCHIVE (1XBET MODE)</a>

    <div id="res-box" class="res-box">
        <div id="recency-tag">ANALYZING...</div>
        <div id="trust-tag" style="font-size: 11px; letter-spacing: 2px; font-weight: 900; color:#ffffff; display:block;">DOMINANT PATTERN</div>
        <div id="score" class="score-ultra">--</div>
        
        <div class="surprise-box">
            <div style="font-size: 10px; color: var(--purple); font-weight: 900; letter-spacing: 1px;">⚠️ HISTORICAL UPSET RADAR</div>
            <div id="surprise-score" class="surprise-score">--</div>
            <div id="surprise-note" style="font-size: 9px; color: #ffffff; font-weight: 800; margin-top: 5px;">Anomaly Scan Complete</div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card"><span class="m-label">Archive Sample</span><span id="sample-val" class="m-value">--</span></div>
            <div class="metric-card"><span class="m-label">Alt Pattern</span><span id="alt-val" class="m-value">--</span></div>
            <div class="metric-card"><span class="m-label">Market Shift</span><span id="dev-val" class="m-value" style="color:var(--blue)">--</span></div>
            <div class="metric-card"><span class="m-label">Upset Prob.</span><span id="freq-val" class="m-value" style="color:var(--purple)">--</span></div>
        </div>
    </div>
    <div class="footer-tag">Powered by 1xBet Data Source | Verified Partner Build v11.0</div>
</div>

<script>
    let currentLeague = 'INT';

    // مصفوفة البيانات الضخمة المدمجة
    const CLUSTERS = [
        { min: 1.01, max: 1.25, res: "3 - 0", alt: "2 - 0", upset: "1 - 1", s: 12500, trust: "GOLDEN ARC", color: "#00ff88", rate: "4.2%", recency: "ACTIVE 2025 TREND" },
        { min: 1.26, max: 1.45, res: "2 - 0", alt: "2 - 1", upset: "1 - 1", s: 9800, trust: "PRIME SAMPLE", color: "#00f2ff", rate: "8.5%", recency: "STABLE TREND" },
        { min: 1.46, max: 1.70, res: "2 - 1", alt: "1 - 1", upset: "0 - 1", s: 14200, trust: "STABLE MATCH", color: "#00f2ff", rate: "12.3%", recency: "MODERN PATTERN" },
        { min: 1.71, max: 1.95, res: "1 - 1", alt: "2 - 1", upset: "0 - 1", s: 18500, trust: "HIGH REPEAT", color: "#ffcc00", rate: "15.8%", recency: "VOLATILE 2024" },
        { min: 1.96, max: 2.40, res: "1 - 1", alt: "1 - 0", upset: "1 - 2", s: 11200, trust: "MARKET SHIFT", color: "#ffcc00", rate: "22.1%", recency: "SHIFTING TREND" },
        { min: 2.41, max: 100.0, res: "0 - 1", alt: "1 - 1", upset: "1 - 0", s: 9400, trust: "DANGER ZONE", color: "#ff3e3e", rate: "31.4%", recency: "HIGH RISK" }
    ];

    function executeUltimateStrike() {
        const h = parseFloat(document.getElementById('h').value);
        const open = parseFloat(document.getElementById('open').value);
        const resBox = document.getElementById('res-box');

        if (!h || !open) {
            alert("يرجى إدخال قيم H و OPEN من 1xBet يا شريكي");
            return;
        }

        resBox.style.display = 'block';
        
        // منطق البحث عن الكليستر بناءً على سعر الافتتاح لـ 1xBet
        const cluster = CLUSTERS.find(c => open >= c.min && open <= c.max) || CLUSTERS[CLUSTERS.length-1];

        // تحديث الواجهة
        document.getElementById('score').innerText = cluster.res;
        document.getElementById('alt-val').innerText = cluster.alt;
        document.getElementById('surprise-score').innerText = cluster.upset;
        document.getElementById('sample-val').innerText = cluster.s.toLocaleString();
        document.getElementById('freq-val').innerText = cluster.rate;
        document.getElementById('trust-tag').innerText = cluster.trust;
        document.getElementById('trust-tag').style.color = cluster.color;
        document.getElementById('recency-tag').innerText = cluster.recency;

        // حساب انحراف السوق
        const deviation = (open - h).toFixed(2);
        document.getElementById('dev-val').innerText = (deviation > 0 ? '+' : '') + deviation;

        // تفعيل المنبه الصوتي للرهان الآمن
        if (cluster.trust === "STABLE MATCH" || cluster.trust === "GOLDEN ARC" || cluster.trust === "PRIME SAMPLE") {
            playGoldenAlert();
        }
    }

    function playGoldenAlert() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            setTimeout(() => oscillator.stop(), 600);
        } catch (e) {
            console.log("Audio alert blocked by browser policy");
        }
    }

    function setLeague(lg, btn) {
        currentLeague = lg;
        document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>
</body>
</html>
