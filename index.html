<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO v13.9.5 | THE ULTIMATE POWER BUILD</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #0a0a0a; --green: #00ff00; --blue: #00d4ff; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .main-card {
            background: var(--card); border: 1px solid var(--gold); border-radius: 30px;
            padding: 25px; max-width: 480px; margin: 0 auto 30px auto;
            box-shadow: 0 15px 50px rgba(0,0,0,1);
        }

        /* مستطيل الرادار المتين */
        .parser-input { 
            width: 100%; height: 75px; background: #000; border: 1px dashed var(--gold); 
            border-radius: 15px; color: var(--gold); padding: 12px; font-size: 0.75rem; 
            outline: none; resize: none; box-sizing: border-box; margin-bottom: 20px; transition: 0.3s;
        }

        /* شبكة احتمالات السوق */
        .odds-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; background: #050505; padding: 10px; border-radius: 15px; border: 1px solid #222; }
        .odds-item label { font-size: 0.6rem; color: #666; display: block; margin-bottom: 3px; }
        .odds-item input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; color: var(--blue); text-align: center; font-weight: bold; outline: none; font-size: 1rem; }

        /* شبكة المدخلات الرئيسية */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-group { text-align: right; }
        label { font-size: 0.7rem; color: var(--gold); margin-bottom: 5px; display: block; padding-right: 5px; }
        input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; font-size: 0.9rem; outline: none; box-sizing: border-box; }

        /* شبكة العوامل التكتيكية */
        .factors-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .f-btn { padding: 12px; font-size: 0.75rem; background: #111; border: 1px solid #333; color: #666; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .f-btn.active { border-color: var(--gold); color: #fff; background: rgba(212,175,55,0.1); box-shadow: 0 0 10px var(--gold); }

        .btn-analyze { 
            background: linear-gradient(135deg, var(--gold), #996515); color: #000; 
            border: none; width: 100%; padding: 20px; border-radius: 20px; 
            font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
        }

        /* شاشة النتائج */
        #scoreOut { font-size: 5.5rem; font-weight: 900; text-shadow: 0 0 30px var(--gold); margin: 15px 0; line-height: 1; }
        .poss-info { font-size: 0.85rem; color: var(--gold); margin-top: 5px; line-height: 1.5; }
        .market-code-box { background: rgba(0, 212, 255, 0.05); border: 1px solid var(--blue); padding: 12px; border-radius: 15px; margin-top: 15px; display: none; text-align: center; font-size: 0.8rem; color: var(--blue); font-weight: bold; }

        /* سجل الأرشيف الذهبي الموثق */
        .archive-section { max-width: 480px; margin: 0 auto; text-align: right; }
        .archive-item { 
            background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 20px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; 
            border-right: 5px solid var(--gold); animation: slideIn 0.4s ease;
        }
        .match-score { font-size: 1.8rem; color: var(--gold); font-weight: 900; min-width: 70px; text-align: center; }
        .match-names { font-weight: bold; font-size: 1rem; color: #fff; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } }
    </style>
</head>
<body>

    <div class="main-card">
        <div style="font-size:0.55rem; color:var(--gold); margin-bottom:12px; letter-spacing:2.5px; font-weight:bold;">SOVEREIGN PRO v13.9.5 // POWER AUDIT</div>
        
        <textarea class="parser-input" id="rawData" placeholder="[ الرادار المتين سيتعرف على الفرق والبيانات تلقائياً... ]" oninput="smartRadar()"></textarea>

        <div class="input-grid">
            <div class="input-group"> <label>الفريق المضيف</label> <input type="text" id="tA" placeholder="جاري التعرف..."> </div>
            <div class="input-group"> <label>الفريق الضيف</label> <input type="text" id="tB" placeholder="جاري التعرف..."> </div>
        </div>

        <div class="odds-grid">
            <div class="odds-item"> <label>مضيف (1)</label> <input type="number" id="c1" step="0.01"> </div>
            <div class="odds-item"> <label>تعادل (X)</label> <input type="number" id="cX" step="0.01"> </div>
            <div class="odds-item"> <label>ضيف (2)</label> <input type="number" id="c2" step="0.01"> </div>
        </div>

        <div class="input-grid">
            <div class="input-group"> <label>xG المضيف</label> <input type="number" id="xgA" step="0.01"> </div>
            <div class="input-group"> <label>xG الضيف</label> <input type="number" id="xgB" step="0.01"> </div>
        </div>

        <div class="factors-grid">
            <button class="f-btn" id="fHome" onclick="toggleFactor('fHome')">🏟️ ملعب</button>
            <button class="f-btn" id="fSpirit" onclick="toggleFactor('fSpirit')">🔥 روح</button>
            <button class="f-btn" id="fMissing" onclick="toggleFactor('fMissing')">🤕 غيابات</button>
            <button class="f-btn" id="fTactics" onclick="toggleFactor('fTactics')">🧠 تكتيك</button>
        </div>

        <button class="btn-analyze" onclick="startAnalysis()">بدء التحليل السيادي ♾️</button>

        <div id="scoreOut">0-0</div>
        <div id="possOut" class="poss-info"></div>
        <div id="marketCode" class="market-code-box"></div>
    </div>

    <div class="archive-section">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:12px; padding-right:10px;">📜 سجل الأرشيف الذهبي الموثق</div>
        <div id="archiveContent"></div>
    </div>

<script>
    let archiveDB = JSON.parse(localStorage.getItem('v13_9_5_final_db')) || [];
    let factors = { fHome: 0, fSpirit: 0, fMissing: 0, fTactics: 0 };

    // --- 1. جزء الرادار المتين (The Robust Radar) ---
    function smartRadar() {
        const raw = document.getElementById('rawData').value.replace(/,/g, '.');
        const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 1);

        // التعرف الذكي على الأسماء (فلترة دقيقة)
        let teamNames = lines.filter(l => !/(\d|xg|rest|odds|missing|:|xG)/i.test(l));
        if (teamNames.length >= 2) {
            document.getElementById('tA').value = teamNames[0];
            document.getElementById('tB').value = teamNames[1];
        }

        // عزل احتمالات السوق (Odds)
        const oddsMatch = raw.match(/Odds:\s*(\d\.\d{1,2})\s*-\s*(\d\.\d{1,2})\s*-\s*(\d\.\d{1,2})/i);
        if (oddsMatch) {
            document.getElementById('c1').value = oddsMatch[1];
            document.getElementById('cX').value = oddsMatch[2];
            document.getElementById('c2').value = oddsMatch[3];
        }

        // عزل قيم xG (تجنب الخلط مع الـ Odds)
        const xgMatch = raw.match(/xG:\s*(\d\.\d{1,2})\s*-\s*(\d\.\d{1,2})/i);
        if (xgMatch) {
            document.getElementById('xgA').value = xgMatch[1];
            document.getElementById('xgB').value = xgMatch[2];
        } else {
            const allNums = raw.match(/(\d\.\d{1,2})/g);
            if (allNums && allNums.length >= 2 && !oddsMatch) {
                document.getElementById('xgA').value = allNums[0];
                document.getElementById('xgB').value = allNums[1];
            }
        }
    }

    // --- 2. جزء العوامل والمحاكاة المليونية ---
    function toggleFactor(id) {
        const btn = document.getElementById(id);
        factors[id] = (factors[id] === 0) ? (id === 'fMissing' ? -0.25 : 0.22) : 0;
        btn.classList.toggle('active');
    }

    function poisson(lambda) {
        let L = Math.exp(-lambda), k = 0, p = 1;
        do { k++; p *= Math.random(); } while (p > L);
        return k - 1;
    }

    function startAnalysis() {
        const xgA = parseFloat(document.getElementById('xgA').value) || 0;
        const xgB = parseFloat(document.getElementById('xgB').value) || 0;
        const cX = parseFloat(document.getElementById('cX').value) || 0;
        const tA = document.getElementById('tA').value || "المضيف";
        const tB = document.getElementById('tB').value || "الضيف";
        
        document.getElementById('scoreOut').innerText = "⏳";
        
        setTimeout(() => {
            let bias = Object.values(factors).reduce((a, b) => a + b, 0);
            let sim = {}, draw = 0, over25 = 0;
            
            for(let i=0; i<1000000; i++) {
                let lA = Math.max(0.1, xgA + bias);
                let lB = Math.max(0.1, xgB - (bias * 0.4));
                let gA = poisson(lA); let gB = poisson(lB);
                let key = `${gA}-${gB}`;
                sim[key] = (sim[key] || 0) + 1;
                if(gA === gB) draw++;
                if((gA+gB) > 2.5) over25++;
            }
            
            let res = Object.keys(sim).reduce((a, b) => sim[a] > sim[b] ? a : b);
            document.getElementById('scoreOut').innerText = res;
            document.getElementById('possOut').innerHTML = `التعادل: ${(draw/10000).toFixed(1)}% | Over 2.5: ${(over25/10000).toFixed(1)}%`;
            
            // شفرة السوق
            const mCode = document.getElementById('marketCode');
            if (cX > 0) {
                mCode.style.display = "block";
                mCode.innerHTML = cX < 3.20 ? "🔍 شفرة السوق: نمط القفل التكتيكي المرصود" : "🔍 شفرة السوق: نمط متوازن تكتيكياً";
            }
            
            saveArchive(tA, tB, res);
        }, 700);
    }

    // --- 3. جزء الأرشفة الذهبية ---
    function saveArchive(a, b, s) {
        archiveDB.unshift({ names: `${a} × ${b}`, score: s, date: new Date().toLocaleTimeString() });
        if(archiveDB.length > 5) archiveDB.pop();
        localStorage.setItem('v13_9_5_final_db', JSON.stringify(archiveDB));
        renderArchive();
    }

    function renderArchive() {
        document.getElementById('archiveContent').innerHTML = archiveDB.map(i => `
            <div class="archive-item">
                <div class="match-score">${i.score}</div>
                <div style="text-align:right;">
                    <div class="match-names">${i.names}</div>
                    <div style="font-size:0.65rem; color:#555;">${i.date} - v13.9.5 PRO</div>
                </div>
            </div>`).join('');
    }
    document.addEventListener('DOMContentLoaded', renderArchive);
</script>
</body>
    </html>
