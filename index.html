<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO - الهاتف</title>
    <style>
        body { background: #000; color: gold; font-family: sans-serif; text-align: center; padding: 15px; }
        .box { border: 2px solid gold; border-radius: 20px; padding: 20px; background: #0a0a0a; max-width: 100%; }
        input { background: #1a1a1a; border: 1px solid gold; color: #fff; padding: 12px; width: 70px; margin: 5px; border-radius: 8px; font-weight: bold; }
        button { background: gold; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 10px; }
        .res-area { margin-top: 20px; display: none; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .score { font-size: 40px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="box">
    <h1>SOVEREIGN PRO</h1>
    <p style="color:#888; font-size:12px;">تحليل البيانات الحقيقية (عبر الهاتف)</p>
    
    <div style="display:flex; justify-content:center;">
        <input type="number" id="h" step="0.01" value="1.56">
        <input type="number" id="x" step="0.01" value="4.20">
        <input type="number" id="a" step="0.01" value="5.25">
    </div>

    <button onclick="startAnalysis()">استخراج النمط الحقيقي</button>

    <div id="res" class="res-area">
        <div id="info" style="font-size:12px; color:#aaa;"></div>
        <div class="score" id="topScore">--</div>
        <div id="acc" style="color:#4caf50; font-weight:bold;"></div>
    </div>
</div>

<script>
    async function startAnalysis() {
        const hIn = parseFloat(document.getElementById('h').value);
        
        // رابط بيانات حقيقي لنتائج الدوري الإنجليزي (EPL) لسنوات
        const url = 'https://githubusercontent.com';
        
        try {
            const response = await fetch(url);
            const data = await response.json();

            // البحث عن تطابق الأنماط
            const matches = data.filter(m => Math.abs(m.B365H - hIn) <= 0.05);

            if (matches.length > 0) {
                const results = matches.map(m => `${m.FTHG}-${m.FTAG}`);
                const counts = results.reduce((a, c) => (a[c] = (a[c] || 0) + 1, a), {});
                const best = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                
                document.getElementById('res').style.display = 'block';
                document.getElementById('topScore').innerText = best;
                document.getElementById('info').innerText = `تم تحليل ${matches.length} مباراة من الأرشيف الحقيقي`;
                document.getElementById('acc').innerText = `الدقة التاريخية: ${((counts[best]/matches.length)*100).toFixed(1)}%`;
            } else {
                alert("لم نعثر على هذا الرقم في الأرشيف، جرب رقماً قريباً.");
            }
        } catch (e) {
            alert("حدث خطأ في جلب البيانات، تأكد من الاتصال بالإنترنت.");
        }
    }
</script>
</body>
</html>
