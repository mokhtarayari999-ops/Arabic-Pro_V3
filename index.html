<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic-Pro | Predictor</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        /* البطاقات السوداء */
        .card {
            background-color: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* البطاقة المميزة (إصابات الضيف) */
        .card.highlight {
            border: 1px solid #ffd700;
        }

        /* عنوان القسم (فريق الضيف) */
        .section-header {
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .label {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #efefef;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input {
            background: transparent;
            border: none;
            color: #ffcc00; /* اللون الذهبي للأرقام */
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            outline: none;
        }

        .btn-generate {
            background: linear-gradient(to bottom, #ffd700, #b8860b);
            color: #000;
            border: none;
            border-radius: 15px;
            padding: 18px;
            width: 100%;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .btn-generate:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- إصابات (الأساسية) -->
        <div class="card">
            <div class="label">إصابات 🤕</div>
            <input type="number" id="homeInjuries" value="0">
        </div>

        <!-- روح قتالية -->
        <div class="card">
            <div class="label">روح قتالية 🔥</div>
            <input type="number" id="homeSpirit" value="75">
        </div>

        <!-- فاصل فريق الضيف -->
        <div class="section-header">
            🏁 فريق الضيف
        </div>

        <!-- هجوم -->
        <div class="card">
            <div class="label">هجوم 🚀</div>
            <input type="number" id="awayAttack" value="70">
        </div>

        <!-- دفاع -->
        <div class="card">
            <div class="label">دفاع 🛡️</div>
            <input type="number" id="awayDefense" value="80">
        </div>

        <!-- إصابات الضيف (المضافة والمميزة) -->
        <div class="card highlight">
            <div class="label">إصابات الضيف 🤕</div>
            <input type="number" id="awayInjuries" value="0">
        </div>

        <!-- زر التوليد -->
        <button class="btn-generate" onclick="calculate()">
            توليد التوقعات 💎
        </button>

        <div id="result" style="margin-top: 20px; text-align: center; font-size: 1.2rem; color: #ffd700;"></div>

    </div>

    <script>
        function calculate() {
            const atk = parseFloat(document.getElementById('awayAttack').value) || 0;
            const def = parseFloat(document.getElementById('awayDefense').value) || 0;
            const inj = parseFloat(document.getElementById('awayInjuries').value) || 0;
            
            // معادلة افتراضية للتوقع بناءً على المعطيات
            let score = ((atk + def) / 2) - (inj * 5);
            
            let resDiv = document.getElementById('result');
            resDiv.innerHTML = "جاري تحليل البيانات... النتيجة المتوقعة: " + Math.max(0, score).toFixed(1) + "%";
        }
    </script>

</body>
</html>
