<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABIC PRO V5 | الأصلي</title>
    <style>
        :root { --gold: #ffcc00; --dark-bg: #000; --card-bg: #0a0a0a; --gray-text: #8a6d3b; }
        body { background-color: var(--dark-bg); color: var(--gold); font-family: 'Segoe UI', Tahoma; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 450px; }
        .header-title { font-size: 2rem; font-weight: bold; text-align: center; margin: 20px 0; letter-spacing: 2px; }
        
        /* تصميم المدخلات */
        .main-box { background: var(--card-bg); border: 1px solid #1a1a1a; border-radius: 25px; padding: 20px; margin-bottom: 15px; }
        .input-item { background: #000; border: 1px solid #222; border-radius: 15px; padding: 12px; margin-bottom: 10px; text-align: center; }
        .input-item label { display: block; font-size: 0.8rem; color: #fff; margin-bottom: 5px; }
        input { background: transparent; border: none; color: var(--gold); font-size: 1.8rem; font-weight: bold; text-align: center; width: 100%; outline: none; }

        /* الزر السيادي */
        .btn-predict { background: linear-gradient(180deg, #ffcc00 0%, #b8860b 100%); color: #000; border: none; border-radius: 20px; padding: 20px; width: 100%; font-size: 1.5rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 5px 15px rgba(255,204,0,0.2); }

        /* لوحة النتائج المئوية */
        .result-panel { background: var(--card-bg); border-radius: 25px; padding: 20px; margin-top: 20px; border: 1px solid #151515; }
        .percentage-bar { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .p-item { text-align: center; }
        .p-val { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .p-label { font-size: 0.7rem; color: var(--gray-text); }

        /* تفاصيل إضافية */
        .detail-row { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #111; font-size: 0.9rem; }
        .detail-val { color: #fff; font-weight: bold; }

        /* سجل التحليلات */
        .history-title { margin-top: 30px; text-align: right; font-size: 1.1rem; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">ARABIC PRO V5</div>

    <!-- الفريق المضيف -->
    <div class="main-box">
        <div style="color:#fff; margin-bottom:10px;">🏟️ الفريق المضيف</div>
        <div class="input-item"><label>الهجوم</label><input type="number" id="h_atk" value="85"></div>
        <div class="input-item"><label>الدفاع</label><input type="number" id="h_def" value="75"></div>
        <div class="input-item" style="border-color: #333;"><label>الأرض والجمهور</label><input type="number" id="h_adv" value="10"></div>
    </div>

    <!-- الفريق الضيف -->
    <div class="main-box">
        <div style="color:#fff; margin-bottom:10px;">🏁 الفريق الضيف</div>
        <div class="input-item"><label>الهجوم</label><input type="number" id="a_atk" value="70"></div>
        <div class="input-item"><label>الدفاع</label><input type="number" id="a_def" value="80"></div>
        <div class="input-item" style="border-color: #ffcc00;"><label>إصابات الضيف 🤕</label><input type="number" id="a_inj" value="0"></div>
    </div>

    <button class="btn-predict" onclick="analyzeMatch()">توليد التوقعات 👑</button>

    <!-- النتائج النهائية -->
    <div class="result-panel" id="results" style="display:none;">
        <div class="percentage-bar">
            <div class="p-item"><div class="p-val" id="res_win">0%</div><div class="p-label">فوز</div></div>
            <div class="p-item"><div class="p-val" id="res_draw">0%</div><div class="p-label">تعادل</div></div>
            <div class="p-item"><div class="p-val" id="res_lose">0%</div><div class="p-label">خسارة</div></div>
        </div>
        
        <div class="detail-row"><span>النتيجة المتوقعة:</span> <span class="detail-val" id="res_score">0-0</span></div>
        <div class="detail-row"><span>الركنيات (Corners):</span> <span class="detail-val" id="res_corners">0+</span></div>
        <div class="detail-row"><span>البطاقات الصفراء:</span> <span class="detail-val" id="res_cards">0</span></div>
    </div>

    <div class="history-title">📜 سجل التحليلات الذهبي</div>
    <div id="historyList" style="margin-top:10px;"></div>
</div>

<script>
function analyzeMatch() {
    // استلام القيم
    const hAtk = parseInt(document.getElementById('h_atk').value) || 0;
    const hDef = parseInt(document.getElementById('h_def').value) || 0;
    const hAdv = parseInt(document.getElementById('h_adv').value) || 0;
    const aAtk = parseInt(document.getElementById('a_atk').value) || 0;
    const aDef = parseInt(document.getElementById('a_def').value) || 0;
    const aInj = parseInt(document.getElementById('a_inj').value) || 0;

    // الخوارزمية السيادية
    let hPower = (hAtk * 1.2) + hAdv;
    let aPower = (aAtk * 1.1) - (aInj * 2);
    let total = hPower + aPower;

    // حساب النسب
    document.getElementById('res_win').innerText = Math.round((hPower/total)*100) + "%";
    document.getElementById('res_lose').innerText = Math.round((aPower/total)*100) + "%";
    document.getElementById('res_draw').innerText = "22%";

    // التوقعات
    let hGoals = Math.floor(hPower / 40);
    let aGoals = Math.floor(aPower / 45);
    document.getElementById('res_score').innerText = hGoals + " - " + aGoals;
    document.getElementById('res_corners').innerText = Math.floor((hAtk+aAtk)/18) + " ركنية";
    document.getElementById('res_cards').innerText = Math.floor((hDef+aDef)/35) + " بطاقة";

    document.getElementById('results').style.display = 'block';

    // إضافة للسجل
    let hist = document.getElementById('historyList');
    let item = document.createElement('div');
    item.style = "background:#111; padding:10px; border-radius:10px; margin-bottom:5px; font-size:0.8rem; color:#888;";
    item.innerHTML = `مباراة جديدة: النتيجة المتوقعة <b>${hGoals}-${aGoals}</b>`;
    hist.prepend(item);
}
</script>

</body>
        </html>
