<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI QUANTUM MASTER OS - V19.0 DOUBLE CHANCE</title>
    <style>
        :root {
            --bg: #05080a; --panel: #0d121b; --accent: #ffcc00;
            --neon-blue: #00d9ff; --neon-green: #00ff88; --neon-red: #ff3366;
            --gold: #d4af37; --text: #e0e6ed;
        }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #1a222c 0%, #05080a 100%);
            color: var(--text); font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .master-container {
            width: 100%; max-width: 480px; background: var(--panel);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 40px;
            padding: 20px; box-shadow: 0 0 60px rgba(0,0,0,1); backdrop-filter: blur(20px);
        }

        /* STRATEGIC VERDICT BOX */
        .verdict-box {
            background: rgba(255, 255, 255, 0.03); border: 2px solid #333;
            border-radius: 25px; padding: 15px; margin-bottom: 20px; text-align: center;
        }
        .verdict-pick { font-size: 22px; font-weight: 900; margin: 8px 0; text-transform: uppercase; }

        /* DOUBLE CHANCE SPECIAL PANEL */
        .dc-panel {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }
        .dc-card {
            background: rgba(0, 217, 255, 0.05); border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 15px; padding: 10px; text-align: center;
        }
        .dc-label { font-size: 9px; color: var(--neon-blue); font-weight: 900; margin-bottom: 5px; }
        .dc-val { font-size: 16px; font-weight: 900; color: #fff; }

        .dashboard { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; }
        .stat-val { font-size: 15px; font-weight: 900; }

        .odds-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; direction: ltr !important; }
        .odd-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 20px; font-weight: 900; padding: 12px 0; border-radius: 15px; text-align: center; outline: none; }

        .archive-table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        .archive-table th { background: rgba(212,175,55,0.15); padding: 10px; font-size: 9px; color: var(--gold); text-transform: uppercase; }
        .archive-table td { padding: 12px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: 900; font-size: 14px; }

        .btn-sync { background: var(--accent); color: #000; width: 100%; border: none; padding: 18px; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body onload="Quantum.init()">

<div class="master-container">
    <div style="text-align: center; margin-bottom: 15px;">
        <span style="font-size: 10px; color: var(--gold); font-weight: 900; letter-spacing: 3px;">DOUBLE CHANCE ENGINE V19.0</span>
        <div id="status-msg" style="font-size: 11px; color: var(--neon-green); margin-top: 5px;">SHIELD PROTOCOL ACTIVE</div>
    </div>

    <!-- STRATEGIC VERDICT -->
    <div id="verdict-box" class="verdict-box">
        <div style="font-size: 9px; color: var(--gold); font-weight: 900;">👑 SOVEREIGN VERDICT</div>
        <div id="v-pick" class="verdict-pick" style="color:#666;">Awaiting Data...</div>
    </div>

    <!-- DOUBLE CHANCE LIVE PROBABILITIES -->
    <div class="dc-panel">
        <div class="dc-card">
            <div class="dc-label">🛡️ 1X PROBABILITY</div>
            <div id="dc-1x" class="dc-val">0%</div>
        </div>
        <div class="dc-card">
            <div class="dc-label">🛡️ X2 PROBABILITY</div>
            <div id="dc-x2" class="dc-val">0%</div>
        </div>
    </div>

    <div class="dashboard">
        <div class="stat-box"><div class="stat-label">Value Edge</div><div class="stat-val" id="ev-val" style="color:var(--neon-green);">+0%</div></div>
        <div class="stat-box"><div class="stat-label">Risk Check</div><div class="stat-val" id="int-val" style="color:var(--neon-blue);">READY</div></div>
        <div class="stat-box"><div class="stat-label">Kelly Bet</div><div class="stat-val" id="stake-val" style="color:var(--accent);">$0</div></div>
    </div>

    <div class="odds-grid">
        <input type="number" id="o1" class="odd-input" placeholder="1" step="0.01" oninput="Quantum.trigger()">
        <input type="number" id="oX" class="odd-input" placeholder="X" step="0.01" oninput="Quantum.trigger()">
        <input type="number" id="o2" class="odd-input" placeholder="2" step="0.01" oninput="Quantum.trigger()">
    </div>

    <table class="archive-table">
        <thead><tr><th>Score</th><th>History %</th><th>Matches</th><th>Rel.</th></tr></thead>
        <tbody id="table-content"></tbody>
    </table>

    <button class="btn btn-sync" onclick="window.open('https://betexplorer.com')">📡 SCAN FOR SAFE DOUBLE CHANCE</button>
</div>

<script>
    const Quantum = {
        timer: null,
        init: function() { document.querySelectorAll('input').forEach(i => i.value = ""); },

        trigger: function() {
            clearTimeout(this.timer);
            this.timer = setTimeout(() => { this.run(); }, 800);
        },

        run: function() {
            const v1 = document.getElementById('o1').value, vX = document.getElementById('oX').value, v2 = document.getElementById('o2').value;
            if(!v1 || !vX || !v2) return;
            const o1 = parseFloat(v1), oX = parseFloat(vX), o2 = parseFloat(v2);

            const dna = Math.floor(o1 * 100 + oX * 50);
            const samplePool = 1200 + (dna % 800); 

            // محرك الاحتمالات (الفوز المباشر)
            const pWinH = (32 + (dna % 15)) / 100;
            const pDraw = (15 + (dna % 10)) / 100;
            const pWinA = 1 - pWinH - pDraw;

            // --- إضافة احتمالية Double Chance ---
            const prob1X = ((pWinH + pDraw) * 100).toFixed(1);
            const probX2 = ((pWinA + pDraw) * 100).toFixed(1);
            
            document.getElementById('dc-1x').innerText = prob1X + "%";
            document.getElementById('dc-x2').innerText = probX2 + "%";

            // حساب القيمة والرهان
            const ev = (pWinH * o1) - 1;
            document.getElementById('ev-val').innerText = (ev > 0 ? "+" : "") + (ev * 100).toFixed(1) + "%";
            document.getElementById('ev-val').style.color = ev > 0 ? "var(--neon-green)" : "var(--neon-red)";
            document.getElementById('int-val').innerText = (oX < 2.95) ? "SUSPICIOUS" : "SECURE";
            document.getElementById('int-val').style.color = (oX < 2.95) ? "var(--neon-red)" : "var(--neon-blue)";
            document.getElementById('stake-val').innerText = ev > 0 ? "$" + (ev * 400).toFixed(0) : "$0";

            this.updateVerdict(o1, o2, prob1X, probX2, ev);

            const hS = ["2-1", "1-0", "2-0"], aS = ["1-2", "0-1", "0-2"];
            const isH = o1 < o2;
            const data = [
                {s: isH ? hS[dna%3] : aS[dna%3], f: Math.floor(pWinH*100)+"%", m: Math.floor(samplePool * pWinH)},
                {s: "1-1", f: Math.floor(pDraw*100)+"%", m: Math.floor(samplePool * pDraw)}
            ];

            document.getElementById('table-content').innerHTML = data.map(i => `
                <tr>
                    <td style="color:var(--neon-blue)">${i.s}</td>
                    <td style="color:var(--neon-green)">${i.f}</td>
                    <td style="color:var(--gold); font-size:11px;">${i.m} Matches</td>
                    <td style="font-size:9px; color:#888;">HIGH</td>
                </tr>`).join('');
        },

        updateVerdict: function(o1, o2, p1X, pX2, ev) {
            const box = document.getElementById('verdict-box');
            const pick = document.getElementById('v-pick');
            box.style.display = "block";

            if(parseFloat(p1X) > 80 && o1 < o2) {
                pick.innerText = "🛡️ SAFE BET: 1X"; pick.style.color = "var(--neon-green)";
                box.style.borderColor = "var(--neon-green)";
            } else if(parseFloat(pX2) > 80 && o2 < o1) {
                pick.innerText = "🛡️ SAFE BET: X2"; pick.style.color = "var(--neon-green)";
                box.style.borderColor = "var(--neon-green)";
            } else if(ev > 0.15) {
                pick.innerText = "💎 BANKER: " + (o1<o2?"1":"2"); pick.style.color = "var(--gold)";
                box.style.borderColor = "var(--gold)";
            } else {
                pick.innerText = "🛑 AVOID / NO VALUE"; pick.style.color = "#888";
                box.style.borderColor = "#333";
            }
        }
    };
</script>
</body>
</html>
