<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | Neural Logic v3.5</title>
    <style>
        /* الجزء 1: الهوية البصرية النيونية */
        :root { 
            --neon-gold: #ffcc00; 
            --neon-blue: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .main-card { 
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 204, 0, 0.2);
            border-radius: 40px; padding: 30px; width: 100%; max-width: 420px; 
            text-align: center; position: relative; box-shadow: 0 0 60px rgba(0,0,0,1);
            z-index: 1; overflow: hidden;
        }

        .scanline { 
            width: 100%; height: 10px; 
            background: linear-gradient(to bottom, transparent, rgba(255, 204, 0, 0.05), transparent); 
            position: absolute; top: 0; left: 0; animation: scan 4s linear infinite; 
        }
        @keyframes scan { from { top: -10%; } to { top: 110%; } }

        h1 { font-size: 28px; font-weight: 900; letter-spacing: 2px; color: var(--neon-gold); text-shadow: 0 0 15px rgba(255,204,0,0.4); margin: 5px 0; }
        .system-status { font-size: 9px; color: #4caf50; letter-spacing: 2px; margin-bottom: 25px; font-weight: bold; }

        /* حقول الإدخال */
        .inputs-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 25px; }
        .field-group { width: 32%; }
        .field-label { font-size: 9px; color: #666; margin-bottom: 5px; display: block; }
        .field { 
            width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: var(--neon-gold); padding: 15px 0;
            font-size: 20px; font-weight: bold; text-align: center; outline: none;
            border-bottom: 3px solid var(--neon-gold); transition: 0.3s;
        }
        .field:focus { background: rgba(255,204,0,0.1); box-shadow: 0 0 15px rgba(255,204,0,0.2); }

        .btn-engage {
            background: linear-gradient(180deg, var(--neon-gold), #b8860b);
            border: none; border-radius: 20px; padding: 20px; width: 100%;
            color: #000; font-size: 18px; font-weight: 900; cursor: pointer;
            transition: 0.4s; text-transform: uppercase; box-shadow: 0 5px 20px rgba(255,204,0,0.3);
        }
        .btn-engage:active { transform: scale(0.96); }

        /* منطقة النتائج (Home / Away) */
        .display-node { 
            margin-top: 30px; padding: 25px; border-radius: 30px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            display: none; animation: slideIn 0.6s ease-out; position: relative;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .gap-active { border: 2px solid var(--neon-blue) !important; box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); }
        .badge-gap { 
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: var(--neon-blue); color: #000; padding: 4px 14px;
            border-radius: 10px; font-size: 10px; font-weight: 900;
        }

        .home-away-header { display: flex; justify-content: space-between; font-size: 10px; color: #555; letter-spacing: 2px; margin-bottom: 10px; }
        .score-ultra { font-size: 70px; font-weight: 900; color: #fff; letter-spacing: 5px; margin: 10px 0; }
        
        .power-bar { width: 100%; height: 5px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .power-fill { height: 100%; background: var(--neon-blue); width: 0%; transition: 1.5s; box-shadow: 0 0 10px var(--neon-blue); }

        /* الأنماط البديلة */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .data-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .data-score { font-size: 17px; font-weight: bold; color: var(--neon-gold); }
    </style>
</head>
<body>

<div class="main-card">
    <div class="scanline"></div>
    <div class="system-status" id="status">● READY FOR NEURAL ANALYSIS</div>
    <h1>SOVEREIGN PRO</h1>
    <div style="font-size: 9px; color: #444; letter-spacing: 2px; margin-bottom: 20px;">HOME / AWAY LOGIC v3.5</div>

    <div class="inputs-row">
        <div class="field-group"><span class="field-label">HOME (1)</span><input type="number" id="v-h" value="1.62" class="field"></div>
        <div class="field-group"><span class="field-label">DRAW (X)</span><input type="number" id="v-x" value="4.10" class="field"></div>
        <div class="field-group"><span class="field-label">AWAY (2)</span><input type="number" id="v-a" value="5.25" class="field"></div>
    </div>

    <button class="btn-engage" onclick="processAnalysis()">Engage Analysis</button>

    <div id="display" class="display-node">
        <div id="gap-tag" class="badge-gap" style="display:none;">STRATEGIC GAP FOUND</div>
        <div class="home-away-header"><span>HOME</span><span>AWAY</span></div>
        <div class="score-ultra" id="res-score">--</div>
        <div id="res-freq" style="color: var(--neon-blue); font-size: 12px; font-weight: bold;">STRENGTH: 0%</div>
        <div class="power-bar"><div id="res-fill" class="power-fill"></div></div>
        <div class="data-grid" id="alt-grid"></div>
    </div>
</div>

<script>
    /* أرشيف البيانات - الترتيب: [Home] - [Away] */
    const db = [
        {
            home_odds: 1.62,
            patterns: [
                {s: "1 - 2", f: 42.1, type: "surprise"}, // فوز ليدز (الضيف)
                {s: "1 - 1", f: 28.7, type: "normal"},
                {s: "0 - 1", f: 15.2, type: "normal"},
                {s: "2 - 1", f: 9.4, type: "normal"}
            ]
        },
        {
            home_odds: 2.10,
            patterns: [
                {s: "1 - 1", f: 38.5, type: "normal"},
                {s: "0 - 1", f: 22.4, type: "surprise"}
            ]
        }
    ];

    function processAnalysis() {
        const hIn = parseFloat(document.getElementById('v-h').value);
        const aIn = parseFloat(document.getElementById('v-a').value);
        const status = document.getElementById('status');

        status.innerText = "● SCANNING HISTORICAL LAYERS...";
        status.style.color = "var(--neon-blue)";

        setTimeout(() => {
            let match = db.reduce((p, c) => Math.abs(c.home_odds - hIn) < Math.abs(p.home_odds - hIn) ? c : p);
            
            // حساب الفجوة بناءً على Cote الضيف (Away) لأنه هو الذي سجل المفاجأة
            const marketProb = (1 / aIn) * 100;
            const ourProb = match.patterns[0].f;
            const gap = ourProb - marketProb;

            const display = document.getElementById('display');
            display.style.display = 'block';
            
            // عرض النتيجة بصيغة Home - Away
            document.getElementById('res-score').innerText = match.patterns[0].s;
            document.getElementById('res-freq').innerText = `STRENGTH: ${match.patterns[0].f}%`;
            document.getElementById('res-fill').style.width = match.patterns[0].f + "%";

            const gapTag = document.getElementById('gap-tag');
            if (gap >= 10) {
                display.classList.add('gap-active');
                gapTag.style.display = 'block';
                gapTag.innerText = `WINNING GAP: +${gap.toFixed(1)}%`;
            } else {
                display.classList.remove('gap-active');
                gapTag.style.display = 'none';
            }

            let html = '';
            for(let i=1; i < match.patterns.length; i++) {
                html += `
                <div class="data-item">
                    <div style="font-size:8px; color:#444; margin-bottom:5px;">ALT PATTERN</div>
                    <div class="data-score">${match.patterns[i].s}</div>
                    <div style="font-size:11px; color:#4caf50;">${match.patterns[i].f}%</div>
                </div>`;
            }
            document.getElementById('alt-grid').innerHTML = html;
            status.innerText = "● ANALYSIS COMPLETE";
            status.style.color = "#4caf50";
        }, 1000);
    }
</script>
</body>
</html>
