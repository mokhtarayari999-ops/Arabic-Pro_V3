<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Pro V5</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* حاوية المدخلات الكبيرة */
        .input-box {
            background-color: #111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .label-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: 1rem;
            color: #ddd;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: #FFD700;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            outline: none;
        }

        /* الحقول الرمادية الصغيرة */
        .sub-input {
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            border: 1px solid #222;
        }

        /* الزر الذهبي السيادي */
        .btn-predict {
            background: linear-gradient(180deg, #FFD700 0%, #C5A000 100%);
            color: #000;
            width: 100%;
            padding: 18px;
            border-radius: 25px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        /* صندوق النتيجة */
        .result-box {
            background-color: #0c0c0c;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 25px;
            margin-top: 15px;
            text-align: center;
        }

        .result-label { color: #8a6d3b; font-size: 0.9rem; margin-bottom: 10px; }
        .score { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- حقل الهجوم -->
    <div class="input-box">
        <div class="label-row">🚀 هجوم</div>
        <input type="number" id="atk" value="70">
    </div>

    <!-- حقل الدفاع -->
    <div class="input-box">
        <div class="label-row">🛡️ دفاع</div>
        <input type="number" id="def" value="80">
    </div>

    <!-- الحقول الإضافية مع إضافة الإصابات المفقودة -->
    <div class="sub-input">🤕 إصابات</div>
    <div class="sub-input">🔥 روح عالية</div>
    <div class="sub-input">✈️ سفر شاق</div>
    <div class="sub-input">😫 إرهاق</div>

    <!-- الزر كما في الصورة -->
    <button class="btn-predict">توليد التوقعات السيادية 👑</button>

    <!-- النتيجة النهائية -->
    <div class="result-box">
        <div class="result-label">النتيجة النهائية المتوقعة</div>
        <div class="score">0 - 0</div>
    </div>

</div>

</body>
</html>
