<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Pro V5 | السجل والتحليل</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; }
        
        /* إدخال أسماء الفرق */
        .team-inputs { display: flex; gap: 10px; margin-bottom: 15px; }
        .team-field { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 12px; color: #ffcc00; text-align: center; width: 50%; font-weight: bold; outline: none; }

        /* حاوية المدخلات الرئيسية */
        .main-card { background: #0a0a0a; border-radius: 30px; padding: 20px; border: 1px solid #1a1a1a; margin-bottom: 15px; }
        .label-row { display: flex; justify-content: flex-end; align-items: center; gap: 8px; font-size: 0.9rem; color: #ccc; margin-bottom: 5px; }
        
        .num-input { background: #000; border: 1px solid #1a1a1a; border-radius: 15px; padding: 10px; text-align: center; font-size: 2rem; font-weight: bold; color: #ffcc00; width: 100%; outline: none; margin-bottom: 15px; }

        .opt-btn { background: #121212; border: 1px solid #1a1a1a; border-radius: 15px; padding: 10px; margin-bottom: 8px; text-align: center; color: #555; font-size: 0.9rem; }

        /* الزر الذهبي */
        .predict-btn { background: linear-gradient(to bottom, #ffcc00, #b8860b); color: #000; border: none; border-radius: 25px; padding: 18px; width: 100%; font-size: 1.4rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2); }

        /* النتيجة والسجل */
        .res-card { background: #0a0a0a; border-radius: 30px; padding: 20px; border: 1px solid #1a1a1a; text-align: center; margin-top: 15px; }
        .res-label { color: #8a6d3b; font-size: 0.85rem; margin-bottom: 10px; display: block; }
        .score-text { font-size: 1.8rem; font-weight: bold; letter-spacing: 3px; }

        .history-section { width: 100%; margin-top: 25px; border-top: 1px solid #1a1a1a; padding-top: 15px; }
        .history-title { color: #ffcc00; font-size: 1rem; margin-bottom: 10px; text-align: right; }
        .history-card { background: #080808; border-radius: 15px; padding: 12px; margin-bottom: 8px; border-right: 4px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="team-inputs">
        <input type="text" id="hName" class="team-field" placeholder="المضيف">
        <input type="text" id="aName" class="team-field" placeholder="الضيف">
    </div>

    <div class="main-card">
        <div class="label-row">🚀 هجوم</div>
        <input type="number" id="atkVal" class="num-input" value="70">

        <div class="label-row">🛡️ دفاع</div>
        <input type="number" id="defVal" class="num-input" value="80">

        <div class="opt-btn">🤕 إصابات</div>
        <div class="opt-btn">🔥 روح عالية</div>
    </div>

    <button class="predict-btn" onclick="runAnalysis()">توليد التوقعات السيادية 👑</button>

    <div class="res-card">
        <span class="res-label">النتيجة النهائية المتوقعة</span>
        <div class="score-text" id="currentScore">0 - 0</div>
    </div>

    <!-- السجل المطلوب -->
    <div class="history-section">
        <div class="history-title">📜 سجل التحليلات الذهبي</div>
        <div id="log"></div>
    </div>
</div>

<script>
function runAnalysis() {
    const h = document.getElementById('hName').value || "فريق 1";
    const a = document.getElementById('aName').value || "فريق 2";
    const atk = document.getElementById('atkVal').value;
    const def = document.getElementById('defVal').value;

    // معادلة Arabic Pro V5
    const s1 = Math.floor(atk / 25);
    const s2 = Math.floor(def / 35);
    const final = `${s1} - ${s2}`;

    document.getElementById('currentScore').innerText = final;

    // إضافة للسجل
    const log = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = 'history-card';
    entry.innerHTML = `<span>${h} VS ${a}</span> <b>${final}</b>`;
    log.prepend(entry);
}
</script>

</body>
</html>
