<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABIC-PRO AI INFINITY // ULTIMATE MODEL</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .header-title { color: var(--gold); font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 25px; opacity: 0.8; }
        
        .main-container {
            background: #0a0a0a; border: 1px solid var(--gold); border-radius: 30px;
            padding: 30px; max-width: 420px; margin: 0 auto 35px auto;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.1);
        }

        textarea {
            width: 100%; height: 110px; background: #1a1a1a; border: none;
            border-radius: 20px; color: #fff; padding: 20px; box-sizing: border-box;
            resize: none; outline: none; text-align: center; font-size: 1.1rem;
        }

        .options-row { display: flex; justify-content: space-around; margin: 25px 0; font-size: 0.75rem; color: #888; }

        .simulate-btn {
            background: linear-gradient(to bottom, #f1c40f, #d4af37); color: #000;
            border: none; width: 100%; padding: 20px; border-radius: 18px;
            font-weight: 900; cursor: pointer; font-size: 1.2rem; transition: 0.3s;
        }

        .accuracy-box { margin-top: 25px; }
        .accuracy-text { font-size: 0.75rem; color: var(--gold); margin-bottom: 10px; }
        .bar-container { width: 100%; height: 4px; background: #222; border-radius: 10px; overflow: hidden; }
        #fillBar { width: 0%; height: 100%; background: var(--gold); transition: 2s ease-out; }

        .result-display { font-size: 5.5rem; font-weight: 900; margin: 25px 0; text-shadow: 0 0 20px var(--gold); }

        /* سجل الأرشيف الذهبي المطور */
        .archive-section { max-width: 420px; margin: 0 auto; text-align: right; }
        .archive-title { color: var(--gold); font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .archive-item {
            background: #0a0a0a; border: 1px solid #222; padding: 15px 20px;
            border-radius: 20px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px; border-right: 4px solid var(--gold);
        }

        .match-details { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; margin-right: 15px; }
        .team-names { color: #fff; font-size: 0.9rem; font-weight: bold; }
        .match-meta { font-size: 0.7rem; color: #555; }
        .archive-score { color: var(--gold); font-size: 1.8rem; font-weight: 900; min-width: 60px; text-align: center; }

        .del-btn {
            background: none; border: 1px solid #ff4444; color: #ff4444;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header-title">ARABIC-PRO AI INFINITY // ULTIMATE MODEL</div>

    <div class="main-container">
        <textarea id="inputData" placeholder="Arsenal vs Bournemouth"></textarea>
        
        <div class="options-row">
            <span>🤕 إصابات</span> | <span>🔥 روح قتالية</span> | <span>✈️ سفر شاق</span> | <span>😫 إرهاق</span>
        </div>

        <button class="simulate-btn" onclick="startUltimateSim()">محاكاة مليون مباراة ♾️</button>

        <div class="accuracy-box">
            <div class="accuracy-text">دقة الاستنتاج العصبي: <span id="accLabel">0%</span></div>
            <div class="bar-container"><div id="fillBar"></div></div>
        </div>

        <div class="result-display" id="mainScore">0-0</div>
    </div>

    <div class="archive-section">
        <div class="archive-title">📜 سجل الأرشيف الذهبي الموثق</div>
        <div id="archiveContent"></div>
    </div>

<script>
    let localDB = JSON.parse(localStorage.getItem('infinite_archive_v4')) || [];

    function startUltimateSim() {
        const text = document.getElementById('inputData').value;
        const scoreUI = document.getElementById('mainScore');
        const bar = document.getElementById('fillBar');
        const accUI = document.getElementById('accLabel');

        // استخراج أسماء الفرق (أول سطرين أو الكلمات قبل الأرقام)
        let teams = text.split('\n').slice(0, 2).join(' vs ') || "مباراة غير مسمى";

        scoreUI.innerText = "---";
        bar.style.width = "0%";

        setTimeout(() => {
            let bias = 0;
            if(text.toLowerCase().includes("arsenal")) bias += 0.7;
            
            let simStore = {};
            for(let i=0; i<1000000; i++) {
                let sA = Math.round(Math.abs(Math.random() * 3 + bias));
                let sB = Math.round(Math.abs(Math.random() * 2));
                let key = `${sA}-${sB}`;
                simStore[key] = (simStore[key] || 0) + 1;
            }

            let winnerRes = Object.keys(simStore).reduce((a, b) => simStore[a] > simStore[b] ? a : b);
            let confidence = Math.min(99.4, (simStore[winnerRes] / 10000) + 88).toFixed(1);

            scoreUI.innerText = winnerRes;
            accUI.innerText = confidence + "%";
            bar.style.width = confidence + "%";

            // حفظ النتيجة مع أسماء الفرق
            localDB.unshift({ 
                id: Date.now(), 
                res: winnerRes, 
                conf: confidence,
                teams: teams 
            });
            updateUI();
        }, 1500);
    }

    function updateUI() {
        localStorage.setItem('infinite_archive_v4', JSON.stringify(localDB));
        const list = document.getElementById('archiveContent');
        list.innerHTML = localDB.map(item => `
            <div class="archive-item">
                <div class="archive-score">${item.res}</div>
                <div class="match-details">
                    <div class="team-names">${item.teams}</div>
                    <div class="match-meta">دقة الاستنتاج: ${item.conf}%</div>
                </div>
                <button class="del-btn" onclick="removeItem(${item.id})">×</button>
            </div>
        `).join('');
    }

    function removeItem(id) {
        localDB = localDB.filter(x => x.id !== id);
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
