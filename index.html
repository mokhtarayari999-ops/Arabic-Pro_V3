<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الأرشيف الذهبي</title>
    <style>
        /* التنسيق العام للتطبيق - أسود وذهبي */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
        }

        /* حاوية السجل الرئيسية كما في الصورة */
        .archive-card {
            width: 90%;
            max-width: 400px;
            background-color: #111;
            border: 1px solid #d4af37;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        /* الرأس الذهبي */
        .archive-header {
            background-color: #d4af37;
            color: #000;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* سطر المباراة */
        .match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            transition: 0.3s ease;
        }

        /* زر الفسخ (X) الدائري */
        .btn-delete {
            background-color: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-delete:hover {
            background-color: #ff4444;
            color: #fff;
        }

        /* أسماء الفرق */
        .teams-name {
            flex-grow: 1;
            text-align: center;
            font-size: 0.95rem;
            color: #ccc;
        }

        /* النتيجة بالذهبي */
        .match-score {
            color: #d4af37;
            font-size: 1.3rem;
            font-weight: bold;
            margin-right: 15px;
        }

        /* تأثير الحذف */
        .fade-out {
            opacity: 0;
            transform: translateX(20px);
        }
    </style>
</head>
<body>

    <div class="archive-card">
        <div class="archive-header">
            <span>🏆</span> سجل الأرشيف الذهبي
        </div>
        <div id="archive-list">
            <!-- سيتم توليد العناصر هنا بواسطة JS -->
        </div>
    </div>

<script>
    // 1. إدارة البيانات (جلب المحفوظ أو وضع افتراضي)
    let myMatches = JSON.parse(localStorage.getItem('myMatchesData')) || [
        { id: 1, teams: "westham vs wolves", score: "1-0" },
        { id: 2, teams: "Real Madrid vs Barca", score: "3-2" }
    ];

    const listContainer = document.getElementById('archive-list');

    // 2. وظيفة بناء الواجهة
    function renderApp() {
        listContainer.innerHTML = '';
        
        if (myMatches.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; padding:20px; color:#555;">السجل فارغ</p>';
            return;
        }

        myMatches.forEach(match => {
            const row = document.createElement('div');
            row.className = 'match-row';
            row.id = `m-${match.id}`;
            row.innerHTML = `
                <button class="btn-delete" onclick="deleteMatch(${match.id})">✕</button>
                <div class="teams-name">${match.teams}</div>
                <div class="match-score">${match.score}</div>
            `;
            listContainer.appendChild(row);
        });
    }

    // 3. وظيفة الفسخ والتحديث في الذاكرة
    function deleteMatch(id) {
        const rowElement = document.getElementById(`m-${id}`);
        rowElement.classList.add('fade-out');

        setTimeout(() => {
            // حذف من المصفوفة
            myMatches = myMatches.filter(m => m.id !== id);
            // حفظ في ذاكرة المتصفح (LocalStorage)
            localStorage.setItem('myMatchesData', JSON.stringify(myMatches));
            // إعادة البناء
            renderApp();
        }, 300);
    }

    // تشغيل التطبيق فور التحميل
    renderApp();
</script>

</body>
</html>
