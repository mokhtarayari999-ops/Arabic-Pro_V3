<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABIC-PRO AI INFINITY</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 1px solid #d4af37; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        h2 { color: #d4af37; font-size: 1rem; }
        input { width: 80%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { background: #d4af37; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* قسم السجل */
        .archive-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        .score { color: #d4af37; font-weight: bold; }
        .btn-delete { background: none; border: 1px solid #ff4444; color: #ff4444; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>ARABIC-PRO AI INFINITY // ULTIMATE</h2>

    <!-- قسم المحاكاة (الذي ظهر في صورتك) -->
    <div class="card">
        <textarea id="dataInput" placeholder="الصق بيانات المباراة هنا" style="width:90%; height:60px; background:#222; color:#fff; border-radius:5px;"></textarea>
        <div>
            <p>🤕 إصابات | 🔥 روح قتالية | ✈️ سفر شاق | 😫 إرهاق</p>
            <button onclick="simulate()">محاكاة مليون مباراة ♾️</button>
        </div>
        <h1 id="liveScore">0-0</h1>
    </div>

    <!-- قسم الأرشيف الذهبي (الذي كنا نعدله) -->
    <div class="card">
        <h3 style="color:#d4af37">📜 سجل الأرشيف الذهبي</h3>
        <div id="archiveList"></div>
    </div>

    <script>
        let archive = JSON.parse(localStorage.getItem('myAppArchive')) || [];

        function simulate() {
            // محاكاة سريعة للنتيجة
            const s1 = Math.floor(Math.random() * 4);
            const s2 = Math.floor(Math.random() * 4);
            const res = `${s1}-${s2}`;
            document.getElementById('liveScore').innerText = res;

            // إضافة النتيجة للسجل تلقائياً
            const newMatch = { id: Date.now(), teams: "مباراة محاكاة", score: res };
            archive.unshift(newMatch);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myAppArchive', JSON.stringify(archive));
            const list = document.getElementById('archiveList');
            list.innerHTML = '';
            archive.forEach(m => {
                list.innerHTML += `
                    <div class="archive-item">
                        <span class="score">${m.score}</span>
                        <span>${m.teams}</span>
                        <button class="btn-delete" onclick="deleteMatch(${m.id})">×</button>
                    </div>`;
            });
        }

        function deleteMatch(id) {
            archive = archive.filter(m => m.id !== id);
            saveAndRender();
        }

        // تشغيل العرض عند الفتح
        saveAndRender();
    </script>
</body>
</html>
