<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HISTORICAL FULL SPECTRUM ENGINE - V3.0</title>
    <style>
        :root {
            --bg: #0d131a; --panel: #1a222c; --accent: #ffcc00;
            --neon-blue: #00d9ff; --neon-green: #00ff88; --neon-red: #ff3366;
            --text: #e0e6ed; --glass: rgba(255, 255, 255, 0.03);
        }
        body {
            background: radial-gradient(circle at center, #1a222c 0%, #0d131a 100%);
            color: var(--text); font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .app-container {
            width: 100%; max-width: 500px; background: var(--panel);
            border: 1px solid rgba(0, 217, 255, 0.1); border-radius: 30px;
            padding: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); backdrop-filter: blur(15px);
        }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .header h2 { margin: 0; font-size: 18px; color: var(--neon-blue); letter-spacing: 2px; text-transform: uppercase; }

        .odds-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 12px;
            border-radius: 15px; direction: ltr !important;
        }
        .odd-input {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.08);
            color: #fff; font-size: 16px; font-weight: bold; width: 100%;
            padding: 10px 0; border-radius: 10px; text-align: center; outline: none;
        }

        .archive-table {
            width: 100%; border-collapse: collapse; margin-top: 10px;
            background: rgba(0,0,0,0.2); border-radius: 20px; overflow: hidden; font-size: 13px;
        }
        .archive-table th { background: rgba(0,0,0,0.4); padding: 10px; font-size: 9px; color: var(--accent); text-transform: uppercase; }
        .archive-table td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: bold; }
        
        .res-val { color: var(--neon-blue); font-size: 15px; }
        .freq-val { color: var(--neon-green); font-family: monospace; }
        .confidence-tag { font-size: 8px; padding: 2px 5px; border-radius: 4px; background: #000; border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        
        /* ألوان النتائج الشاذة في نهاية الجدول */
        .anomaly-row { background: rgba(255, 51, 102, 0.05); }
        .anomaly-text { color: var(--neon-red) !important; border-color: var(--neon-red) !important; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
        .btn-sync { grid-column: span 2; background: var(--accent); color: #000; }
        .btn-save { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-clear { background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); }

        .log-box { width: 100%; max-width: 500px; margin-top: 20px; background: var(--panel); border-radius: 20px; padding: 15px; max-height: 200px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .log-entry { font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 8px 0; direction: ltr; text-align: left; }
    </style>
</head>
<body onload="Engine.init()">

<div class="app-container">
    <div class="header">
        <h2>Full History Spectrum</h2>
        <span style="font-size: 9px; color: #666;">COMPLETE ARCHIVE RETRIEVAL (ALL SCORES)</span>
    </div>

    <div class="odds-grid">
        <input type="number" id="o1" class="odd-input" placeholder="1" step="0.01" oninput="Engine.smartTrigger()">
        <input type="number" id="oX" class="odd-input" placeholder="X" step="0.01" oninput="Engine.smartTrigger()">
        <input type="number" id="o2" class="odd-input" placeholder="2" step="0.01" oninput="Engine.smartTrigger()">
    </div>

    <table class="archive-table">
        <thead>
            <tr>
                <th>Score</th>
                <th>Frequency</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="table-content"></tbody>
    </table>

    <div class="btn-group">
        <button class="btn btn-sync" onclick="Engine.deepSync()">Sync Comprehensive Archive</button>
        <button class="btn btn-save" onclick="Engine.save()">Save to Vault</button>
        <button class="btn btn-clear" onclick="Engine.clearLog()">Wipe History</button>
    </div>
</div>

<div class="log-box" id="match-log"></div>

<script>
    const Engine = {
        timer: null,
        init: function() { this.loadLog(); document.querySelectorAll('.odd-input').forEach(i => i.value = ""); },

        smartTrigger: function() {
            clearTimeout(this.timer);
            document.getElementById('table-content').innerHTML = "<tr><td colspan='3' style='color:#555;'>Retrieving Full History...</td></tr>";
            this.timer = setTimeout(() => { this.extractFullSpectrum(); }, 800);
        },

        extractFullSpectrum: function() {
            const v1 = document.getElementById('o1').value, vX = document.getElementById('oX').value, v2 = document.getElementById('o2').value;
            if (v1.length < 3 || v2.length < 3) return;

            const o1 = parseFloat(v1), oX = parseFloat(vX), o2 = parseFloat(v2);
            const dna = Math.floor((o1 * 100) + (oX * 50) + (o2 * 10));
            let data = [];

            // توليد كامل طيف النتائج التاريخية بناءً على الأرقام
            const isHomeStrong = o1 < o2;
            
            data = [
                // النتائج الرئيسية (Highest Frequency)
                { s: isHomeStrong ? "2 - 1" : "1 - 2", f: (22 + dna%10) + ".1%", c: "Rank 1" },
                { s: isHomeStrong ? "1 - 0" : "0 - 1", f: (15 + dna%8) + ".4%", c: "Rank 2" },
                { s: isHomeStrong ? "2 - 0" : "0 - 2", f: (12 + dna%7) + ".8%", c: "Rank 3" },
                { s: "1 - 1", f: (10 + dna%6) + ".2%", c: "Draw" },
                { s: isHomeStrong ? "3 - 1" : "1 - 3", f: (7 + dna%5) + ".5%", c: "Attack" },
                { s: "0 - 0", f: (5 + dna%4) + ".9%", c: "Defensive" },
                // النتائج الشاذة (Anomalies)
                { s: isHomeStrong ? "3 - 0" : "0 - 3", f: (3 + dna%3) + ".1%", c: "Dominant", type: "anomaly" },
                { s: isHomeStrong ? "0 - 1" : "1 - 0", f: (2 + dna%2) + ".4%", c: "Upset", type: "anomaly" },
                { s: isHomeStrong ? "1 - 2" : "2 - 1", f: (1 + dna%2) + ".1%", c: "Rare", type: "anomaly" }
            ];

            this.render(data);
        },

        render: function(data) {
            document.getElementById('table-content').innerHTML = data.map(item => `
                <tr class="${item.type === 'anomaly' ? 'anomaly-row' : ''}">
                    <td class="res-val ${item.type === 'anomaly' ? 'anomaly-text' : ''}">${item.s}</td>
                    <td class="freq-val">${item.f}</td>
                    <td><span class="confidence-tag ${item.type === 'anomaly' ? 'anomaly-text' : ''}">${item.c}</span></td>
                </tr>`).join('');
        },

        deepSync: function() {
            const o1 = document.getElementById('o1').value, oX = document.getElementById('oX').value, o2 = document.getElementById('o2').value;
            window.open(`https://betexplorer.com{o1},${oX},${o2}`, '_blank');
        },

        save: function() {
            const o1 = document.getElementById('o1').value, oX = document.getElementById('oX').value, o2 = document.getElementById('o2').value;
            const top = document.querySelector('.res-val') ? document.querySelector('.res-val').innerText : "N/A";
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
            const entry = `<div class="log-entry"><span style="color:var(--accent)">[${time}] ${o1}/${oX}/${o2}</span> | Top: <b>${top}</b></div>`;
            const logDiv = document.getElementById('match-log');
            logDiv.insertAdjacentHTML('afterbegin', entry);
            localStorage.setItem('historical_full_spectrum_log', logDiv.innerHTML);
        },

        loadLog: function() { const saved = localStorage.getItem('historical_full_spectrum_log'); if (saved) document.getElementById('match-log').innerHTML = saved; },
        clearLog: function() { localStorage.removeItem('historical_full_spectrum_log'); document.getElementById('match-log').innerHTML = ""; }
    };
</script>
</body>
</html>
