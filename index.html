<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | Market Predator Edition</title>
    <style>
        /* الجزء 1: الهوية البصرية النيونية */
        :root { 
            --neon-gold: #ffcc00; 
            --neon-blue: #00f2ff;
            --alert-red: #ff3e3e;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .main-card { 
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 204, 0, 0.2);
            border-radius: 40px; padding: 30px; width: 100%; max-width: 420px; 
            text-align: center; position: relative; box-shadow: 0 0 60px rgba(0,0,0,1);
            z-index: 1; overflow: hidden;
        }

        .scanline { 
            width: 100%; height: 10px; 
            background: linear-gradient(to bottom, transparent, rgba(255, 204, 0, 0.05), transparent); 
            position: absolute; top: 0; left: 0; animation: scan 4s linear infinite; 
        }
        @keyframes scan { from { top: -10%; } to { top: 110%; } }

        h1 { font-size: 28px; font-weight: 900; letter-spacing: 2px; color: var(--neon-gold); text-shadow: 0 0 15px rgba(255,204,0,0.4); margin: 5px 0; }
        .system-status { font-size: 9px; color: #4caf50; letter-spacing: 2px; margin-bottom: 25px; font-weight: bold; }

        /* حقول الإدخال المتطورة */
        .inputs-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 25px; }
        .field-group { width: 32%; }
        .field-label { font-size: 9px; color: #666; margin-bottom: 5px; display: block; text-transform: uppercase; }
        .field { 
            width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: var(--neon-gold); padding: 15px 0;
            font-size: 18px; font-weight: bold; text-align: center; outline: none;
            border-bottom: 3px solid var(--neon-gold); transition: 0.3s;
        }
        .field:focus { background: rgba(255,204,0,0.1); box-shadow: 0 0 15px rgba(255,204,0,0.2); }

        /* زر التشغيل القوي */
        .btn-engage {
            background: linear-gradient(180deg, var(--neon-gold), #b8860b);
            border: none; border-radius: 20px; padding: 22px; width: 100%;
            color: #000; font-size: 18px; font-weight: 900; cursor: pointer;
            transition: 0.4s; text-transform: uppercase; box-shadow: 0 5px 20px rgba(255,204,0,0.3);
        }
        .btn-engage:active { transform: scale(0.96); }

        /* منطقة النتائج والتحليل */
        .display-node { 
            margin-top: 30px; padding: 25px; border-radius: 30px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            display: none; animation: slideIn 0.6s ease-out; position: relative;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* تنبيه انخفاض الـ Cote */
        .drop-alert { color: var(--alert-red); font-size: 10px; font-weight: bold; margin-bottom: 10px; display: block; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .gap-active { border: 2px solid var(--neon-blue) !important; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        .score-ultra { font-size: 70px; font-weight: 900; color: #fff; letter-spacing: 5px; margin: 10px 0; }
        
        .power-bar { width: 100%; height: 5px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .power-fill { height: 100%; background: var(--neon-blue); width: 0%; transition: 1.5s; box-shadow: 0 0 10px var(--neon-blue); }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .data-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="scanline"></div>
    <div class="system-status" id="status">● SCANNING MARKET FLOW</div>
    <h1>SOVEREIGN PRO</h1>
    <div style="font-size: 9px; color: #444; letter-spacing: 2px; margin-bottom: 25px;">PREDATOR ENGINE v4.0</div>

    <div class="inputs-row">
        <div class="field-group"><span class="field-label">OPENING (2)</span><input type="number" id="v-open" value="5.80" class="field"></div>
        <div class="field-group"><span class="field-label">CURRENT (2)</span><input type="number" id="v-curr" value="5.25" class="field"></div>
        <div class="field-group"><span class="field-label">HOME (1)</span><input type="number" id="v-h" value="1.62" class="field"></div>
    </div>

    <button class="btn-engage" onclick="runPredator()">Engage Predator Analysis</button>

    <div id="display" class="display-node">
        <span id="drop-text" class="drop-alert" style="display:none;">📉 SMART MONEY DETECTED: ODDS DROPPING</span>
        <div style="display: flex; justify-content: space-between; font-size: 10px; color: #555;"><span>HOME</span><span>AWAY</span></div>
        <div class="score-ultra" id="res-score">--</div>
        <div id="res-freq" style="color: var(--neon-blue); font-size: 12px; font-weight: bold;">HISTORICAL STRENGTH: 0%</div>
        <div class="power-bar"><div id="res-fill" class="power-fill"></div></div>
        <div class="data-grid" id="alt-grid"></div>
    </div>
</div>

<script>
    const archive = [
        { h: 1.62, results: [{s: "1 - 2", p: 42.1}, {s: "1 - 1", p: 28.7}, {s: "0 - 1", p: 15.2}] }
    ];

    function runPredator() {
        const hVal = parseFloat(document.getElementById('v-h').value);
        const open = parseFloat(document.getElementById('v-open').value);
        const curr = parseFloat(document.getElementById('v-curr').value);
        const status = document.getElementById('status');

        status.innerText = "● CALCULATING GAP & MOMENTUM...";
        status.style.color = "var(--neon-blue)";

        setTimeout(() => {
            let match = archive.find(i => i.h === hVal) || archive[0];
            
            // 1. منطق الـ Odds Drop
            const drop = ((open - curr) / open) * 100;
            
            // 2. تحديث الواجهة
            const display = document.getElementById('display');
            display.style.display = 'block';
            document.getElementById('res-score').innerText = match.results[0].s;
            document.getElementById('res-freq').innerText = `HISTORICAL STRENGTH: ${match.results[0].p}%`;
            document.getElementById('res-fill').style.width = match.results[0].p + "%";

            // 3. تفعيل التنبيهات
            const dropText = document.getElementById('drop-text');
            if (drop >= 5) {
                dropText.style.display = 'block';
                dropText.innerText = `📉 SMART MONEY ALERT: ${drop.toFixed(1)}% DROP`;
                display.classList.add('gap-active');
            } else {
                dropText.style.display = 'none';
                display.classList.remove('gap-active');
            }

            // 4. النتائج البديلة
            let html = '';
            for(let i=1; i < match.results.length; i++) {
                html += `<div class="data-item"><div style="font-size:8px; color:#444;">PATTERN 0${i+1}</div><div style="color:var(--neon-gold); font-weight:bold;">${match.results[i].s}</div><div style="color:#4caf50; font-size:11px;">${match.results[i].p}%</div></div>`;
            }
            document.getElementById('alt-grid').innerHTML = html;

            status.innerText = "● PREDATOR ANALYSIS COMPLETE";
            status.style.color = "#4caf50";
        }, 1000);
    }
</script>
</body>
</html>
