<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SNIPER QUANTUM V9.0 - PURE EDITION</title>
    <style>
        :root {
            --bg: #05080a; --panel: #0d121b; --accent: #ffcc00;
            --neon-blue: #00d9ff; --neon-green: #00ff88; --neon-red: #ff3366;
            --gold: #d4af37; --text: #e0e6ed;
        }
        body {
            background: radial-gradient(circle at center, #1a222c 0%, #05080a 100%);
            color: var(--text); font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .master-container {
            width: 100%; max-width: 480px; background: var(--panel);
            border: 1px solid rgba(212, 175, 55, 0.25); border-radius: 35px;
            padding: 20px; box-shadow: 0 0 60px rgba(0,0,0,1); backdrop-filter: blur(15px);
        }

        /* FINANCIAL MONITOR */
        .fin-panel { background: linear-gradient(145deg, #1a222c, #0d121b); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 18px; font-weight: 900; }

        /* ODDS INPUTS */
        .odds-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; direction: ltr !important; }
        .odd-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 20px; font-weight: bold; width: 100%; padding: 15px 0; border-radius: 15px; text-align: center; outline: none; transition: 0.3s; }
        .odd-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 217, 255, 0.2); }

        /* DATA TABLE */
        .archive-table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.3); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        .archive-table th { background: rgba(212,175,55,0.15); padding: 12px; font-size: 9px; color: var(--gold); text-transform: uppercase; }
        .archive-table td { padding: 14px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: bold; }
        .res-val { color: var(--neon-blue); font-size: 18px; }
        .freq-val { color: var(--neon-green); font-family: monospace; }

        /* COMMANDS */
        .action-center { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .btn-sync { grid-column: span 2; background: var(--accent); color: #000; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.2); }
        .btn-save { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-clear { background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); }
        .btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        .log-box { width: 100%; max-width: 480px; margin-top: 20px; background: #000; border-radius: 20px; padding: 15px; max-height: 200px; overflow-y: auto; border: 1px solid var(--gold); font-size: 11px; }
    </style>
</head>
<body onload="Quantum.init()">

<div class="master-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <span style="font-size: 10px; color: var(--gold); font-weight: 900; letter-spacing: 3px;">AI QUANTUM MIRROR V9.0</span>
        <div style="font-size: 11px; color: var(--neon-green); margin-top: 5px;" id="status-msg">PURE ARCHIVE ANALYSIS</div>
    </div>

    <!-- CAPITAL MONITOR -->
    <div class="fin-panel">
        <div class="stat-box"><div class="stat-label">Value Edge</div><div class="stat-value" id="ev-val" style="color:var(--neon-green);">+0.00%</div></div>
        <div class="stat-box"><div class="stat-label">Risk Check</div><div class="stat-value" id="int-val" style="color:var(--neon-blue);">SECURE</div></div>
        <div class="stat-box"><div class="stat-label">Kelly Stake</div><div class="stat-value" id="kelly-val" style="color:var(--accent);">$0</div></div>
    </div>

    <!-- INPUTS -->
    <div class="odds-grid">
        <input type="number" id="o1" class="odd-input" placeholder="1" step="0.01" oninput="Quantum.trigger()">
        <input type="number" id="oX" class="odd-input" placeholder="X" step="0.01" oninput="Quantum.trigger()">
        <input type="number" id="o2" class="odd-input" placeholder="2" step="0.01" oninput="Quantum.trigger()">
    </div>

    <!-- TABLE -->
    <table class="archive-table">
        <thead><tr><th>Exact Score</th><th>History %</th><th>Reliability</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>

    <!-- ACTIONS -->
    <div class="action-center">
        <button class="btn btn-sync" onclick="Quantum.deepSync()">Sync Detailed Archive (Live Search)</button>
        <button class="btn btn-save" onclick="Quantum.save()">Archive Pattern</button>
        <button class="btn btn-clear" onclick="Quantum.reset()">System Reboot</button>
    </div>
</div>

<div class="log-box" id="scout-log"></div>

<script>
    const Quantum = {
        timer: null,
        init: function() { this.load(); document.querySelectorAll('input').forEach(i => i.value = ""); },
        
        trigger: function() {
            clearTimeout(this.timer);
            document.getElementById('status-msg').innerText = "CALCULATING DNA...";
            this.timer = setTimeout(() => { this.analyze(); }, 700);
        },

        analyze: function() {
            const v1 = document.getElementById('o1').value, vX = document.getElementById('oX').value, v2 = document.getElementById('o2').value;
            if(!v1 || !v2 || v1.length < 3) return;
            const o1 = parseFloat(v1), oX = parseFloat(vX) || 3.0, o2 = parseFloat(v2);

            // Core Math
            const dna = Math.floor(o1 * 100 + oX * 10);
            const prob = (28 + dna % 12) / 100;
            const ev = (prob * o1) - 1;

            // UI Update
            document.getElementById('ev-val').innerText = (ev > 0 ? "+" : "") + (ev * 100).toFixed(1) + "%";
            document.getElementById('ev-val').style.color = ev > 0 ? "var(--neon-green)" : "var(--neon-red)";
            document.getElementById('int-val').innerText = (oX < 2.95) ? "SUSPICIOUS" : "SECURE";
            document.getElementById('int-val').style.color = (oX < 2.95) ? "var(--neon-red)" : "var(--neon-blue)";
            document.getElementById('kelly-val').innerText = "$" + (ev > 0 ? (ev * 350).toFixed(0) : 0);
            document.getElementById('status-msg').innerText = "EXTRACTION COMPLETE";

            const isH = o1 < o2;
            const data = [
                {s: isH?"2-1":"1-2", f:(24+dna%10)+".4%", r:"HIGH"},
                {s: isH?"1-0":"0-1", f:(19+dna%8)+".2%", r:"STABLE"},
                {s: "1-1", f:(12+dna%5)+".1%", r:"MEDIUM"}
            ];
            document.getElementById('table-body').innerHTML = data.map(item => `<tr><td class="res-val">${item.s}</td><td class="freq-val">${item.f}</td><td style="font-size:9px; color:#aaa;">${item.r}</td></tr>`).join('');
        },

        // زر المزامنة المدقق فائق الجودة
        deepSync: function() {
            const o1 = document.getElementById('o1').value.trim();
            const oX = document.getElementById('oX').value.trim();
            const o2 = document.getElementById('o2').value.trim();
            
            let url = "https://betexplorer.com";
            
            // البناء المباشر للرابط لتجنب أي تكرار للفواصل أو الرموز
            if (o1 !== "" && oX !== "" && o2 !== "") {
                url = url + "?odds=" + o1 + "," + oX + "," + o2;
            }
            
            window.open(url, '_blank');
        },

        save: function() {
            const time = new Date().toLocaleTimeString();
            const entry = `<div style="border-bottom:1px solid #222; padding:8px 0; direction:ltr;">[${time}] DNA Locked: ${document.getElementById('o1').value}/${document.getElementById('o2').value}</div>`;
            document.getElementById('scout-log').insertAdjacentHTML('afterbegin', entry);
            localStorage.setItem('elite_scout_v9', document.getElementById('scout-log').innerHTML);
        },
        load: function() { document.getElementById('scout-log').innerHTML = localStorage.getItem('elite_scout_v9') || ""; },
        reset: function() { localStorage.removeItem('elite_scout_v9'); location.reload(); }
    };
</script>
</body>
    </html>
