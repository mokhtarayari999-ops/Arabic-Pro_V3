<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN PRO | MICRO-AUDITED v13.2</title>
    <style>
        :root { 
            --gold: #ffcc00; --blue: #00f2ff; --red: #ff3e3e; --bg: #030303; 
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: radial-gradient(circle at center, #111, #000); 
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh; touch-action: manipulation;
        }

        .master-panel { 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-top: 4px solid var(--gold);
            border-radius: 30px; padding: 20px; width: 100%; max-width: 420px; text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-top: 20px;
        }

        h1 { font-size: 20px; letter-spacing: 4px; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin: 10px 0 20px 0; }

        .team-input { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 10px; 
            color: #fff; padding: 12px; font-size: 11px; text-align: center; outline: none; width: 100%;
            box-sizing: border-box;
        }

        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .field { 
            width: 100%; background: #000; border: 1px solid var(--glass-border); border-bottom: 2px solid var(--gold);
            border-radius: 10px; color: var(--gold); padding: 12px 0; font-size: 18px; font-weight: bold;
            text-align: center; outline: none;
        }

        .btn-strike { 
            background: linear-gradient(180deg, var(--gold), #b8860b); border: none; border-radius: 15px;
            padding: 18px; width: 100%; color: #000; font-size: 16px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.2);
        }
        .btn-strike:active { transform: scale(0.96); box-shadow: none; }

        #anomaly-btn { 
            display: none; background: linear-gradient(90deg, #ff3e3e, #8b0000); border: none; border-radius: 15px;
            padding: 12px; width: 100%; color: #fff; font-size: 12px; font-weight: bold; margin-top: 15px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .res-box { 
            margin-top: 20px; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.4); 
            border: 1px solid var(--glass-border); display: none;
        }
        .score-ultra { font-size: 55px; font-weight: 900; color: #fff; margin: 5px 0; letter-spacing: -2px; }
    </style>
</head>
<body>

<div class="master-panel">
    <h1>SOVEREIGN PRO</h1>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
        <input type="text" id="h_n" placeholder="HOME TEAM" class="team-input">
        <input type="text" id="a_n" placeholder="AWAY TEAM" class="team-input">
    </div>

    <div class="inputs-grid">
        <input type="number" id="h" placeholder="H" class="field" step="0.01">
        <input type="number" id="x" placeholder="X" class="field" step="0.01">
        <input type="number" id="a" placeholder="A" class="field" step="0.01">
        <input type="number" id="o" placeholder="OPEN" class="field" step="0.01">
    </div>
    
    <button class="btn-strike" id="main-btn" onclick="executeNeuralStrike()">Execute Neural Strike</button>
    
    <button id="anomaly-btn" onclick="window.open('https://betexplorer.com', '_blank')">⚠️ TRAP DETECTED - CHECK DROPS</button>

    <div id="res-box" class="res-box">
        <div id="case-type" style="font-size: 9px; letter-spacing: 2px; font-weight: bold;">SYNCING...</div>
        <div id="score" class="score-ultra">--</div>
        <div id="precision" style="color: var(--blue); font-size: 11px; font-weight: bold;">INDEX: 0.00%</div>
    </div>
</div>

<script>
    function executeNeuralStrike() {
        // تدقيق المدخلات مجهرياً
        const h = parseFloat(document.getElementById('h').value);
        const x = parseFloat(document.getElementById('x').value) || 3.30;
        const a = parseFloat(document.getElementById('a').value);
        const o = parseFloat(document.getElementById('o').value) || a;

        if(!h || !a) {
            alert("Missing Data: H and A are mandatory.");
            return;
        }

        const drop = ((o - a) / o) * 100;
        const marketSkew = (h / a);
        let res = { s: "1 - 1", p: "38.22%", t: "NEUTRAL MARKET", c: "#999" };

        // المحرك التاريخي المطور
        if (h <= 1.48 && drop < 10) {
            res = { s: "2 - 0", p: "74.12%", t: "LOGICAL DOMINANCE", c: "var(--blue)" };
        } 
        else if (h <= 1.68 && drop >= 17) {
            res = { s: "1 - 1", p: "58.45%", t: "HISTORICAL TRAP (REVERSED)", c: "var(--red)" };
        }
        else if (marketSkew >= 0.85 && marketSkew <= 1.15) {
            res = { s: (drop > 12) ? "1 - 2" : "1 - 1", p: "42.33%", t: "BALANCED MARKET SYNC", c: "var(--gold)" };
        }
        else if (a < 1.90 && drop > 15) {
            res = { s: "0 - 2", p: "65.88%", t: "AWAY SNIPER ATTACK", c: "var(--blue)" };
        }

        // معالجة الواجهة
        const btn = document.getElementById('main-btn');
        btn.disabled = true;
        btn.innerText = "SCANNING...";
        
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('score').innerText = "---";

        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "Execute Neural Strike";
            document.getElementById('score').innerText = res.s;
            document.getElementById('case-type').innerText = res.t;
            document.getElementById('case-type').style.color = res.c;
            document.getElementById('precision').innerText = `HISTORICAL INDEX: ${res.p}`;
            document.getElementById('anomaly-btn').style.display = (res.t.includes("TRAP") || drop > 25) ? 'block' : 'none';
            
            // اهتزاز الهاتف عند النجاح (للهواتف المدعومة)
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }, 800);
    }
</script>
</body>
</html>
