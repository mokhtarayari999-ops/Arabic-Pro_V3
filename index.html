<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN PRO | ULTIMATE CHRONICLE v30.0</title>
    <style>
        :root { 
            --gold: #ffcc00; --blue: #00f2ff; --bg: #030303; 
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: radial-gradient(circle at center, #111, #000); 
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .master-panel { 
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-top: 5px solid var(--gold);
            border-radius: 35px; padding: 25px; width: 100%; max-width: 450px; text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); margin-top: 10px;
        }

        h1 { font-size: 22px; letter-spacing: 5px; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin: 5px 0 20px 0; font-weight: 900; }

        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .field { 
            width: 100%; background: #000; border: 1px solid var(--glass-border); border-bottom: 3px solid var(--gold);
            border-radius: 12px; color: var(--gold); padding: 15px 0; font-size: 20px; font-weight: bold; text-align: center; outline: none;
        }

        .btn-strike { 
            background: linear-gradient(180deg, var(--gold), #b8860b); border: none; border-radius: 15px;
            padding: 20px; width: 100%; color: #000; font-size: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(255, 204, 0, 0.3); transition: 0.2s; margin-bottom: 12px;
        }

        .btn-sync {
            background: none; border: 1px solid var(--blue); color: var(--blue); border-radius: 12px; 
            padding: 12px; width: 100%; font-size: 11px; cursor: pointer; text-transform: uppercase; font-weight: bold;
            transition: 0.3s; display: block; width: 100%;
        }

        .btn-sync:active { background: rgba(0, 242, 255, 0.2); transform: scale(0.98); }

        .res-box { 
            margin-top: 25px; padding: 25px; border-radius: 30px; background: rgba(0,0,0,0.85); 
            border: 1px solid var(--blue); display: none;
        }
        .score-ultra { font-size: 85px; font-weight: 900; color: #fff; margin: 10px 0; letter-spacing: -3px; }
        
        .footer-tag { font-size: 8px; color: #444; margin-top: 20px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="master-panel">
    <h1>SOVEREIGN PRO <span style="font-size: 10px; color: var(--blue);">v30.0</span></h1>
    
    <div class="inputs-grid">
        <input type="number" id="h" placeholder="H" class="field" step="0.01">
        <input type="number" id="x" placeholder="X" class="field" step="0.01">
        <input type="number" id="a" placeholder="A" class="field" step="0.01">
        <input type="number" id="o" placeholder="O" class="field" step="0.01">
    </div>
    
    <button class="btn-strike" onclick="executeStrike()">Execute Neural Strike</button>
    
    <!-- الزر المعدل لفتح الأرشيف مباشرة لتدخل القيم يدوياً -->
    <button class="btn-sync" onclick="openArchive()">📂 GO TO HISTORICAL ARCHIVE 🔗</button>

    <div id="res-box" class="res-box">
        <div id="score" class="score-ultra">--</div>
        <div style="font-size: 10px; color: var(--gold);">NEURAL ENGINE RESULT</div>
    </div>

    <div class="footer-tag">Independent Historical Engine | Mobile Optimized</div>
</div>

<script>
    function openArchive() {
        // الرابط يوجهك مباشرة لقسم النتائج المنتهية لتجد المقابلات التاريخية
        const url = "https://betexplorer.com";
        
        // الانتقال الفوري الذي يضمن فتح المتصفح أو التطبيق
        window.location.href = url;
    }

    function executeStrike() {
        const hVal = parseFloat(document.getElementById('h').value);
        if(isNaN(hVal)) return alert("أدخل البيانات أولاً!");
        
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('score').innerText = "1 - 1"; // مثال
    }
</script>

</body>
</html>
