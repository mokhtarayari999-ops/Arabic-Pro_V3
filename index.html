<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | Neural Sniper v10.9</title>
    <style>
        :root { --gold: #ffcc00; --blue: #00f2ff; --red: #ff3e3e; --bg: #000; --card-bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .master-panel { background: var(--card-bg); border: 2px solid var(--gold); border-radius: 40px; padding: 30px; width: 100%; max-width: 480px; text-align: center; border-top: 5px solid var(--gold); box-sizing: border-box; }
        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .field { width: 100%; background: #111; border: 1px solid #333; border-bottom: 3px solid var(--gold); border-radius: 12px; color: var(--gold); padding: 12px 0; text-align: center; font-weight: bold; outline: none; }
        .btn-strike { background: linear-gradient(180deg, var(--gold), #b8860b); border: none; border-radius: 20px; padding: 22px; width: 100%; color: #000; font-size: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #anomaly-btn { display: none; background: linear-gradient(90deg, #ff3e3e, #8b0000); color: white; border: none; border-radius: 20px; padding: 15px; width: 100%; margin-top: 15px; font-weight: 900; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .res-box { margin-top: 35px; padding: 25px; border-radius: 35px; background: #0f0f0f; border: 1px solid #1a1a1a; display: none; }
        .score-ultra { font-size: 75px; font-weight: 900; letter-spacing: 5px; margin: 10px 0; }
        .precision-idx { color: var(--blue); font-weight: bold; font-size: 14px; }
        .alt-patterns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .alt-card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .log-section { width: 100%; max-width: 480px; margin-top: 30px; margin-bottom: 50px; }
        .log-header { color: #555; font-size: 10px; font-weight: bold; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .strike-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-left: 4px solid var(--gold); border-radius: 15px; padding: 18px; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="master-panel">
    <h1>SOVEREIGN PRO</h1>
    <div class="inputs-grid">
        <input type="number" id="h" placeholder="H" class="field">
        <input type="number" id="x" placeholder="X" class="field">
        <input type="number" id="a" placeholder="A" class="field">
        <input type="number" id="o" placeholder="OPEN" class="field">
    </div>
    <button class="btn-strike" onclick="executeNeuralStrike()">Execute Neural Strike</button>
    <button id="anomaly-btn">⚠️ ANOMALY DETECTED</button>

    <div id="res-box" class="res-box">
        <div id="score" class="score-ultra">--</div>
        <div id="precision" class="precision-idx">PRECISION INDEX: 0%</div>
        <div id="alt-patterns" class="alt-patterns"></div>
    </div>
</div>

<div class="log-section">
    <div class="log-header">
        <span>SYSTEM_ARCHIVE // DATA_STREAM</span>
        <span onclick="clearLogs()" style="cursor:pointer; color:var(--red);">[CLEAR ALL]</span>
    </div>
    <div id="strike-log"></div>
</div>

<script>
    window.onload = function() { renderLog(); };

    function clearLogs() {
        localStorage.removeItem('sovereign_history');
        renderLog();
    }

    function executeNeuralStrike() {
        const h = parseFloat(document.getElementById('h').value) || 1.80;
        const a = parseFloat(document.getElementById('a').value) || 3.20;
        const o = parseFloat(document.getElementById('o').value) || 3.50;

        const drop = o ? ((o - a) / o) * 100 : 0;
        let s = "1 - 2", p = 48, patterns = [{s:"0-1", p:34},{s:"2-2", p:26}];

        // خوارزمية v10.9
        if (h <= 1.45) {
            s = (drop > 15) ? "1 - 1" : "3 - 0";
            p = (drop > 15) ? 52 : 88;
            patterns = (drop > 15) ? [{s:"1-2", p:34},{s:"2-1", p:29}] : [{s:"2-0", p:74},{s:"4-0", p:48}];
        }

        document.getElementById('anomaly-btn').style.display = (drop > 20) ? 'block' : 'none';
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('score').innerText = s;
        document.getElementById('precision').innerText = `PRECISION INDEX: ${p}%`;

        let phtml = '';
        patterns.forEach(item => {
            phtml += `<div class="alt-card">
                        <div style="font-size:20px; color:var(--gold); font-weight:bold;">${item.s}</div>
                        <div style="font-size:10px; color:var(--blue);">${item.p}%</div>
                      </div>`;
        });
        document.getElementById('alt-patterns').innerHTML = phtml;

        saveToLog(s, p, patterns);
    }

    function saveToLog(target, prec, patterns) {
        // حماية مجهرية: تحويل المصفوفة إلى نص فوراً لضمان عدم حدوث undefined
        const altString = patterns.map(i => `${i.s} (${i.p}%)`).join(' | ');
        
        const entry = {
            target: target,
            precision: prec,
            alternatives: altString,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        let history = JSON.parse(localStorage.getItem('sovereign_history')) || [];
        // تصفية السجلات الفاسدة القديمة تلقائياً
        history = history.filter(item => item.alternatives !== undefined && item.alternatives !== "undefined");
        
        history.unshift(entry);
        localStorage.setItem('sovereign_history', JSON.stringify(history.slice(0, 10)));
        renderLog();
    }

    function renderLog() {
        let history = JSON.parse(localStorage.getItem('sovereign_history')) || [];
        const container = document.getElementById('strike-log');
        
        // منع عرض أي سجل يحتوي على undefined نهائياً
        container.innerHTML = history.map(item => {
            if (!item.alternatives || item.alternatives === "undefined") return ""; 
            return `
                <div class="strike-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:22px; font-weight:900; color:var(--gold);">${item.target}</span>
                        <span style="font-size:12px; color:var(--blue);">${item.precision}%</span>
                    </div>
                    <div style="font-size:11px; color:#777; margin-top:10px; border-top:1px solid #1a1a1a; padding-top:8px;">
                        ALTS: <span style="color:#bbb;">${item.alternatives}</span>
                    </div>
                    <div style="font-size:9px; color:#333; margin-top:6px;">STRIKE_TIME: ${item.time} // DATA_LOCKED</div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
