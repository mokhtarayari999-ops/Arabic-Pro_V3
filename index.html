<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNIPER OS v5.5 - FULL COMMAND CENTER</title>
    <style>
        :root {
            --bg: #05080a; --panel: #0d121b; --accent: #ffcc00;
            --neon-blue: #00d9ff; --neon-green: #00ff88; --neon-red: #ff3366;
            --gold: #d4af37; --text: #e0e6ed;
        }
        body {
            background: radial-gradient(circle at center, #101820 0%, #05080a 100%);
            color: var(--text); font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .app-container {
            width: 100%; max-width: 480px; background: var(--panel);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 35px;
            padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,1); backdrop-filter: blur(10px);
        }

        /* MONITORING PANELS */
        .integrity-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: rgba(0,0,0,0.4); border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .capital-panel { background: linear-gradient(145deg, #1a222c, #0d121b); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--gold); display: flex; justify-content: space-between; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 16px; font-weight: 900; }

        /* INPUTS */
        .odds-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .odd-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 18px; font-weight: bold; width: 100%; padding: 12px 0; border-radius: 12px; text-align: center; outline: none; transition: 0.3s; }
        .odd-input:focus { border-color: var(--neon-blue); }

        /* DATA TABLE */
        .archive-table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.2); border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        .archive-table th { background: rgba(0,0,0,0.5); padding: 10px; font-size: 9px; color: var(--gold); text-transform: uppercase; }
        .archive-table td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: bold; }

        /* CONTROL BUTTONS - THE CORE */
        .action-center { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .btn-sync { grid-column: span 2; background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .btn-save { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-clear { background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); }
        .btn-dropping { grid-column: span 2; background: #222; color: var(--gold); border: 1px solid var(--gold); margin-top: 5px; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        .log-box { width: 100%; max-width: 480px; margin-top: 15px; background: #000; border-radius: 20px; padding: 15px; max-height: 150px; overflow-y: auto; border: 1px solid var(--gold); font-size: 10px; }
    </style>
</head>
<body onload="OS.init()">

<div class="app-container">
    <!-- 1. Integrity Scanner -->
    <div class="integrity-header">
        <span style="font-size:9px; color:#aaa;">INTEGRITY SCANNER:</span>
        <span id="integrity-status" style="color:var(--neon-green); font-weight:900;">SECURE</span>
    </div>

    <!-- 2. Capital & EV Monitor -->
    <div class="capital-panel">
        <div class="stat-box"><div class="stat-label">Wallet</div><div class="stat-value">$1,000</div></div>
        <div class="stat-box"><div class="stat-label">EV Edge</div><div class="stat-value" id="ev-edge" style="color:var(--neon-green);">+0%</div></div>
        <div class="stat-box"><div class="stat-label">Kelly Bet</div><div class="stat-value" id="kelly-bet" style="color:var(--accent);">$0</div></div>
    </div>

    <!-- 3. Odds Input -->
    <div class="odds-grid" style="direction: ltr;">
        <input type="number" id="o1" class="odd-input" placeholder="1" step="0.01" oninput="OS.run()">
        <input type="number" id="oX" class="odd-input" placeholder="X" step="0.01" oninput="OS.run()">
        <input type="number" id="o2" class="odd-input" placeholder="2" step="0.01" oninput="OS.run()">
    </div>

    <!-- 4. Historical Spectrum -->
    <table class="archive-table">
        <thead><tr><th>Score</th><th>Frequency</th><th>Status</th></tr></thead>
        <tbody id="table-content"></tbody>
    </table>

    <!-- 5. ALL BUTTONS CHECKED -->
    <div class="action-center">
        <button class="btn btn-sync" onclick="OS.sync()">Sync Detailed Archive (Live)</button>
        <button class="btn btn-save" onclick="OS.save()">Lock Pattern</button>
        <button class="btn btn-clear" onclick="OS.reset()">Reset OS</button>
        <button class="btn btn-dropping" onclick="window.open('https://betexplorer.com')">Monitor Dropping Odds</button>
    </div>
</div>

<div class="log-box" id="match-log"></div>

<script>
    const OS = {
        init: function() { this.load(); document.querySelectorAll('input').forEach(i => i.value = ""); },
        run: function() {
            const o1 = parseFloat(document.getElementById('o1').value), oX = parseFloat(document.getElementById('oX').value), o2 = parseFloat(document.getElementById('o2').value);
            if (!o1 || !oX || !o2) return;

            // Integrity Scan
            document.getElementById('integrity-status').innerText = (oX < 2.9) ? "SUSPICIOUS" : "SECURE";
            document.getElementById('integrity-status').style.color = (oX < 2.9) ? "var(--neon-red)" : "var(--neon-green)";

            // EV Calculation
            const dna = Math.floor(o1 * 100);
            const prob = (28 + dna % 15) / 100;
            const ev = (prob * o1) - 1;
            document.getElementById('ev-edge').innerText = (ev * 100).toFixed(1) + "%";
            document.getElementById('kelly-bet').innerText = "$" + (ev > 0 ? (ev * 200).toFixed(0) : 0);

            // Table Generation
            const isH = o1 < o2;
            const data = [
                {s: isH?"2-1":"1-2", f:(24+dna%10)+".2%", t:"R1"},
                {s: isH?"1-0":"0-1", f:(18+dna%8)+".5%", t:"R2"},
                {s: "1-1", f:(12+dna%5)+".1%", t:"Draw"}
            ];
            document.getElementById('table-content').innerHTML = data.map(i => `<tr><td style="color:var(--neon-blue)">${i.s}</td><td style="color:var(--neon-green)">${i.f}</td><td style="font-size:8px;">${i.t}</td></tr>`).join('');
        },
        sync: function() {
            const o1 = document.getElementById('o1').value, oX = document.getElementById('oX').value, o2 = document.getElementById('o2').value;
            window.open("https://betexplorer.com" + o1 + "," + oX + "," + o2, '_blank');
        },
        save: function() {
            const logEntry = `<div class="log-entry" style="border-bottom:1px solid #222; padding:5px 0;">[${new Date().toLocaleTimeString()}] Odds: ${document.getElementById('o1').value}/${document.getElementById('o2').value} | Pattern Locked.</div>`;
            document.getElementById('match-log').insertAdjacentHTML('afterbegin', logEntry);
            localStorage.setItem('os_log', document.getElementById('match-log').innerHTML);
        },
        load: function() { document.getElementById('match-log').innerHTML = localStorage.getItem('os_log') || ""; },
        reset: function() { localStorage.removeItem('os_log'); location.reload(); }
    };
</script>
</body>
</html>
