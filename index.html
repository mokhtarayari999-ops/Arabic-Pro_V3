<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic-Pro AI Infinity ♾️ | ULTIMATE</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; --card: #080808; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .frame { width: 100%; max-width: 480px; border: 1px solid var(--border); border-radius: 40px; padding: 25px; background: var(--card); box-shadow: 0 0 60px rgba(255, 204, 0, 0.1); }
        
        /* خانة حقن البيانات الذكية */
        .injector-box { width: 100%; margin-bottom: 20px; position: relative; }
        #dataInput { width: 100%; background: #111; border: 1px dashed var(--gold); border-radius: 15px; padding: 12px; color: #555; font-size: 0.75rem; height: 40px; outline: none; transition: 0.3s; cursor: pointer; }
        #dataInput:focus { height: 80px; color: #fff; border-style: solid; }

        .team-block { background: #000; border: 1px solid #111; border-radius: 25px; padding: 20px; margin-bottom: 15px; border-bottom: 3px solid var(--border); }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; font-size: 1.1rem; width: 90%; margin-bottom: 15px; outline: none; text-align: center; }
        input[type="number"] { background: transparent; border: none; color: var(--gold); font-size: 2.5rem; font-weight: 900; text-align: center; width: 45%; outline: none; }

        .neural-factors { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .n-btn { background: #0a0a0a; border: 1px solid var(--border); border-radius: 18px; padding: 12px; color: #444; cursor: pointer; text-align: center; font-size: 0.8rem; font-weight: 600; }
        .n-btn.active { border-color: var(--gold); color: #fff; background: #111; box-shadow: 0 0 15px rgba(255, 204, 0, 0.1); }

        .btn-ignite { background: linear-gradient(180deg, #ffcc00 0%, #b8860b 100%); color: #000; border: none; border-radius: 25px; padding: 20px; width: 100%; font-size: 1.4rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 30px rgba(255, 204, 0, 0.2); margin-top: 10px; }

        .output-panel { margin-top: 30px; display: none; text-align: center; border-top: 1px solid #111; padding-top: 25px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .score-display { font-size: 5rem; font-weight: 900; margin: 10px 0; color: #fff; letter-spacing: -3px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 0.85rem; }
        .stat-item b { color: var(--gold); }

        .history-section { width: 100%; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
        .history-card { background: #0a0a0a; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--gold); font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="frame">
        <!-- نظام حقن البيانات -->
        <div class="injector-box">
            <textarea id="dataInput" placeholder="الصق بيانات المباراة هنا للتحليل الآلي..."></textarea>
        </div>

        <div class="ai-status">ARABIC-PRO AI INFINITY // ULTIMATE</div>

        <div class="team-block">
            <input type="text" id="hN" placeholder="المضيف">
            <div style="display:flex; justify-content:center;"><input type="number" id="hA" value="50"><input type="number" id="hD" value="50"></div>
        </div>
        <div class="team-block">
            <input type="text" id="aN" placeholder="الضيف">
            <div style="display:flex; justify-content:center;"><input type="number" id="aA" value="50"><input type="number" id="aD" value="50"></div>
        </div>

        <div class="neural-factors">
            <div class="n-btn" onclick="this.classList.toggle('active')" id="n1">إصابات 🤕</div>
            <div class="n-btn" onclick="this.classList.toggle('active')" id="n2">روح قتالية 🔥</div>
            <div class="n-btn" onclick="this.classList.toggle('active')" id="n3">سفر شاق ✈️</div>
            <div class="n-btn" onclick="this.classList.toggle('active')" id="n4">إرهاق 😫</div>
        </div>

        <button class="btn-ignite" onclick="executeInfinity()">محاكاة مليون مباراة ♾️</button>

        <div class="output-panel" id="out">
            <div id="perc" style="display:flex; justify-content:space-around; font-size:0.9rem; color:var(--gold); font-weight:bold;"></div>
            <div class="score-display" id="fScore">0-0</div>
            <div class="stat-grid">
                <div class="stat-item">الركنيات: <b id="eC">0</b></div>
                <div class="stat-item">البطاقات: <b id="eK">0</b></div>
                <div class="stat-item">xG: <b id="eX">0.0</b></div>
                <div class="stat-item">الثقة: <b style="color:#00ff00">عالية</b></div>
            </div>
        </div>

        <div class="history-section">
            <div style="color:var(--gold); margin-bottom:15px;">📜 سجل الأرشيف الذهبي</div>
            <div id="historyList"></div>
        </div>
    </div>

<script>
// محرك استخراج البيانات الذكي
document.getElementById('dataInput').addEventListener('input', function(e) {
    const text = e.target.value;
    // منطق استخراج أرقام افتراضي بناءً على الكلمات المفتاحية (يمكن تطويره)
    const numbers = text.match(/\d+/g);
    if(numbers && numbers.length >= 4) {
        document.getElementById('hA').value = numbers[0];
        document.getElementById('hD').value = numbers[1];
        document.getElementById('aA').value = numbers[2];
        document.getElementById('aD').value = numbers[3];
    }
});

function getPoisson(lambda) {
    let L = Math.exp(-lambda), k = 0, p = 1;
    do { k++; p *= Math.random(); } while (p > L);
    return k - 1;
}

function displayHistory() {
    let history = JSON.parse(localStorage.getItem('ap_ultimate_history') || '[]');
    let list = document.getElementById('historyList');
    list.innerHTML = "";
    history.forEach(item => {
        let div = document.createElement('div');
        div.className = 'history-card';
        div.innerHTML = `<div>${item.h} vs ${item.a}</div><div style="color:var(--gold); font-weight:bold;">${item.s}</div>`;
        list.appendChild(div);
    });
}

function executeInfinity() {
    let hN = document.getElementById('hN').value || "المضيف", aN = document.getElementById('aN').value || "الضيف";
    let hA = parseInt(document.getElementById('hA').value), hD = parseInt(document.getElementById('hD').value);
    let aA = parseInt(document.getElementById('aA').value), aD = parseInt(document.getElementById('aD').value);

    let lH = (hA / aD) * 1.65;
    let lA = (aA / hD) * 1.35;

    // تأثير العوامل العصبية
    if(document.getElementById('n1').classList.contains('active')) lA *= 0.65;
    if(document.getElementById('n2').classList.contains('active')) lH *= 1.30;

    let wH = 0, dr = 0, wA = 0, sims = 1000000, map = {};

    for(let i=0; i<sims; i++) {
        let gH = getPoisson(lH), gA = getPoisson(lA);
        if(gH > gA) wH++; else if(gH === gA) dr++; else wA++;
        let s = gH + "-" + gA; map[s] = (map[s] || 0) + 1;
    }

    let best = Object.keys(map).reduce((a, b) => map[a] > map[b] ? a : b);
    document.getElementById('out').style.display = 'block';
    document.getElementById('fScore').innerText = best;
    document.getElementById('perc').innerHTML = `<span>فوز: ${Math.round(wH/sims*100)}%</span> <span>تعادل: ${Math.round(dr/sims*100)}%</span> <span>خسارة: ${Math.round(wA/sims*100)}%</span>`;
    document.getElementById('eC').innerText = Math.round(lH*4 + lA*3) + "+";
    document.getElementById('eK').innerText = Math.round(150/(hD+aD)*2);
    document.getElementById('eX').innerText = lH.toFixed(2) + " vs " + lA.toFixed(2);

    let history = JSON.parse(localStorage.getItem('ap_ultimate_history') || '[]');
    history.unshift({h: hN, a: aN, s: best});
    if(history.length > 10) history.pop();
    localStorage.setItem('ap_ultimate_history', JSON.stringify(history));
    displayHistory();
}
window.onload = displayHistory;
</script>
</body>
    </html>
