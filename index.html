<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروعنا - الأرشيف الذهبي المطور</title>
    <style>
        /* التنسيق الذهبي والأسود الفخم */
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .archive-container {
            max-width: 450px;
            margin: 0 auto;
            background: #151515;
            border: 1px solid #d4af37; /* إطار ذهبي خفيف */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .archive-header {
            padding: 15px;
            background: #d4af37;
            color: #000;
            font-weight: bold;
            text-align: center;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .archive-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #222;
            transition: 0.4s;
        }

        .match-data {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .match-score {
            color: #d4af37;
            font-size: 1.3rem;
            font-weight: bold;
            min-width: 50px;
        }

        .match-teams {
            color: #e0e0e0;
            font-size: 0.95rem;
        }

        /* زر الفسخ بجانب كل مباراة */
        .btn-delete {
            background: none;
            border: 1px solid #444;
            color: #ff4d4d;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete:hover {
            background: #ff4d4d;
            color: white;
            border-color: #ff4d4d;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.4);
        }

        .fade-out {
            transform: scale(0.9);
            opacity: 0;
        }
    </style>
</head>
<body>

<div class="archive-container">
    <div class="archive-header">
        <span>🏆</span> سجل الأرشيف الذهبي
    </div>
    <div id="list-container">
        <!-- المباريات ستظهر هنا -->
    </div>
</div>

<script>
    // 1. جلب البيانات من ذاكرة الهاتف أو وضع قائمة افتراضية إذا كانت فارغة
    let savedMatches = JSON.parse(localStorage.getItem('myProjectArchive')) || [
        { id: Date.now() + 1, teamA: "westham", teamB: "wolves", score: "1-0" },
        { id: Date.now() + 2, teamA: "Real Madrid", teamB: "Barca", score: "3-2" }
    ];

    const listElement = document.getElementById('list-container');

    // 2. وظيفة عرض السجل
    function displayArchive() {
        listElement.innerHTML = '';
        
        if (savedMatches.length === 0) {
            listElement.innerHTML = '<p style="text-align:center; color:#666; padding:20px;">السجل فارغ حالياً</p>';
            return;
        }

        savedMatches.forEach(match => {
            const row = document.createElement('div');
            row.className = 'archive-row';
            row.id = `row-${match.id}`;
            row.innerHTML = `
                <div class="match-data">
                    <span class="match-score">${match.score}</span>
                    <span class="match-teams">${match.teamA} vs ${match.teamB}</span>
                </div>
                <button class="btn-delete" onclick="removeProcess(${match.id})">×</button>
            `;
            listElement.appendChild(row);
        });
    }

    // 3. وظيفة الفسخ النهائي مع التحديث في الذاكرة
    function removeProcess(id) {
        const targetRow = document.getElementById(`row-${id}`);
        
        // تأثير الحذف البصري
        targetRow.classList.add('fade-out');

        setTimeout(() => {
            // حذف من المصفوفة
            savedMatches = savedMatches.filter(m => m.id !== id);
            
            // تحديث ذاكرة الهاتف (LocalStorage)
            localStorage.setItem('myProjectArchive', JSON.stringify(savedMatches));
            
            // إعادة العرض
            displayArchive();
        }, 400);
    }

    // تشغيل التطبيق
    displayArchive();
</script>

</body>
</html>
