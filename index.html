<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic-Pro AI Infinity ♾️</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; --card: #080808; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .frame { width: 100%; max-width: 480px; border: 1px solid var(--border); border-radius: 40px; padding: 25px; background: var(--card); box-shadow: 0 0 60px rgba(255, 204, 0, 0.05); }
        .ai-status { font-size: 0.65rem; color: var(--gold); letter-spacing: 4px; text-align: center; margin-bottom: 25px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .team-block { background: #000; border: 1px solid #111; border-radius: 25px; padding: 20px; margin-bottom: 15px; border-bottom: 2px solid var(--border); }
        input[type="text"] { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; font-size: 1.1rem; width: 90%; margin-bottom: 15px; outline: none; text-align: center; }
        input[type="number"] { background: transparent; border: none; color: var(--gold); font-size: 2.8rem; font-weight: 900; text-align: center; width: 45%; outline: none; }
        .neural-factors { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .n-btn { background: #0a0a0a; border: 1px solid var(--border); border-radius: 18px; padding: 15px; color: #444; cursor: pointer; text-align: center; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
        .n-btn.active { border-color: var(--gold); color: #fff; background: #111; box-shadow: 0 0 20px rgba(255, 204, 0, 0.1); }
        .btn-infinity { background: linear-gradient(180deg, #ffcc00 0%, #b8860b 100%); color: #000; border: none; border-radius: 25px; padding: 22px; width: 100%; font-size: 1.5rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 30px rgba(255, 204, 0, 0.2); }
        .output-panel { margin-top: 35px; display: none; text-align: center; border-top: 1px solid #111; padding-top: 25px; }
        .score-display { font-size: 5rem; font-weight: 900; margin: 15px 0; color: #fff; letter-spacing: -5px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; font-size: 0.8rem; color: #666; }
        .stat-item b { color: #fff; }
        .history-section { width: 100%; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
        .history-title { color: var(--gold); font-size: 1rem; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .history-card { background: #0a0a0a; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--gold); }
        .h-teams { font-size: 0.85rem; color: #fff; }
        .h-score { font-weight: bold; color: var(--gold); }
    </style>
</head>
<body>
    <div class="frame">
        <div class="ai-status">ARABIC-PRO AI INFINITY // V8.0</div>
        <div class="team-block">
            <input type="text" id="hN" placeholder="اسم المضيف">
            <div style="display:flex; justify-content:center;"><input type="number" id="hA" value="80"><input type="number" id="hD" value="85"></div>
        </div>
        <div class="team-block">
            <input type="text" id="aN" placeholder="اسم الضيف">
            <div style="display:flex; justify-content:center;"><input type="number" id="aA" value="70"><input type="number" id="aD" value="75"></div>
        </div>
        <div class="neural-factors">
            <div class="n-btn" onclick="this.classList.toggle('active')" id="n1">إصابات 🤕</div>
            <div class="n-btn" onclick="this.classList.toggle('active')" id="n2">روح قتالية 🔥</div>
            <div class="n-btn" onclick="this.classList.toggle('active')" id="n3">سفر شاق ✈️</div>
            <div class="n-btn" onclick="this.classList.toggle('active')" id="n4">إرهاق 😫</div>
        </div>
        <button class="btn-infinity" onclick="executeInfinity()">محاكاة مليون مباراة ♾️</button>
        <div class="output-panel" id="out">
            <div id="perc" style="display:flex; justify-content:space-around; font-size:0.9rem; color:var(--gold);"></div>
            <div class="score-display" id="fScore">0-0</div>
            <div class="stat-grid">
                <div class="stat-item">الركنيات: <b id="eC">0</b></div>
                <div class="stat-item">البطاقات: <b id="eK">0</b></div>
                <div class="stat-item">الاستحواذ: <b id="eP">50%</b></div>
                <div class="stat-item">xG: <b id="eX">0.0</b></div>
            </div>
        </div>
        <div class="history-section">
            <div class="history-title"><span>📜 سجل الأرشيف الذهبي</span></div>
            <div id="historyList"></div>
        </div>
                </div>
                <script>
function getPoisson(lambda) {
    let L = Math.exp(-lambda), k = 0, p = 1;
    do { k++; p *= Math.random(); } while (p > L);
    return k - 1;
}

function displayHistory() {
    let history = JSON.parse(localStorage.getItem('ap_v8_history') || '[]');
    let list = document.getElementById('historyList');
    list.innerHTML = "";
    history.forEach(item => {
        let div = document.createElement('div');
        div.className = 'history-card';
        div.innerHTML = `<div class="h-teams">${item.h} vs ${item.a}</div><div class="h-score">${item.s}</div>`;
        list.appendChild(div);
    });
}

function executeInfinity() {
    let hN = document.getElementById('hN').value || "المضيف", aN = document.getElementById('aN').value || "الضيف";
    let hA = parseInt(document.getElementById('hA').value), hD = parseInt(document.getElementById('hD').value);
    let aA = parseInt(document.getElementById('aA').value), aD = parseInt(document.getElementById('aD').value);

    // محرك الاحتمالات المطور
    let lH = (hA / aD) * 1.65;
    let lA = (aA / hD) * 1.32;

    if(document.getElementById('n1').classList.contains('active')) lA *= 0.65;
    if(document.getElementById('n2').classList.contains('active')) lH *= 1.30;
    if(document.getElementById('n3').classList.contains('active')) lA *= 0.85;

    let wH = 0, dr = 0, wA = 0, sims = 1000000, map = {};

    for(let i=0; i<sims; i++) {
        let gH = getPoisson(lH), gA = getPoisson(lA);
        if(gH > gA) wH++; else if(gH === gA) dr++; else wA++;
        let s = gH + "-" + gA; map[s] = (map[s] || 0) + 1;
    }

    let best = Object.keys(map).reduce((a, b) => map[a] > map[b] ? a : b);
    document.getElementById('out').style.display = 'block';
    
    // تحديث البيانات الإضافية
    document.getElementById('fScore').innerText = best;
    document.getElementById('perc').innerHTML = `<span>فوز: ${Math.round(wH/sims*100)}%</span> <span>تعادل: ${Math.round(dr/sims*100)}%</span> <span>خسارة: ${Math.round(wA/sims*100)}%</span>`;
    document.getElementById('eC').innerText = Math.round(lH*3.5 + lA*2.5) + "+";
    document.getElementById('eK').innerText = Math.round(100/hD + 100/aD);
    document.getElementById('eX').innerText = lH.toFixed(2) + ":" + lA.toFixed(2);

    // الحفظ الدائم في السجل
    let history = JSON.parse(localStorage.getItem('ap_v8_history') || '[]');
    history.unshift({h: hN, a: aN, s: best});
    if(history.length > 10) history.pop();
    localStorage.setItem('ap_v8_history', JSON.stringify(history));
    displayHistory();
}

window.onload = displayHistory;
</script>
</body>
</html>
