<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | محرك الأنماط التاريخية</title>
    <style>
        /* التصميم الذهبي الفاخر المخصص للهاتف */
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 30px; margin: 0; }
        .main-card { border: 2px solid #ffcc00; border-radius: 30px; padding: 25px; width: 90%; max-width: 380px; background: #000; text-align: center; box-shadow: 0 0 30px rgba(255, 204, 0, 0.15); }
        h1 { color: #ffcc00; font-size: 32px; margin-bottom: 5px; font-weight: bold; letter-spacing: 2px; }
        .subtitle { color: #888; font-size: 11px; margin-bottom: 25px; }
        .inputs-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; }
        input { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; color: #fff; width: 30%; padding: 15px 0; text-align: center; font-size: 20px; font-weight: bold; outline: none; transition: 0.3s; }
        input:focus { border-color: #ffcc00; box-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        .btn-action { background: linear-gradient(45deg, #ffcc00, #b8860b); color: #000; border: none; border-radius: 15px; padding: 18px; width: 100%; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
        .btn-action:active { transform: scale(0.95); opacity: 0.9; }
        
        /* واجهة النتيجة الحقيقية */
        .result-panel { margin-top: 25px; display: none; background: #0a0a0a; padding: 20px; border-radius: 20px; border: 1px solid #ffcc0044; animation: slideUp 0.5s ease-out; }
        .score-output { font-size: 55px; color: #ffcc00; font-weight: bold; margin: 5px 0; text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        .accuracy-tag { color: #4caf50; font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-card">
    <h1>SOVEREIGN PRO</h1>
    <div class="subtitle">محرك تحليل البيانات الحقيقية (10 سنوات)</div>

    <div class="inputs-row">
        <!-- الخانات المخصصة للإحداثيات -->
        <input type="number" id="val-a" step="0.01" value="5.25" placeholder="A">
        <input type="number" id="val-x" step="0.01" value="4.20" placeholder="X">
        <input type="number" id="val-h" step="0.01" value="1.56" placeholder="H">
    </div>

    <button class="btn-action" id="main-btn" onclick="runSovereignEngine()">استخراج النمط الحقيقي</button>

    <div id="res-box" class="result-panel">
        <div id="status-msg" style="font-size: 11px; color: #777;">جاري مطابقة الأنماط في قاعدة البيانات...</div>
        <div class="score-output" id="final-score">--</div>
        <div class="accuracy-tag" id="acc-percent">ثبات النمط: 0%</div>
        <p id="insight" style="font-size: 12px; color: #666; margin-top: 10px; line-height: 1.5;"></p>
    </div>
</div>

<script>
    async function runSovereignEngine() {
        const btn = document.getElementById('main-btn');
        const resBox = document.getElementById('res-box');
        const hIn = parseFloat(document.getElementById('val-h').value);
        const xIn = parseFloat(document.getElementById('val-x').value);
        const aIn = parseFloat(document.getElementById('val-a').value);

        btn.innerText = "جاري التحليل...";
        btn.disabled = true;

        try {
            // جلب البيانات من ملفك الخاص data.json
            const response = await fetch('data.json');
            if (!response.ok) throw new Error();
            const database = await response.json();

            // خوارزمية البحث عن التطابق التاريخي (Pattern Matching)
            // نبحث عن المباريات التي تكررت فيها الإحداثيات بفرق بسيط 0.05
            const matches = database.filter(m => 
                Math.abs(m.B365H - hIn) <= 0.05 && 
                Math.abs(m.B365D - xIn) <= 0.05 && 
                Math.abs(m.B365A - aIn) <= 0.05
            );

            setTimeout(() => {
                if (matches.length > 0) {
                    // حساب النتيجة الأكثر تكراراً (The Mode)
                    const results = matches.map(m => `${m.FTHG}-${m.FTAG}`);
                    const freq = results.reduce((acc, curr) => (acc[curr] = (acc[curr] || 0) + 1, acc), {});
                    const topRes = Object.keys(freq).reduce((a, b) => freq[a] > freq[b] ? a : b);
                    const accPercent = ((freq[topRes] / matches.length) * 100).toFixed(1);

                    resBox.style.display = 'block';
                    document.getElementById('final-score').innerText = topRes;
                    document.getElementById('acc-percent').innerText = `ثبات النمط الحقيقي: ${accPercent}%`;
                    document.getElementById('status-msg').innerText = `تم تحليل ${matches.length} مباراة مطابقة من الأرشيف`;
                    document.getElementById('insight').innerText = `تاريخياً، عند توفر هذه الإحداثيات، انتهت المباريات بنتيجة ${topRes} كأكثر نمط متكرر.`;
                } else {
                    alert("لم يتم العثور على أنماط مطابقة في قاعدة بياناتك. حاول إدخال قيم قريبة من (1.56 - 4.20 - 5.25).");
                }
                btn.innerText = "تحديث النمط الحقيقي";
                btn.disabled = false;
            }, 800);

        } catch (error) {
            alert("خطأ: تأكد من رفع ملف data.json في مستودعك بجانب هذا الملف.");
            btn.innerText = "حاول مجدداً";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
