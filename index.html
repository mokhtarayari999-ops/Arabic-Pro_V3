<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABIC-PRO AI INFINITY</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .yellow-text { color: #d4af37; font-weight: bold; margin-bottom: 10px; }
        
        /* الصناديق الرئيسية كما في الصورة */
        .card {
            border: 1px solid #d4af37;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            background: #000;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            padding: 10px;
            text-align: right;
        }

        .btn-simulate {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            margin: 15px 0;
            cursor: pointer;
        }

        .score-display { font-size: 3rem; font-weight: bold; margin: 10px 0; }

        /* تنسيق السجل وزر الفسخ */
        .archive-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #222;
        }

        .btn-delete {
            background: none;
            border: 1px solid #ff4444;
            color: #ff4444;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="yellow-text">ARABIC-PRO AI INFINITY // ULTIMATE</div>

    <!-- قسم المحاكاة -->
    <div class="card">
        <textarea placeholder="الصق بيانات المباراة هنا"></textarea>
        <p>🤕 إصابات | 🔥 روح قتالية | ✈️ سفر شاق | 😫 إرهاق</p>
        <button class="btn-simulate" onclick="simulateMatch()">محاكاة مليون مباراة ♾️</button>
        <div class="score-display" id="currentScore">0-0</div>
    </div>

    <!-- قسم الأرشيف الذهبي -->
    <div class="card">
        <div class="yellow-text">📜 سجل الأرشيف الذهبي</div>
        <div id="archiveList">
            <!-- هنا ستظهر المباريات مع زر الفسخ -->
        </div>
    </div>

    <script>
        // مصفوفة لتخزين السجل في ذاكرة المتصفح
        let archive = JSON.parse(localStorage.getItem('gold_archive')) || [];

        function simulateMatch() {
            // توليد نتيجة عشوائية للمحاكاة
            const s1 = Math.floor(Math.random() * 5);
            const s2 = Math.floor(Math.random() * 5);
            const result = `${s1}-${s2}`;
            
            document.getElementById('currentScore').innerText = result;

            // إضافة النتيجة للسجل
            const matchData = { id: Date.now(), res: result, time: new Date().toLocaleTimeString('ar-EG') };
            archive.unshift(matchData);
            updateArchive();
        }

        function updateArchive() {
            localStorage.setItem('gold_archive', JSON.stringify(archive));
            const list = document.getElementById('archiveList');
            list.innerHTML = '';

            archive.forEach(item => {
                list.innerHTML += `
                    <div class="archive-item">
                        <span style="color:#d4af37; font-weight:bold;">${item.res}</span>
                        <span>مباراة محاكاة (${item.time})</span>
                        <button class="btn-delete" onclick="deleteItem(${item.id})">×</button>
                    </div>`;
            });
        }

        function deleteItem(id) {
            archive = archive.filter(item => item.id !== id);
            updateArchive();
        }

        // تشغيل العرض عند فتح الصفحة
        updateArchive();
    </script>
</body>
</html>
