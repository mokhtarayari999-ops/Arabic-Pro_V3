<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABIC PRO V4.1 | TACTICAL ENGINE</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background: #050505; color: #D4AF37; font-family: 'Cairo', sans-serif; }
        .glass-panel { background: rgba(15, 15, 15, 0.9); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 25px; }
        .stat-card { background: #0a0a0a; border-radius: 15px; border: 1px solid #1a1a1a; transition: 0.3s; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #FFD700 !important; border-radius: 12px !important; text-align: center; }
        /* تنسيق أزرار المؤثرات */
        .modifier-btn { border: 1px solid #333; padding: 8px; border-radius: 10px; font-size: 10px; cursor: pointer; transition: 0.3s; width: 100%; color: #666; }
        .modifier-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        .btn-prime { background: linear-gradient(90deg, #B8860B, #FFD700); color: #000; font-weight: 900; border-radius: 15px; width: 100%; padding: 18px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto space-y-6">
        <header class="text-center py-4">
            <h1 class="text-4xl font-black italic">ARABIC PRO <span class="text-white text-2xl">V4.1</span></h1>
            <p class="text-[10px] text-yellow-700 tracking-[0.3em] font-bold">TACTICAL SOVEREIGN ANALYZER</p>
        </header>

        <div class="glass-panel p-5">
            <div class="grid grid-cols-2 gap-6">
                <!-- الفريق المضيف -->
                <div class="space-y-3">
                    <input type="text" id="hName" placeholder="الأهلي" class="w-full p-2 text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="hAtk" value="80" title="هجوم">
                        <input type="number" id="hDef" value="75" title="دفاع">
                    </div>
                    <!-- مؤثرات المضيف -->
                    <div class="grid grid-cols-2 gap-1">
                        <div id="hInj" onclick="toggleM('hInj')" class="modifier-btn">🤕 إصابات</div>
                        <div id="hMor" onclick="toggleM('hMor')" class="modifier-btn">🔥 روح عالية</div>
                        <div id="hFan" onclick="toggleM('hFan')" class="modifier-btn">📢 جمهور</div>
                        <div id="hFat" onclick="toggleM('hFat')" class="modifier-btn">😫 إرهاق</div>
                    </div>
                </div>
                <!-- الفريق الضيف -->
                <div class="space-y-3">
                    <input type="text" id="aName" placeholder="الزمالك" class="w-full p-2 text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="aAtk" value="70" title="هجوم">
                        <input type="number" id="aDef" value="80" title="دفاع">
                    </div>
                    <!-- مؤثرات الضيف -->
                    <div class="grid grid-cols-2 gap-1">
                        <div id="aInj" onclick="toggleM('aInj')" class="modifier-btn">🤕 إصابات</div>
                        <div id="aMor" onclick="toggleM('aMor')" class="modifier-btn">🔥 روح عالية</div>
                        <div id="aFan" onclick="toggleM('aFan')" class="modifier-btn">✈️ سفر شاق</div>
                        <div id="aFat" onclick="toggleM('aFat')" class="modifier-btn">😫 إرهاق</div>
                    </div>
                </div>
            </div>
            <button onclick="runTacticalAI()" class="btn-prime mt-6 active:scale-95 transition-all">استخراج التوقعات التكتيكية ⚡</button>
        </div>

        <!-- Dashboard Results -->
        <div id="dashboard" class="hidden space-y-4">
            <div class="stat-card p-6 text-center border-yellow-600/30 border-2">
                <p class="text-gray-500 text-[10px] font-bold mb-1">النتيجة المتوقعة بناءً على الظروف</p>
                <div class="text-7xl font-black text-white" id="mainScore">0 - 0</div>
            </div>
            <div id="probList" class="glass-panel p-5 space-y-3"></div>
        </div>
    </div>

    <script>
        let modifiers = { hInj:false, hMor:false, hFan:false, hFat:false, aInj:false, aMor:false, aFan:false, aFat:false };

        function toggleM(id) {
            modifiers[id] = !modifiers[id];
            document.getElementById(id).classList.toggle('active');
        }

        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
        function poisson(l, k) { return (Math.pow(l, k) * Math.exp(-l)) / factorial(k); }

        function runTacticalAI() {
            let hAtk = document.getElementById('hAtk').value / 100;
            let hDef = document.getElementById('hDef').value / 100;
            let aAtk = document.getElementById('aAtk').value / 100;
            let aDef = document.getElementById('aDef').value / 100;

            // تطبيق منطق المؤثرات البشرية
            if(modifiers.hInj) hAtk *= 0.85; if(modifiers.hMor) hAtk *= 1.1; if(modifiers.hFan) hAtk *= 1.15; if(modifiers.hFat) hAtk *= 0.9;
            if(modifiers.aInj) aAtk *= 0.85; if(modifiers.aMor) aAtk *= 1.1; if(modifiers.aFan) aDef *= 0.9; if(modifiers.aFat) aAtk *= 0.9;

            const xGH = (hAtk * (1-aDef)) * 4.4;
            const xGA = (aAtk * (1-hDef)) * 3.3;

            let pW=0, pD=0, pL=0, mP=0, bH=0, bA=0;
            for(let h=0; h<=5; h++){
                for(let a=0; a<=5; a++){
                    let p = poisson(xGH, h) * poisson(xGA, a);
                    if(h>a) pW+=p; else if(a>h) pL+=p; else pD+=p;
                    if(p>mP){ mP=p; bH=h; bA=a; }
                }
            }
            const total = pW+pD+pL;
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('mainScore').innerText = `${bH} - ${bA}`;
            
            const hN = document.getElementById('hName').value || "المضيف";
            const aN = document.getElementById('aName').value || "الضيف";
            
            const results = [
                {l: `فوز ${hN}`, v: (pW/total)*100, c: 'bg-blue-600'},
                {l: 'تعادل', v: (pD/total)*100, c: 'bg-gray-600'},
                {l: `فوز ${aN}`, v: (pL/total)*100, c: 'bg-red-600'}
            ];

            document.getElementById('probList').innerHTML = results.map(r => `
                <div class="mb-2">
                    <div class="flex justify-between text-[10px] font-bold mb-1"><span>${r.l}</span><span>${r.v.toFixed(1)}%</span></div>
                    <div class="w-full bg-black h-1 rounded-full overflow-hidden">
                        <div class="h-full ${r.c}" style="width: ${r.v}%"></div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
