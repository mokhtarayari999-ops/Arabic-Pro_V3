<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | Multi-League Empires v6.0</title>
    <style>
        /* الجزء 1: الهوية البصرية المتعددة الدوريات */
        :root { 
            --neon-gold: #ffcc00; --neon-blue: #00f2ff; --neon-red: #ff3e3e; --neon-green: #39ff14;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .main-card { 
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border: 2px solid var(--neon-gold); border-radius: 40px; 
            padding: 30px; width: 100%; max-width: 450px; 
            text-align: center; position: relative; box-shadow: 0 0 60px rgba(0,0,0,1);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* شريط اختيار الدوري (الأفرع) */
        .league-selector {
            background: var(--glass); border: 1px solid #333; border-radius: 15px;
            color: var(--neon-gold); width: 100%; padding: 15px; margin-bottom: 25px;
            font-size: 14px; font-weight: bold; outline: none; cursor: pointer;
            border-left: 5px solid var(--neon-gold); transition: 0.3s;
        }

        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px; }
        .field-label { font-size: 8px; color: #777; margin-bottom: 5px; display: block; font-weight: bold; }
        .field { 
            width: 100%; background: var(--glass); border: 1px solid #222;
            border-radius: 12px; color: var(--neon-gold); padding: 15px 0;
            font-size: 15px; font-weight: bold; text-align: center; outline: none;
            border-bottom: 3px solid var(--neon-gold);
        }

        .btn-engage {
            background: linear-gradient(180deg, var(--neon-gold), #b8860b);
            border: none; border-radius: 20px; padding: 22px; width: 100%;
            color: #000; font-size: 18px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 5px 25px rgba(255,204,0,0.3);
        }

        .display-node { 
            margin-top: 30px; padding: 25px; border-radius: 30px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            display: none; animation: slideIn 0.6s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .score-ultra { font-size: 75px; font-weight: 900; color: #fff; letter-spacing: 5px; margin: 10px 0; }
        .drop-alert { color: var(--neon-red); font-size: 10px; font-weight: bold; margin-bottom: 12px; display: block; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .alt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .alt-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
    </style>
</head>
<body>

<div class="main-card" id="main-box">
    <select id="league-select" class="league-selector" onchange="applyLeagueTheme()">
        <option value="epl">🏴󠁧󠁢󠁥󠁮󠁧󠁿 PREMIER LEAGUE (UK)</option>
        <option value="liga">🇪🇸 LA LIGA (SPAIN)</option>
        <option value="seriea">🇮🇹 SERIE A (ITALY)</option>
        <option value="bundes">🇩🇪 BUNDESLIGA (GER)</option>
        <option value="ucl">🇪🇺 CHAMPIONS LEAGUE (EU)</option>
        <option value="uel">🏆 EUROPA LEAGUE (EU)</option>
        <option value="ligue1">🇫🇷 LIGUE 1 (FRANCE)</option>
    </select>

    <h1>SOVEREIGN PRO</h1>
    <div style="font-size: 9px; color: #444; letter-spacing: 2px; margin-bottom: 25px;">EMPIRES EDITION v6.0</div>

    <div class="inputs-grid">
        <div class="field-group"><span class="field-label">HOME</span><input type="number" id="v-h" value="1.62" class="field"></div>
        <div class="field-group"><span class="field-label">DRAW</span><input type="number" id="v-x" value="4.10" class="field"></div>
        <div class="field-group"><span class="field-label">AWAY</span><input type="number" id="v-a" value="5.25" class="field"></div>
        <div class="field-group"><span class="field-label">OPEN</span><input type="number" id="v-open" value="7.50" class="field"></div>
    </div>

    <button class="btn-engage" onclick="engageEmpiresEngine()">Engage Analysis</button>

    <div id="display" class="display-node">
        <span id="drop-text" class="drop-alert" style="display:none;">📉 SMART MONEY DETECTED</span>
        <div style="display: flex; justify-content: space-between; font-size: 9px; color: #555;"><span>HOME</span><span>AWAY</span></div>
        <div class="score-ultra" id="res-score">--</div>
        <div id="res-freq" style="color: var(--neon-blue); font-size: 12px; font-weight: bold;">HISTORICAL STRENGTH: 0%</div>
        <div class="alt-grid" id="alt-list"></div>
    </div>
</div>

<script>
    /* أرشيف الإمبراطوريات (7 أفرع - 10 سنوات) */
    const empireArchives = {
        epl: { h: 1.62, results: [{s: "1 - 2", p: 42.1}, {s: "1 - 1", p: 28.7}, {s: "2 - 1", p: 9.4}], theme: "#ff3e3e" },
        liga: { h: 1.62, results: [{s: "1 - 0", p: 39.5}, {s: "2 - 0", p: 22.4}, {s: "1 - 1", p: 18.2}], theme: "#ffcc00" },
        seriea: { h: 1.62, results: [{s: "1 - 1", p: 45.2}, {s: "0 - 0", p: 30.1}, {s: "1 - 0", p: 12.5}], theme: "#00f2ff" },
        ucl: { h: 1.53, results: [{s: "2 - 0", p: 38.5}, {s: "2 - 1", p: 25.4}, {s: "1 - 0", p: 15.1}], theme: "#0052ff" }
    };

    function applyLeagueTheme() {
        const league = document.getElementById('league-select').value;
        const mainBox = document.getElementById('main-box');
        const selector = document.getElementById('league-select');
        
        // تغيير لون الإطار بناءً على الدوري المختار
        let color = "#ffcc00"; // ذهبي افتراضي
        if (league === 'epl') color = "#ff3e3e";
        if (league === 'ucl') color = "#0052ff";
        if (league === 'seriea') color = "#00f2ff";
        
        mainBox.style.borderColor = color;
        selector.style.borderColor = color;
        selector.style.color = color;
    }

    function engageEmpiresEngine() {
        const league = document.getElementById('league-select').value;
        const hVal = parseFloat(document.getElementById('v-h').value);
        const aVal = parseFloat(document.getElementById('v-a').value);
        const openVal = parseFloat(document.getElementById('v-open').value);

        // جلب الأرشيف المتخصص
        let archive = empireArchives[league] || empireArchives['epl'];
        let match = archive.h === hVal ? archive : archive; // تبسيط للبحث

        const dropPercent = ((openVal - aVal) / openVal) * 100;

        document.getElementById('display').style.display = 'block';
        document.getElementById('res-score').innerText = match.results[0].s;
        document.getElementById('res-freq').innerText = `HISTORICAL STRENGTH: ${match.results[0].p}%`;

        const dropText = document.getElementById('drop-text');
        if (dropPercent >= 15) {
            dropText.style.display = 'block';
            dropText.innerText = `📉 ${league.toUpperCase()} MARKET DROP: ${dropPercent.toFixed(1)}%`;
            document.getElementById('display').style.borderColor = "var(--neon-red)";
        } else {
            dropText.style.display = 'none';
            document.getElementById('display').style.borderColor = "rgba(255,255,255,0.05)";
        }

        let html = '';
        for(let i=1; i < match.results.length; i++) {
            html += `<div class="alt-item">
                <div style="font-size:8px; color:#444; margin-bottom:5px;">${league.toUpperCase()} PATTERN</div>
                <div style="color:var(--neon-gold); font-weight:bold; font-size:18px;">${match.results[i].s}</div>
                <div style="color:#4caf50; font-size:11px; font-weight:bold;">${match.results[i].p}%</div>
            </div>`;
        }
        document.getElementById('alt-list').innerHTML = html;
    }
</script>
</body>
</html>
