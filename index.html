<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | Unchained Sniper v13.1</title>
    <style>
        :root { 
            --gold: #ffcc00; --blue: #00f2ff; --red: #ff3e3e; --bg: #000; --card-bg: #0a0a0a;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }

        .master-panel { 
            background: var(--card-bg); border: 2px solid var(--gold); border-radius: 40px; 
            padding: 25px; width: 100%; max-width: 480px; text-align: center; 
            box-shadow: 0 0 50px #000; margin-bottom: 20px; border-top: 5px solid var(--gold);
            box-sizing: border-box;
        }

        h1 { font-size: 26px; letter-spacing: 4px; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin: 0 0 20px 0; font-weight: 900; }

        /* صف أسماء الفرق (الإضافة الجديدة) */
        .teams-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .team-input { 
            background: #111; border: 1px solid #222; border-radius: 10px; 
            color: #fff; padding: 10px; font-size: 11px; text-align: center; outline: none;
            border-bottom: 1px solid var(--blue);
        }

        /* شبكة الخانات الأربعة الأساسية (H, X, A, OPEN) - لم يتم لمسها */
        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .field { 
            width: 100%; background: #111; border: 1px solid #333; border-bottom: 3px solid var(--gold);
            border-radius: 12px; color: var(--gold); padding: 15px 0; font-size: 18px; font-weight: bold;
            text-align: center; outline: none; box-sizing: border-box;
        }

        .btn-strike { 
            background: linear-gradient(180deg, var(--gold), #b8860b); border: none; border-radius: 20px;
            padding: 20px; width: 100%; color: #000; font-size: 18px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase;
        }

        #anomaly-btn { 
            display: none; background: linear-gradient(90deg, #ff3e3e, #8b0000); border: none; border-radius: 20px;
            padding: 15px; width: 100%; color: #fff; font-size: 13px; font-weight: 900; 
            margin-top: 15px; animation: pulse 1.5s infinite; cursor: pointer;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .res-box { 
            margin-top: 25px; padding: 20px; border-radius: 30px; background: #0f0f0f; 
            border: 1px solid #1a1a1a; display: none;
        }
        .score-ultra { font-size: 65px; font-weight: 900; color: #fff; margin: 10px 0; }
        .precision-idx { color: var(--blue); font-weight: bold; font-size: 12px; text-transform: uppercase; }

        /* قسم الرادار الأحمر */
        .radar-box {
            width: 100%; max-width: 480px; background: #000; border: 2px solid var(--red);
            border-radius: 35px; padding: 20px; text-align: center; box-sizing: border-box; margin-bottom: 25px;
        }
        .btn-radar {
            background: var(--red); color: #fff; border: none; border-radius: 20px;
            padding: 18px; width: 90%; font-size: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer;
        }

        /* السجل (Archive) */
        .log-section { width: 100%; max-width: 480px; margin-bottom: 50px; }
        .log-header { 
            color: #444; font-size: 10px; font-weight: bold; border-bottom: 1px solid #222; 
            padding-bottom: 5px; margin-bottom: 15px; display: flex; justify-content: space-between;
        }
        .strike-card { 
            background: #0a0a0a; border: 1px solid #1a1a1a; border-left: 4px solid var(--gold); 
            border-radius: 15px; padding: 15px; margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="master-panel">
    <h1>SOVEREIGN PRO</h1>
    
    <!-- صف الأسماء (اختياري) -->
    <div class="teams-row">
        <input type="text" id="home_name" placeholder="HOME TEAM" class="team-input">
        <input type="text" id="away_name" placeholder="AWAY TEAM" class="team-input">
    </div>

    <!-- الخانات الأربعة الأساسية (محفوظة كلياً) -->
    <div class="inputs-grid">
        <input type="number" id="h" placeholder="H" class="field">
        <input type="number" id="x" placeholder="X" class="field">
        <input type="number" id="a" placeholder="A" class="field">
        <input type="number" id="o" placeholder="OPEN" class="field">
    </div>
    
    <button class="btn-strike" onclick="executeNeuralStrike()">Execute Neural Strike</button>
    
    <button id="anomaly-btn" onclick="window.open('https://betexplorer.com', '_blank')">⚠️ ANOMALY DETECTED</button>

    <div id="res-box" class="res-box">
        <div id="score" class="score-ultra">--</div>
        <div id="precision" class="precision-idx">PRECISION INDEX: 0%</div>
        <div id="alt-patterns" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;"></div>
    </div>
</div>

<div class="radar-box">
    <div style="color:#555; font-size:10px; margin-bottom:10px; font-weight:bold;">📡 GLOBAL SNIPER RADAR: LIVE DROPS</div>
    <button class="btn-radar" onclick="window.open('https://betexplorer.com', '_blank')">🎯 OPEN LIVE DROPS</button>
</div>

<div class="log-section">
    <div class="log-header">
        <span>SYSTEM_ARCHIVE // DATA_STREAM</span>
        <span onclick="clearLogs()" style="color:var(--red); cursor:pointer;">[CLEAR ALL]</span>
    </div>
    <div id="strike-log"></div>
</div>

<script>
    window.onload = function() { renderLog(); };

    function clearLogs() {
        if(confirm("Clear Archive?")) { localStorage.removeItem('sovereign_history'); renderLog(); }
    }

    function executeNeuralStrike() {
        const h = parseFloat(document.getElementById('h').value);
        const a = parseFloat(document.getElementById('a').value);
        const o = parseFloat(document.getElementById('o').value);
        const hN = document.getElementById('home_name').value || "HOME";
        const aN = document.getElementById('away_name').value || "AWAY";

        if(!h || !a) return alert("H and A data required.");

        const drop = o ? ((o - a) / o) * 100 : 0;
        let s = "1 - 1", p = 38, patterns = [];

        // خوارزمية v13.1
        if (h <= 1.45) {
            if (drop > 18) { s = "1 - 1"; p = 52; patterns = [{s:"1-2", p:34},{s:"2-1", p:29}]; }
            else { s = "3 - 0"; p = 88; patterns = [{s:"2-0", p:74},{s:"4-0", p:48}]; }
        } else {
            s = (drop > 10) ? "1 - 2" : "1 - 1"; p = (drop > 10) ? 48 : 38;
            patterns = [{s:"0-1", p:34},{s:"2-2", p:26}];
        }

        document.getElementById('anomaly-btn').style.display = (drop > 20) ? 'block' : 'none';
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('score').innerText = s;
        document.getElementById('precision').innerText = `PRECISION INDEX: ${p}%`;

        let phtml = '';
        patterns.forEach(item => {
            phtml += `<div style="background:#111; padding:12px; border-radius:12px; border:1px solid #222;">
                        <div style="font-size:20px; color:var(--gold); font-weight:bold;">${item.s}</div>
                        <div style="font-size:10px; color:var(--blue);">${item.p}%</div>
                      </div>`;
        });
        document.getElementById('alt-patterns').innerHTML = phtml;

        saveToLog(s, p, patterns, hN, aN);
    }

    function saveToLog(target, prec, patterns, hn, an) {
        const altString = patterns.map(i => `${i.s}`).join(' | ');
        const entry = {
            match: `${hn} vs ${an}`,
            target: target, precision: prec, alternatives: altString,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };
        let history = JSON.parse(localStorage.getItem('sovereign_history')) || [];
        history.unshift(entry);
        localStorage.setItem('sovereign_history', JSON.stringify(history.slice(0, 10)));
        renderLog();
    }

    function renderLog() {
        const history = JSON.parse(localStorage.getItem('sovereign_history')) || [];
        const container = document.getElementById('strike-log');
        container.innerHTML = history.map(item => `
            <div class="strike-card">
                <div style="font-size:10px; color:var(--blue); margin-bottom:5px; font-weight:bold;">MATCH: ${item.match}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:22px; font-weight:900; color:var(--gold);">${item.target}</span>
                    <span style="font-size:12px; color:var(--blue);">${item.precision}%</span>
                </div>
                <div style="font-size:10px; color:#555; margin-top:8px;">ALTS: ${item.alternatives} // ${item.time}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
