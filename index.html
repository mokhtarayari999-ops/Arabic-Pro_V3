<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABIC PRO V4.5</title>
    <style>
        body { background-color: #000; color: #ffcc00; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .app-title { font-size: 2.2rem; font-weight: bold; margin-bottom: 25px; color: #ffcc00; }
        .main-container { background-color: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 35px; width: 100%; max-width: 400px; padding: 25px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .input-field { background-color: #000; border: 1px solid #1a1a1a; border-radius: 15px; padding: 12px; margin-bottom: 10px; text-align: center; display: flex; justify-content: center; align-items: center; gap: 10px; color: #999; font-size: 1.1rem; }
        .number-field { background-color: #000; border: 1px solid #1a1a1a; border-radius: 15px; padding: 10px; margin-bottom: 10px; text-align: center; color: #ffcc00; font-size: 1.8rem; font-weight: bold; cursor: pointer; }
        
        /* التعديل الجديد: إصابات الضيف بإطار ذهبي */
        .injuries-field { border: 1px solid #ffcc00 !important; color: #ffcc00; }

        .btn-predict { background: linear-gradient(180deg, #ffcc00 0%, #b8860b 100%); color: #000; border: none; border-radius: 20px; padding: 22px; width: 100%; font-size: 1.6rem; font-weight: bold; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .result-section { background-color: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; width: 100%; max-width: 400px; padding: 30px 15px; margin-top: 25px; text-align: right; }
        .result-text { color: #8a6d3b; font-size: 1rem; margin-bottom: 10px; padding-right: 20px; }
        .score-display { color: #fff; font-size: 1.8rem; text-align: center; font-weight: bold; letter-spacing: 5px; }

        .history-title { align-self: flex-end; width: 100%; max-width: 400px; margin-top: 30px; text-align: right; font-size: 1.2rem; color: #ffcc00; display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding-right: 10px; }
        .history-list { width: 100%; max-width: 400px; margin-top: 10px; }
        .history-item { background: #0a0a0a; border-radius: 15px; padding: 12px; margin-bottom: 8px; border-right: 4px solid #ffcc00; display: flex; justify-content: space-between; color: #fff; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="app-title">ARABIC PRO V4.5</div>

    <div class="main-container">
        <div class="input-field">🏟️ اسم الفريق المضيف</div>
        <div class="number-field" contenteditable="true">85</div>
        <div class="number-field" contenteditable="true">75</div>

        <div class="input-field">🏁 اسم الفريق الضيف</div>
        <div class="number-field" contenteditable="true">70</div>
        <div class="number-field" contenteditable="true">80</div>
        
        <!-- خانة الإصابات المضافة -->
        <div class="input-field injuries-field">🤕 إصابات الضيف (جديد)</div>
        <div class="number-field injuries-field" contenteditable="true" id="awayInjuries">0</div>

        <button class="btn-predict" onclick="runPrediction()">توليد التوقعات 👑</button>
    </div>

    <div class="result-section">
        <div class="result-text">النتيجة المتوقعة</div>
        <div class="score-display" id="finalScore">0-0</div>
    </div>

    <div class="history-title">📜 سجل التحليلات الذهبي</div>
    <div id="history" class="history-list"></div>

    <script>
        function runPrediction() {
            // منطق حساب التوقعات الخاص بـ Arabic Pro
            let randomHome = Math.floor(Math.random() * 4);
            let randomAway = Math.floor(Math.random() * 3);
            let result = randomHome + "-" + randomAway;
            
            document.getElementById('finalScore').innerText = result;

            // إضافة للسجل
            let historyDiv = document.getElementById('history');
            let item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span>تحليل جديد</span> <b>${result}</b>`;
            historyDiv.prepend(item);
        }
    </script>

</body>
</html>
