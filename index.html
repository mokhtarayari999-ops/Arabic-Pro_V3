<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | Unchained Sniper v10.6</title>
    <style>
        /* الجزء 1: الهوية البصرية الإمبراطورية */
        :root { 
            --gold: #ffcc00; 
            --blue: #00f2ff; 
            --red: #ff3e3e; 
            --bg: #000; 
            --card-bg: #0a0a0a;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        /* لوحة التحكم الرئيسية */
        .master-panel { 
            background: var(--card-bg); border: 2px solid var(--gold); border-radius: 40px; 
            padding: 30px; width: 100%; max-width: 480px; text-align: center; 
            box-shadow: 0 0 100px rgba(0,0,0,1); margin-bottom: 25px; border-top: 5px solid var(--gold);
            box-sizing: border-box;
        }

        h1 { font-size: 28px; letter-spacing: 5px; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin: 0; font-weight: 900; }
        .tagline { font-size: 9px; color: #444; letter-spacing: 3px; margin-bottom: 30px; font-weight: bold; text-transform: uppercase; }

        /* شبكة إدخال البيانات */
        .inputs-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 30px; margin-bottom: 30px; }
        .field { 
            width: 100%; background: #111; border: 1px solid #333; border-bottom: 3px solid var(--gold);
            border-radius: 15px; color: var(--gold); padding: 15px 0; font-size: 18px; font-weight: bold;
            text-align: center; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .field:focus { border-color: var(--blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .btn-strike { 
            background: linear-gradient(180deg, var(--gold), #b8860b); border: none; border-radius: 20px;
            padding: 22px; width: 100%; color: #000; font-size: 20px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 40px rgba(255, 204, 0, 0.3);
        }

        /* زر الشذوذ التفاعلي */
        #anomaly-btn { 
            display: none; background: linear-gradient(180deg, #ff3e3e, #8b0000); border: none; border-radius: 25px;
            padding: 18px; width: 100%; color: #fff; font-size: 14px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; margin-top: 15px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* منطقة النتائج اللحظية */
        .res-box { 
            margin-top: 35px; padding: 25px; border-radius: 35px; background: #0f0f0f; 
            border: 1px solid #1a1a1a; display: none; animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .score-ultra { font-size: 75px; font-weight: 900; color: #fff; letter-spacing: 6px; margin: 10px 0; }
        .precision-idx { color: var(--blue); font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 20px; }

        /* حاوية النتائج البديلة */
        .alt-patterns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .alt-card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .alt-score { font-size: 22px; color: var(--gold); font-weight: 900; }
        .alt-perc { font-size: 10px; color: var(--blue); }

        /* الرادار العالمي المطلوب */
        .external-radar-box {
            width: 100%; max-width: 480px; background: #000; border: 2px solid var(--red);
            border-radius: 35px; padding: 30px; text-align: center; box-shadow: 0 0 50px rgba(255, 62, 62, 0.2); margin-bottom: 30px;
            box-sizing: border-box;
        }
        .radar-title { color: #fff; font-size: 11px; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .sniper-link {
            display: inline-block; background: var(--red); color: #fff; text-decoration: none;
            padding: 22px 35px; border-radius: 20px; font-weight: 900; font-size: 17px;
            text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 30px rgba(255, 62, 62, 0.4);
            width: 85%; transition: 0.3s; cursor: pointer; border: none;
        }

        /* سجل الانتصارات المطور */
        .log-section { width: 100%; max-width: 480px; margin-bottom: 50px; box-sizing: border-box; }
        .log-header { 
            color: #555; font-size: 10px; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; 
            border-bottom: 1px solid #222; padding-bottom: 5px; text-transform: uppercase;
            display: flex; justify-content: space-between; align-items: center;
        }
        .clear-btn { color: var(--red); cursor: pointer; font-size: 11px; }

        .strike-card { 
            border-radius: 15px; padding: 18px; margin-bottom: 12px; border: 1px solid #1a1a1a; 
            border-left: 4px solid var(--gold); background: #0a0a0a;
        }
        .card-main { display: flex; justify-content: space-between; align-items: center; }
        .card-alt-info { font-size: 11px; color: #666; margin-top: 10px; border-top: 1px solid #151515; padding-top: 8px; }
    </style>
</head>
<body>

<div class="master-panel">
    <div class="tagline">UNCHAINED v10.6 | FULL DATA ARCHIVE</div>
    <h1>SOVEREIGN PRO</h1>
    <div class="inputs-grid">
        <input type="number" id="h" placeholder="H" class="field" step="0.01">
        <input type="number" id="x" placeholder="X" class="field" step="0.01">
        <input type="number" id="a" placeholder="A" class="field" step="0.01">
        <input type="number" id="o" placeholder="OPEN" class="field" step="0.01">
    </div>
    <button class="btn-strike" onclick="executeNeuralStrike()">Execute Neural Strike</button>
    
    <button id="anomaly-btn" onclick="window.open('https://betexplorer.com', '_blank')">⚠️ ANOMALY DETECTED</button>

    <div id="res-box" class="res-box">
        <div id="score" class="score-ultra">--</div>
        <div id="precision" class="precision-idx">PRECISION INDEX: 0%</div>
        <div id="alt-patterns" class="alt-patterns"></div>
    </div>
</div>

<div class="external-radar-box">
    <div class="radar-title">📡 GLOBAL SNIPER RADAR: LIVE DROPS</div>
    <button class="sniper-link" onclick="window.open('https://betexplorer.com', '_blank')">🎯 OPEN LIVE DROPS</button>
</div>

<div class="log-section">
    <div class="log-header">
        <span>SYSTEM_ARCHIVE // FULL_STRIKE_DATA</span>
        <span class="clear-btn" onclick="clearArchive()">[CLEAR ALL]</span>
    </div>
    <div id="strike-log"></div>
</div>

<script>
    window.onload = function() { renderLog(); };

    function clearArchive() {
        if(confirm("Permanently clear strike data?")) {
            localStorage.removeItem('sovereign_history');
            renderLog();
        }
    }

    function executeNeuralStrike() {
        const h = parseFloat(document.getElementById('h').value);
        const a = parseFloat(document.getElementById('a').value);
        const o = parseFloat(document.getElementById('o').value);
        if(!h || !a) return alert("Neural Data Required (H, A).");

        const drop = o ? ((o - a) / o) * 100 : 0;
        let s = "1 - 1", p = 38, patterns = [];

        // خوارزمية v10.6 المدققة كلياً
        if (h <= 1.45) {
            if (drop > 18) { s = "1 - 1"; p = 52; patterns = [{s:"1-2", p:34},{s:"2-1", p:29}]; }
            else { s = "3 - 0"; p = 88; patterns = [{s:"2-0", p:74},{s:"4-0", p:48}]; }
        } else if (h <= 1.85) {
            if (drop > 12) { s = "1 - 1"; p = 61; patterns = [{s:"1-2", p:38},{s:"0-1", p:31}]; }
            else { s = "2 - 1"; p = 74; patterns = [{s:"2-0", p:61},{s:"1-0", p:54}]; }
        } else {
            s = (drop > 10) ? "1 - 2" : "1 - 1"; p = (drop > 10) ? 48 : 38;
            patterns = [{s:"0-1", p:34},{s:"2-2", p:26}];
        }

        // تفعيل زر Anomaly بناءً على الشذوذ
        document.getElementById('anomaly-btn').style.display = (drop > 20) ? 'block' : 'none';

        document.getElementById('res-box').style.display = 'block';
        document.getElementById('score').innerText = s;
        document.getElementById('precision').innerText = `PRECISION INDEX: ${p}%`;

        let phtml = '';
        patterns.forEach(item => {
            phtml += `<div class="alt-card">
                        <div class="alt-score">${item.s}</div>
                        <div class="alt-perc">${item.p}%</div>
                      </div>`;
        });
        document.getElementById('alt-patterns').innerHTML = phtml;

        saveToLog(s, p, patterns);
    }

    function saveToLog(target, prec, patterns) {
        const altString = patterns.map(i => `${i.s} (${i.p}%)`).join(' | ');
        const entry = {
            id: Date.now(),
            target: target,
            precision: prec,
            alternatives: altString,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };
        let history = JSON.parse(localStorage.getItem('sovereign_history')) || [];
        // تصفية أوتوماتيكية للبيانات الفاسدة
        history = history.filter(item => item.alternatives && item.alternatives !== "undefined");
        history.unshift(entry);
        localStorage.setItem('sovereign_history', JSON.stringify(history.slice(0, 10)));
        renderLog();
    }

    function renderLog() {
        const history = JSON.parse(localStorage.getItem('sovereign_history')) || [];
        const container = document.getElementById('strike-log');
        if (history.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:#222; font-size:10px; margin-top:20px;">SYSTEM_IDLE // ARCHIVE_EMPTY</div>`;
            return;
        }
        container.innerHTML = history.map(item => `
            <div class="strike-card">
                <div class="card-main">
                    <span style="font-size:22px; font-weight:900; color:var(--gold);">${item.target}</span>
                    <span style="font-size:12px; color:var(--blue); font-weight:bold;">${item.precision}%</span>
                </div>
                <div class="card-alt-info">
                    ALTS: <span style="color:#bbb;">${item.alternatives}</span>
                </div>
                <div style="font-size:9px; color:#333; margin-top:8px; text-transform:uppercase;">
                    STRIKE_TIME: ${item.time} // DATA_LOCKED
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
