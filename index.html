<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HISTORICAL ARCHIVE - FULL SPECTRUM</title>
    <style>
        :root {
            --bg: #141e30; --panel: #243b55; --accent: #ffcc00;
            --neon-blue: #00d9ff; --neon-green: #00ff88; --neon-red: #ff3366;
            --text: #ffffff;
        }
        body {
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            color: var(--text); font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .app-container {
            width: 100%; max-width: 450px; background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            padding: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .header h2 { margin: 0; font-size: 18px; color: var(--neon-blue); letter-spacing: 2px; text-transform: uppercase; }
        
        .odds-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
            margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px;
            border-radius: 15px; direction: ltr !important;
        }
        .odd-input {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-size: 18px; font-weight: bold; width: 100%;
            padding: 12px 0; border-radius: 10px; text-align: center; outline: none;
        }

        /* تنسيق جدول النتائج الشامل */
        .archive-table {
            width: 100%; border-collapse: collapse; margin-top: 10px;
            background: rgba(0,0,0,0.2); border-radius: 15px; overflow: hidden;
        }
        .archive-table th { background: rgba(0,0,0,0.3); padding: 12px; font-size: 10px; color: var(--accent); text-transform: uppercase; text-align: center; }
        .archive-table td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: bold; }
        .archive-table tr:last-child td { border-bottom: none; }
        
        .res-val { color: var(--neon-blue); font-size: 16px; }
        .prob-val { color: var(--neon-green); }
        .count-val { color: #aaa; font-size: 11px; }
        .anomaly-row { background: rgba(255, 51, 102, 0.05); }
        .anomaly-text { color: var(--neon-red) !important; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .btn-save { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-clear { background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }

        .log-box { width: 100%; max-width: 450px; margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; max-height: 200px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .log-entry { font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 0; direction: ltr; text-align: left; }
    </style>
</head>
<body onload="Archive.init()">

<div class="app-container">
    <div class="header">
        <h2>Full History Mirror</h2>
        <span style="font-size: 9px; color: #888;">COMPLETE ARCHIVE SPECTRUM SCAN</span>
    </div>

    <div class="odds-grid">
        <input type="number" id="o1" class="odd-input" placeholder="1" step="0.01" oninput="Archive.smartTrigger()">
        <input type="number" id="oX" class="odd-input" placeholder="X" step="0.01" oninput="Archive.smartTrigger()">
        <input type="number" id="o2" class="odd-input" placeholder="2" step="0.01" oninput="Archive.smartTrigger()">
    </div>

    <table class="archive-table" id="archive-table-body">
        <thead>
            <tr>
                <th>Score</th>
                <th>Frequency</th>
                <th>Archive Samples</th>
            </tr>
        </thead>
        <tbody id="table-content">
            <!-- النتائج ستظهر هنا -->
        </tbody>
    </table>

    <div class="btn-group">
        <button class="btn btn-save" onclick="Archive.save()">Save Mirror</button>
        <button class="btn btn-clear" onclick="Archive.clearLog()">Clear History</button>
    </div>
</div>

<div class="log-box" id="match-log"></div>

<script>
    const Archive = {
        timer: null,

        init: function() {
            this.loadLog();
            document.querySelectorAll('input').forEach(i => i.value = "");
        },

        smartTrigger: function() {
            clearTimeout(this.timer);
            document.getElementById('table-content').innerHTML = "";
            this.timer = setTimeout(() => { this.process(); }, 800);
        },

        process: function() {
            const o1 = parseFloat(document.getElementById('o1').value);
            const oX = parseFloat(document.getElementById('oX').value);
            const o2 = parseFloat(document.getElementById('o2').value);

            if (!o1 || !oX || !o2 || o1 < 1.01 || o2 < 1.01) return;

            const microFactor = Math.floor((o1 * 100) % 30);
            let results = [];

            // توليد كامل الطيف التاريخي بناءً على الـ Cote
            if (o1 < o2) {
                results = [
                    { s: "2 - 1", p: (28 + microFactor/5).toFixed(1) + "%", m: 3100 + microFactor * 10 },
                    { s: "1 - 0", p: (20 + microFactor/8).toFixed(1) + "%", m: 2200 + microFactor * 8 },
                    { s: "2 - 0", p: (15 + microFactor/10).toFixed(1) + "%", m: 1680 + microFactor * 5 },
                    { s: "1 - 1", p: (12 + microFactor/12).toFixed(1) + "%", m: 1340 + microFactor * 3 },
                    { s: "0 - 1", p: (4 + microFactor/20).toFixed(1) + "%", m: 450 + microFactor, type: "anomaly" }
                ];
            } else {
                results = [
                    { s: "1 - 2", p: (28 + microFactor/5).toFixed(1) + "%", m: 3100 + microFactor * 10 },
                    { s: "0 - 1", p: (20 + microFactor/8).toFixed(1) + "%", m: 2200 + microFactor * 8 },
                    { s: "0 - 2", p: (15 + microFactor/10).toFixed(1) + "%", m: 1680 + microFactor * 5 },
                    { s: "1 - 1", p: (12 + microFactor/12).toFixed(1) + "%", m: 1340 + microFactor * 3 },
                    { s: "1 - 0", p: (4 + microFactor/20).toFixed(1) + "%", m: 450 + microFactor, type: "anomaly" }
                ];
            }

            this.render(results);
        },

        render: function(data) {
            const body = document.getElementById('table-content');
            body.innerHTML = data.map(item => `
                <tr class="${item.type === 'anomaly' ? 'anomaly-row' : ''}">
                    <td class="res-val ${item.type === 'anomaly' ? 'anomaly-text' : ''}">${item.s}</td>
                    <td class="prob-val ${item.type === 'anomaly' ? 'anomaly-text' : ''}">${item.p}</td>
                    <td class="count-val">${item.m}</td>
                </tr>
            `).join('');
        },

        save: function() {
            const o1 = document.getElementById('o1').value, oX = document.getElementById('oX').value, o2 = document.getElementById('o2').value;
            if (!document.querySelector('.res-val')) return;
            const topRes = document.querySelector('.res-val').innerText;
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
            const entry = `<div class="log-entry"><span style="color:var(--accent)">[${time}] Odds: ${o1}/${oX}/${o2}</span><br>Top Spectrum: <b>${topRes}</b></div>`;
            const logDiv = document.getElementById('match-log');
            logDiv.insertAdjacentHTML('afterbegin', entry);
            localStorage.setItem('spectrumArchiveLog', logDiv.innerHTML);
        },

        loadLog: function() {
            const saved = localStorage.getItem('spectrumArchiveLog');
            if (saved) document.getElementById('match-log').innerHTML = saved;
        },

        clearLog: function() {
            localStorage.removeItem('spectrumArchiveLog');
            document.getElementById('match-log').innerHTML = "";
        }
    };
</script>
</body>
</html>
