<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- أيقونة التاج الذهبية الفخمة -->
    <link rel="apple-touch-icon" href="https://icons8.com">
    <link rel="icon" href="https://icons8.com">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ARABIC PRO">
    
    <title>ARABIC PRO V4.8 | PERMANENT MEMORY</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background: #000; color: #D4AF37; font-family: 'Cairo', sans-serif; min-height: 100vh; padding-bottom: 50px; }
        .glass-panel { background: rgba(15, 15, 15, 0.9); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 30px; padding: 20px; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #FFD700 !important; border-radius: 15px !important; text-align: center; font-size: 1.4rem !important; padding: 12px !important; font-weight: 900; width: 100%; outline: none; }
        .modifier-btn { border: 1px solid #222; padding: 12px 5px; border-radius: 12px; font-size: 0.9rem; font-weight: 800; color: #555; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; }
        .modifier-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(212, 175, 55, 0.15); box-shadow: 0 0 10px #D4AF37; }
        .btn-king { background: linear-gradient(90deg, #B8860B, #FFD700); color: #000; font-weight: 900; border-radius: 20px; width: 100%; padding: 22px; font-size: 1.6rem; box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4); }
        .history-card { background: #0a0a0a; border-right: 5px solid #D4AF37; padding: 15px; border-radius: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; }
        .label-tag { font-size: 1.1rem; color: #fff; font-weight: 900; margin-bottom: 5px; display: block; text-align: center; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="max-w-xl w-full">
        <header class="text-center py-6">
            <h1 class="text-5xl font-black italic">ARABIC PRO <span class="text-white text-2xl">V4.8</span></h1>
        </header>

        <div class="glass-panel space-y-8">
            <!-- المدخلات -->
            <div class="space-y-4">
                <input type="text" id="hName" placeholder="🏟️ فريق المضيف">
                <div class="grid grid-cols-2 gap-4">
                    <div><span class="label-tag">🚀 هجوم</span><input type="number" id="hAtk" value="85"></div>
                    <div><span class="label-tag">🛡️ دفاع</span><input type="number" id="hDef" value="75"></div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <div id="hInj" onclick="toggleM('hInj')" class="modifier-btn">🤕 إصابات</div>
                    <div id="hMor" onclick="toggleM('hMor')" class="modifier-btn">🔥 روح قتالية</div>
                </div>
            </div>

            <div class="h-px bg-yellow-900/30 w-full"></div>

            <div class="space-y-4">
                <input type="text" id="aName" placeholder="🏁 فريق الضيف">
                <div class="grid grid-cols-2 gap-4">
                    <div><span class="label-tag">🚀 هجوم</span><input type="number" id="aAtk" value="70"></div>
                    <div><span class="label-tag">🛡️ دفاع</span><input type="number" id="aDef" value="80"></div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <div id="aFan" onclick="toggleM('aFan')" class="modifier-btn">✈️ سفر شاق</div>
                    <div id="aFat" onclick="toggleM('aFat')" class="modifier-btn">😫 إرهاق</div>
                </div>
            </div>

            <button onclick="runUltimateAI()" class="btn-king active:scale-95 transition-all">توليد التوقعات الذهبية 👑</button>
        </div>

        <!-- عرض النتيجة -->
        <div id="dashboard" class="hidden glass-panel mt-6 text-center border-2 border-yellow-600">
            <p class="text-gray-400 text-xs font-bold mb-1 italic">التحليل النهائي</p>
            <div class="text-7xl font-black text-white" id="mainScore">0 - 0</div>
            <div id="probList" class="mt-6 space-y-3"></div>
        </div>

        <!-- السجل الدائم -->
        <div class="w-full mt-8">
            <div class="flex justify-between items-center mb-4">
                <button onclick="clearHistory()" class="text-[10px] text-red-500 border border-red-900 px-2 py-1 rounded">مسح السجل</button>
                <h3 class="font-black text-sm">📜 السجل الذهبي (دائم)</h3>
            </div>
            <div id="historyLog" class="space-y-3"></div>
        </div>
    </div>

    <script>
        let mods = { hInj:false, hMor:false, aFan:false, aFat:false };
        
        // تحميل السجل عند فتح التطبيق
        window.onload = function() { displayHistory(); };

        function toggleM(id) { mods[id] = !mods[id]; document.getElementById(id).classList.toggle('active'); }
        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
        function poisson(l, k) { return (Math.pow(l, k) * Math.exp(-l)) / factorial(k); }

        function runUltimateAI() {
            let hN = document.getElementById('hName').value || "المضيف";
            let aN = document.getElementById('aName').value || "الضيف";
            let hAtk = document.getElementById('hAtk').value / 100, hDef = document.getElementById('hDef').value / 100;
            let aAtk = document.getElementById('aAtk').value / 100, aDef = document.getElementById('aDef').value / 100;

            if(mods.hInj) hAtk *= 0.8; if(mods.hMor) hAtk *= 1.2;
            if(mods.aFan) aDef *= 0.85; if(mods.aFat) aAtk *= 0.85;

            const xH = (hAtk * (1-aDef)) * 4.6, xA = (aAtk * (1-hDef)) * 3.6;
            let mP=0, bH=0, bA=0, pW=0, pD=0, pL=0;

            for(let h=0; h<=5; h++) {
                for(let a=0; a<=5; a++) {
                    let p = poisson(xH, h) * poisson(xA, a);
                    if(h>a) pW+=p; else if(a>h) pL+=p; else pD+=p;
                    if(p>mP) { mP=p; bH=h; bA=a; }
                }
            }
            const total = pW+pD+pL;
            const res = `${bH} - ${bA}`;
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('mainScore').innerText = res;

            // حفظ النتيجة في الذاكرة الدائمة
            saveMatch(hN, aN, res, ((pW/total)*100).toFixed(1));
        }

        function saveMatch(h, a, res, prob) {
            let history = JSON.parse(localStorage.getItem('arabicProHistory') || "[]");
            history.unshift({ h, a, res, prob, time: new Date().toLocaleTimeString() });
            localStorage.setItem('arabicProHistory', JSON.stringify(history.slice(0, 20))); // حفظ آخر 20
            displayHistory();
        }

        function displayHistory() {
            let history = JSON.parse(localStorage.getItem('arabicProHistory') || "[]");
            document.getElementById('historyLog').innerHTML = history.map(m => `
                <div class="history-card">
                    <div class="text-right"><p class="text-white font-bold text-xs">${m.h} x ${m.a}</p><p class="text-[9px] text-gray-500">${m.time}</p></div>
                    <div class="text-2xl font-black text-yellow-500">${m.res}</div>
                </div>
            `).join('');
        }

        function clearHistory() { if(confirm("مسح كل السجل؟")) { localStorage.removeItem('arabicProHistory'); displayHistory(); } }
    </script>
</body>
    </html>
