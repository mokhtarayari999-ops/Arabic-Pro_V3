<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO v13.9 | THE MASTER AUDIT</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #0a0a0a; --green: #00ff00; --blue: #00d4ff; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .main-card {
            background: var(--card); border: 1px solid var(--gold); border-radius: 30px;
            padding: 20px; max-width: 480px; margin: 0 auto 30px auto;
            box-shadow: 0 15px 50px rgba(0,0,0,1);
        }

        /* 1. جزء الرادار واللصق الذكي */
        .parser-input { 
            width: 100%; height: 65px; background: #000; border: 1px dashed var(--gold); 
            border-radius: 15px; color: var(--gold); padding: 12px; font-size: 0.75rem; 
            outline: none; resize: none; box-sizing: border-box; margin-bottom: 15px;
        }

        /* 2. جزء احتمالات السوق (Cotes) */
        .odds-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; background: #050505; padding: 10px; border-radius: 15px; border: 1px solid #222; }
        .odds-item label { font-size: 0.65rem; color: #666; display: block; margin-bottom: 3px; }
        .odds-item input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; color: var(--blue); text-align: center; font-weight: bold; outline: none; font-size: 1rem; }

        /* 3. جزء مدخلات الفريق والـ xG */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-group { text-align: right; }
        label { font-size: 0.7rem; color: var(--gold); margin-bottom: 5px; display: block; padding-right: 5px; }
        input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; font-size: 0.9rem; outline: none; box-sizing: border-box; }

        /* 4. جزء العوامل التكتيكية */
        .factors-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .f-btn { padding: 12px; font-size: 0.75rem; background: #111; border: 1px solid #333; color: #666; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .f-btn.active { border-color: var(--gold); color: #fff; background: rgba(212,175,55,0.1); box-shadow: 0 0 10px var(--gold); }

        .btn-analyze { 
            background: linear-gradient(135deg, var(--gold), #996515); color: #000; 
            border: none; width: 100%; padding: 18px; border-radius: 18px; 
            font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }

        /* 5. شاشة النتائج وشفرة السوق */
        .result-screen { margin-top: 25px; border-top: 1px solid #222; padding-top: 20px; }
        #scoreOut { font-size: 5.5rem; font-weight: 900; text-shadow: 0 0 25px var(--gold); margin: 5px 0; line-height: 1; }
        .poss-info { font-size: 0.9rem; color: var(--gold); line-height: 1.6; margin-bottom: 12px; }
        .market-code-box { 
            background: rgba(0, 212, 255, 0.05); border: 1px solid var(--blue); 
            padding: 12px; border-radius: 15px; margin-top: 15px; display: none; 
            text-align: center; font-size: 0.8rem; color: var(--blue); font-weight: bold;
        }

        /* 6. سجل الأرشيف الذهبي الموثق */
        .archive-section { max-width: 480px; margin: 0 auto; text-align: right; }
        .archive-item { 
            background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 20px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; 
            border-right: 5px solid var(--gold); animation: slideIn 0.4s ease;
        }
        .match-score { font-size: 1.8rem; color: var(--gold); font-weight: 900; min-width: 70px; text-align: center; }
        .match-names { font-weight: bold; font-size: 1rem; color: #fff; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } }
    </style>
</head>
<body>

    <div class="main-card">
        <div style="font-size:0.6rem; color:var(--gold); margin-bottom:12px; letter-spacing:2px; font-weight:bold;">SOVEREIGN PRO v13.9 // MASTER AUDIT EDITION</div>
        
        <textarea class="parser-input" id="rawData" placeholder="[ الصق بيانات المباراة هنا... الرادار سيتعرف عليها ]" oninput="smartRadar()"></textarea>

        <div class="odds-grid">
            <div class="odds-item"> <label>مضيف (1)</label> <input type="number" id="c1" step="0.01"> </div>
            <div class="odds-item"> <label>تعادل (X)</label> <input type="number" id="cX" step="0.01"> </div>
            <div class="odds-item"> <label>ضيف (2)</label> <input type="number" id="c2" step="0.01"> </div>
        </div>

        <div class="input-grid">
            <div class="input-group"> <label>الفريق المضيف</label> <input type="text" id="tA" placeholder="بانتظار الرادار..."> </div>
            <div class="input-group"> <label>الفريق الضيف</label> <input type="text" id="tB" placeholder="بانتظار الرادار..."> </div>
            <div class="input-group"> <label>xG المضيف</label> <input type="number" id="xgA" step="0.01"> </div>
            <div class="input-group"> <label>xG الضيف</label> <input type="number" id="xgB" step="0.01"> </div>
        </div>

        <div class="factors-grid">
            <button class="f-btn" id="fHome" onclick="toggleFactor('fHome')">🏟️ ملعب</button>
            <button class="f-btn" id="fSpirit" onclick="toggleFactor('fSpirit')">🔥 روح</button>
            <button class="f-btn" id="fMissing" onclick="toggleFactor('fMissing')">🤕 غيابات</button>
            <button class="f-btn" id="fTactics" onclick="toggleFactor('fTactics')">🧠 تكتيك</button>
        </div>

        <button class="btn-analyze" onclick="startMillionAnalysis()">بدء التحليل السيادي ♾️</button>

        <div class="result-screen">
            <h1 id="scoreOut">0-0</h1>
            <div id="possOut" class="poss-info">بانتظار المعالجة...</div>
            <div id="marketCode" class="market-code-box"></div>
        </div>
    </div>

    <div class="archive-section">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:12px; padding-right:10px;">📜 سجل الأرشيف الذهبي الموثق</div>
        <div id="archiveContent"></div>
    </div>

<script>
    let activeFactors = { fHome: 0, fSpirit: 0, fMissing: 0, fTactics: 0 };
    let archiveDB = JSON.parse(localStorage.getItem('v13_9_final_db')) || [];

    // قاعدة بيانات الرادار (محدثة لحظياً)
    const liveGames = [
        { keywords: ['sunderland', 'سندرلاند', 'tottenham', 'توتنهام'], home: 'سندرلاند', away: 'توتنهام', c1: 2.75, cX: 3.42, c2: 2.81 },
        { keywords: ['monastir', 'منستير', 'africain', 'إفريقي'], home: 'الاتحاد المنستيري', away: 'النادي الإفريقي', c1: 2.10, cX: 3.00, c2: 3.20 },
        { keywords: ['liverpool', 'ليفربول', 'fulham', 'فولهام'], home: 'ليفربول', away: 'فولهام', c1: 1.30, cX: 5.50, c2: 9.00 }
    ];

    function smartRadar() {
        const raw = document.getElementById('rawData').value.toLowerCase().replace(/,/g, '.');
        
        // 1. تدقيق الرادار: التعرف التلقائي
        const found = liveGames.find(g => g.keywords.some(k => raw.includes(k)));
        if (found) {
            document.getElementById('tA').value = found.home;
            document.getElementById('tB').value = found.away;
            document.getElementById('c1').value = found.c1;
            document.getElementById('cX').value = found.cX;
            document.getElementById('c2').value = found.c2;
        }

        // 2. تدقيق استخراج xG
        const xgs = raw.match(/(\d\.\d{1,2})/g);
        if (xgs && xgs.length >= 2) {
            document.getElementById('xgA').value = xgs[0];
            document.getElementById('xgB').value = xgs[1];
        }
    }

    function toggleFactor(id) {
        const btn = document.getElementById(id);
        activeFactors[id] = (activeFactors[id] === 0) ? (id === 'fMissing' ? -0.25 : 0.22) : 0;
        btn.classList.toggle('active');
    }

    function poisson(lambda) {
        let L = Math.exp(-lambda), k = 0, p = 1;
        do { k++; p *= Math.random(); } while (p > L);
        return k - 1;
    }

    function startMillionAnalysis() {
        const xgA = parseFloat(document.getElementById('xgA').value) || 0;
        const xgB = parseFloat(document.getElementById('xgB').value) || 0;
        const c1 = parseFloat(document.getElementById('c1').value) || 0;
        const cX = parseFloat(document.getElementById('cX').value) || 0;
        const c2 = parseFloat(document.getElementById('c2').value) || 0;
        
        document.getElementById('scoreOut').innerText = "⏳";

        setTimeout(() => {
            let bias = Object.values(activeFactors).reduce((a, b) => a + b, 0);
            let sim = {}, draw = 0, over25 = 0;

            for(let i=0; i<1000000; i++) {
                let lA = Math.max(0.1, xgA + bias);
                let lB = Math.max(0.1, xgB - (bias * 0.4));
                let gA = poisson(lA); let gB = poisson(lB);
                let key = `${gA}-${gB}`;
                sim[key] = (sim[key] || 0) + 1;
                if(gA === gB) draw++;
                if((gA+gB) > 2.5) over25++;
            }

            let res = Object.keys(sim).reduce((a, b) => sim[a] > sim[b] ? a : b);
            document.getElementById('scoreOut').innerText = res;
            document.getElementById('possOut').innerHTML = `احتمالية التعادل: ${(draw/10000).toFixed(1)}% | Over 2.5: ${(over25/10000).toFixed(1)}%`;

            // --- تدقيق رادار شفرة السوق (Historical Logic) ---
            const mCode = document.getElementById('marketCode');
            if (c1 > 0 && cX > 0 && c2 > 0) {
                mCode.style.display = "block";
                if(cX < 3.15) mCode.innerHTML = "🔍 <b>شفرة السوق:</b> نمط القفل التكتيكي (غالباً 0-0 أو 1-1)";
                else if(c1 < 1.45 && c2 > 4.5) mCode.innerHTML = "🔍 <b>شفرة السوق:</b> نمط السيطرة المطلقة للمضيف";
                else if(cX > 3.80) mCode.innerHTML = "🔍 <b>شفرة السوق:</b> نمط التبادل المفتوح (أهداف متوقعة)";
                else mCode.innerHTML = "🔍 <b>شفرة السوق:</b> نمط متوازن (اتبع تحليل xG السيادي)";
            }

            saveToArchive(document.getElementById('tA').value, document.getElementById('tB').value, res);
        }, 700);
    }

    function saveToArchive(a, b, s) {
        const item = { names: `${a||'؟'} × ${b||'؟'}`, score: s, date: new Date().toLocaleTimeString() };
        archiveDB.unshift(item);
        if(archiveDB.length > 5) archiveDB.pop();
        localStorage.setItem('v13_9_final_db', JSON.stringify(archiveDB));
        renderArchive();
    }

    function renderArchive() {
        document.getElementById('archiveContent').innerHTML = archiveDB.map(i => `
            <div class="archive-item">
                <div class="match-score">${i.score}</div>
                <div style="text-align:right;">
                    <div class="match-names">${i.names}</div>
                    <div style="font-size:0.65rem; color:#555;">${i.date} - v13.9 Audit</div>
                </div>
            </div>`).join('');
    }

    document.addEventListener('DOMContentLoaded', renderArchive);
</script>
</body>
</html>
