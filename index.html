<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABIC PRO V4.5 | HISTORY FIX</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background: #000; color: #D4AF37; font-family: 'Cairo', sans-serif; }
        .glass-panel { background: #0a0a0a; border: 1px solid #222; border-radius: 25px; padding: 20px; margin-bottom: 20px; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #FFD700 !important; border-radius: 12px; text-align: center; font-size: 1.3rem !important; padding: 10px !important; font-weight: 900; width: 100%; }
        .modifier-btn { border: 1px solid #222; padding: 10px; border-radius: 12px; font-size: 0.9rem; color: #555; text-align: center; font-weight: 800; cursor: pointer; }
        .modifier-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(212, 175, 55, 0.1); }
        .btn-king { background: linear-gradient(90deg, #B8860B, #FFD700); color: #000; font-weight: 900; border-radius: 20px; width: 100%; padding: 20px; font-size: 1.5rem; }
        /* تصميم بطاقات السجل الجديد */
        .history-card { background: #111; border-right: 4px solid #D4AF37; padding: 15px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <header class="text-center py-6">
            <h1 class="text-4xl font-black italic">ARABIC PRO <span class="text-white">V4.5</span></h1>
        </header>

        <div class="glass-panel">
            <input type="text" id="hName" placeholder="🏟️ اسم الفريق المضيف" class="mb-4">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="hAtk" value="85">
                <input type="number" id="hDef" value="75">
            </div>
            <input type="text" id="aName" placeholder="🏁 اسم الفريق الضيف" class="mb-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="aAtk" value="70">
                <input type="number" id="aDef" value="80">
            </div>
            <button onclick="runAnalysis()" class="btn-king mt-6 active:scale-95">توليد التوقعات 👑</button>
        </div>

        <!-- منطقة النتائج والسجل -->
        <div id="results" class="hidden glass-panel text-center">
            <p class="text-gray-400 text-sm mb-1">النتيجة المتوقعة</p>
            <div class="text-6xl font-black text-white" id="mainScore">0-0</div>
            <div id="probList" class="mt-4 space-y-2"></div>
        </div>

        <div class="mt-8">
            <h3 class="text-center font-black text-sm mb-4">📜 سجل التحليلات الذهبي</h3>
            <div id="historyLog" class="space-y-3">
                <!-- هنا تظهر النتائج فوراً -->
            </div>
        </div>
    </div>

    <script>
        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
        function poisson(l, k) { return (Math.pow(l, k) * Math.exp(-l)) / factorial(k); }

        function runAnalysis() {
            let hN = document.getElementById('hName').value || "المضيف";
            let aN = document.getElementById('aName').value || "الضيف";
            let hAtk = document.getElementById('hAtk').value / 100, hDef = document.getElementById('hDef').value / 100;
            let aAtk = document.getElementById('aAtk').value / 100, aDef = document.getElementById('aDef').value / 100;

            const xH = (hAtk * (1-aDef)) * 4.5, xA = (aAtk * (1-hDef)) * 3.5;
            let mP=0, bH=0, bA=0, pW=0, pD=0, pL=0;

            for(let h=0; h<=5; h++) {
                for(let a=0; a<=5; a++) {
                    let p = poisson(xH, h) * poisson(xA, a);
                    if(h>a) pW+=p; else if(a>h) pL+=p; else pD+=p;
                    if(p>mP) { mP=p; bH=h; bA=a; }
                }
            }

            let res = `${bH}-${bA}`;
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('mainScore').innerText = res;

            // إضافة للسجل فوراً
            let log = document.getElementById('historyLog');
            let card = `
                <div class="history-card">
                    <div class="text-right">
                        <p class="text-white font-bold text-sm">${hN} x ${aN}</p>
                        <p class="text-[10px] text-gray-500">${new Date().toLocaleTimeString()}</p>
                    </div>
                    <div class="text-2xl font-black text-yellow-500">${res}</div>
                </div>`;
            log.innerHTML = card + log.innerHTML;
        }
    </script>
</body>
</html>
