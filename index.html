<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN PRO | الإصدار الإمبراطوري الموسع</title>
    <style>
        :root { --gold: #ffcc00; --dark: #000; --card: #0a0a0a; }
        body { background-color: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; }
        .main-card { border: 2px solid var(--gold); border-radius: 35px; padding: 25px; width: 100%; max-width: 400px; background: var(--card); text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,1); position: relative; }
        h1 { color: var(--gold); font-size: 35px; margin: 10px 0; font-weight: 900; text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        .inputs-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 25px; }
        .field { background: #151515; border: 1px solid #333; border-radius: 18px; color: #fff; width: 32%; padding: 18px 0; text-align: center; font-size: 22px; font-weight: bold; outline: none; border-bottom: 3px solid var(--gold); }
        .btn-run { background: linear-gradient(180deg, var(--gold), #b8860b); color: #000; border: none; border-radius: 20px; padding: 20px; width: 100%; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.4s; }
        
        .res-area { margin-top: 30px; display: none; text-align: right; animation: fadeInUp 0.6s ease-out; }
        .main-res-box { background: rgba(255, 204, 0, 0.05); border: 1px solid var(--gold); border-radius: 25px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .score-big { font-size: 65px; color: var(--gold); font-weight: bold; margin: 10px 0; letter-spacing: 5px; }
        
        .others-box { background: #111; border-radius: 20px; padding: 15px; border: 1px solid #222; }
        .other-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .other-item:last-child { border-bottom: none; }
        .score-small { color: #fff; font-weight: bold; font-size: 18px; }
        .pct-small { color: #4caf50; font-size: 14px; font-weight: bold; }
        .status-tag { font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .status-سيادي { background: var(--gold); color: #000; }
        .status-قوي { background: #fff; color: #000; }
        .status-محتمل { background: #444; color: #fff; }
        .status-ضعيف { background: #222; color: #888; }
        .status-نادر { background: #111; color: #444; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-card">
    <div style="color: #4caf50; font-size: 9px; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px;">● IMPERIAL DATA ENGINE ACTIVE</div>
    <h1>SOVEREIGN PRO</h1>
    <div style="color: #666; font-size: 11px; margin-bottom: 20px;">النسخة الموسعة - تحليل الحالات والأنماط (10 سنوات)</div>

    <div class="inputs-row">
        <input type="number" id="v-a" step="0.01" value="2.80" class="field">
        <input type="number" id="v-x" step="0.01" value="3.65" class="field">
        <input type="number" id="v-h" step="0.01" value="2.20" class="field">
    </div>

    <button class="btn-run" id="btn-analyze" onclick="runImperialEngine()">استخراج التصنيف الإمبراطوري</button>

    <div id="res-area" class="res-area">
        <div class="main-res-box">
            <span class="status-tag status-سيادي" id="main-status">سيادي</span>
            <div style="font-size: 12px; color: #888; margin-top: 10px;">النمط السيادي الأول</div>
            <div class="score-big" id="top-score">--</div>
            <div class="pct-big" id="top-pct" style="color:#4caf50; font-weight:bold; font-size:18px;">0%</div>
        </div>

        <div class="others-box" id="others-list">
            <!-- سيتم تعبئة الـ 4 نتائج البديلة هنا -->
        </div>
    </div>
</div>

<script>
    const imperialArchive = [
        {
            h: 1.56, 
            results: [
                {s: "1 - 0", p: 42.1, status: "سيادي"},
                {s: "2 - 0", p: 28.7, status: "قوي"},
                {s: "2 - 1", p: 15.2, status: "محتمل"},
                {s: "1 - 1", p: 9.4, status: "ضعيف"},
                {s: "3 - 0", p: 4.6, status: "نادر"}
            ]
        },
        {
            h: 2.20, 
            results: [
                {s: "1 - 1", p: 36.5, status: "سيادي"},
                {s: "0 - 1", p: 18.2, status: "قوي"},
                {s: "1 - 0", p: 12.4, status: "محتمل"},
                {s: "2 - 1", p: 11.1, status: "محتمل"},
                {s: "0 - 0", p: 8.3, status: "ضعيف"}
            ]
        },
        {
            h: 1.25, 
            results: [
                {s: "3 - 0", p: 55.4, status: "سيادي"},
                {s: "4 - 0", p: 25.2, status: "قوي"},
                {s: "2 - 0", p: 12.1, status: "محتمل"},
                {s: "5 - 0", p: 4.8, status: "ضعيف"},
                {s: "3 - 1", p: 2.5, status: "نادر"}
            ]
        }
    ];

    function runImperialEngine() {
        const btn = document.getElementById('btn-analyze');
        const hIn = parseFloat(document.getElementById('v-h').value);
        
        btn.innerText = "جاري مطابقة الأنماط...";
        btn.disabled = true;

        let match = imperialArchive.reduce((prev, curr) => 
            Math.abs(curr.h - hIn) < Math.abs(prev.h - hIn) ? curr : prev
        );

        setTimeout(() => {
            const resArea = document.getElementById('res-area');
            resArea.style.display = 'block';

            // عرض النتيجة الأساسية
            document.getElementById('top-score').innerText = match.results[0].s;
            document.getElementById('top-pct').innerText = `تكرار: ${match.results[0].p}%`;
            document.getElementById('main-status').innerText = match.results[0].status;

            // عرض الـ 4 نتائج الأخرى
            let othersHTML = '<div style="font-size: 11px; color: #666; margin-bottom: 10px;">تحليل الحالات البديلة:</div>';
            for (let i = 1; i < match.results.length; i++) {
                othersHTML += `
                    <div class="other-item">
                        <span class="status-tag status-${match.results[i].status}">${match.results[i].status}</span>
                        <span class="score-small">${match.results[i].s}</span>
                        <span class="pct-small">${match.results[i].p}%</span>
                    </div>`;
            }
            document.getElementById('others-list').innerHTML = othersHTML;
            
            btn.innerText = "تحديث التحليل الإمبراطوري";
            btn.disabled = false;
        }, 800);
    }
</script>
</body>
</html>
