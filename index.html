<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARABIC PRO V3 | SOVEREIGN ANALYZER</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background-color: #080808; color: #D4AF37; font-family: 'Cairo', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #B8860B 0%, #FFD700 100%); }
        .glass-card { background: rgba(20, 20, 20, 0.95); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        input { background: #121212; border: 1px solid #2a2a2a; color: #fff; padding: 14px; border-radius: 12px; width: 100%; text-align: center; outline: none; }
        .probability-bar { height: 8px; border-radius: 4px; background: #222; overflow: hidden; }
        .probability-fill { height: 100%; transition: width 1.5s ease-in-out; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        th, td { padding: 10px; border: 1px solid #222; text-align: center; }
        th { color: #D4AF37; background: #111; }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-xl mx-auto">
        <div class="text-center mb-10 mt-6">
            <h1 class="text-4xl font-black italic gold-gradient bg-clip-text text-transparent">ARABIC PRO V3</h1>
            <p class="text-gray-500 text-xs font-bold tracking-widest">SOVEREIGN AI ENGINE</p>
        </div>

        <div class="glass-card p-6 mb-8">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="text-center">
                    <input type="text" id="hName" placeholder="المضيف" class="mb-4 text-sm border-b border-yellow-700">
                    <div class="flex gap-2"><input type="number" id="hAtk" value="80"><input type="number" id="hDef" value="70"></div>
                </div>
                <div class="text-center">
                    <input type="text" id="aName" placeholder="الضيف" class="mb-4 text-sm border-b border-yellow-700">
                    <div class="flex gap-2"><input type="number" id="aAtk" value="75"><input type="number" id="aDef" value="75"></div>
                </div>
            </div>

            <button onclick="superAnalysis()" class="w-full gold-gradient py-5 rounded-2xl text-black font-black text-xl shadow-lg active:scale-95 transition-transform">تشغيل المحرك الاحتمالي ⚡</button>

            <div id="resultEngine" class="hidden mt-10 space-y-6">
                <div class="text-center"><p class="text-gray-500 text-xs font-bold mb-1">النتيجة الأكثر توقعاً</p><div class="text-6xl font-black text-white" id="exactScore">0 - 0</div></div>
                <div class="space-y-3">
                    <div><div class="flex justify-between text-[10px] mb-1"><span>فوز المضيف</span><span id="valHome">0%</span></div><div class="probability-bar"><div id="barHome" class="probability-fill bg-blue-500" style="width: 0%"></div></div></div>
                    <div><div class="flex justify-between text-[10px] mb-1"><span>تعادل</span><span id="valDraw">0%</span></div><div class="probability-bar"><div id="barDraw" class="probability-fill bg-gray-500" style="width: 0%"></div></div></div>
                    <div><div class="flex justify-between text-[10px] mb-1"><span>فوز الضيف</span><span id="valAway">0%</span></div><div class="probability-bar"><div id="barAway" class="probability-fill bg-red-500" style="width: 0%"></div></div></div>
                </div>
            </div>
        </div>

        <!-- السجل الذهبي الجديد -->
        <div class="glass-card p-4">
            <h3 class="text-sm font-black mb-4 text-center">📜 السجل الذهبي للتحليلات</h3>
            <div class="overflow-x-auto">
                <table>
                    <thead><tr><th>المباراة</th><th>التوقع</th><th>الفوز %</th></tr></thead>
                    <tbody id="historyBody" class="text-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function factorial(n) { return n <= 1 ? 1 : n * factorial(n - 1); }
        function poisson(lambda, k) { return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k); }

        function superAnalysis() {
            const hn = document.getElementById('hName').value || "المضيف";
            const an = document.getElementById('aName').value || "الضيف";
            const hAtk = parseFloat(document.getElementById('hAtk').value) / 100, hDef = parseFloat(document.getElementById('hDef').value) / 100;
            const aAtk = parseFloat(document.getElementById('aAtk').value) / 100, aDef = parseFloat(document.getElementById('aDef').value) / 100;
            const expH = (hAtk * (1 - aDef)) * 4, expA = (aAtk * (1 - hDef)) * 3;
            let pW=0, pL=0, pD=0, maxP=0, bH=0, bA=0;

            for (let h=0; h<=5; h++) {
                for (let a=0; a<=5; a++) {
                    let p = poisson(expH, h) * poisson(expA, a);
                    if (h>a) pW+=p; else if (h<a) pL+=p; else pD+=p;
                    if (p>maxP) { maxP=p; bH=h; bA=a; }
                }
            }
            const total = pW + pL + pD;
            const winPerc = ((pW/total)*100).toFixed(1);
            const finalScore = `${bH} - ${bA}`;
            
            document.getElementById('resultEngine').classList.remove('hidden');
            document.getElementById('exactScore').innerText = finalScore;
            updateBar('Home', (pW/total)*100); updateBar('Draw', (pD/total)*100); updateBar('Away', (pL/total)*100);

            // إضافة للسجل
            const row = `<tr><td>${hn} x ${an}</td><td class="text-yellow-500 font-bold">${finalScore}</td><td>${winPerc}%</td></tr>`;
            document.getElementById('historyBody').innerHTML = row + document.getElementById('historyBody').innerHTML;
        }
        function updateBar(id, val) {
            document.getElementById('val'+id).innerText = val.toFixed(1) + "%";
            document.getElementById('bar'+id).style.width = val + "%";
        }
    </script>
</body>
                                             </html>
